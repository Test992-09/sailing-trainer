      "DS"
    ],
    "front": "Working tides at a non-listed port — how?",
    "back": "For a port not in the almanac's standard or secondary lists: find the nearest port with similar geography, look at its tidal characteristics, and apply tidal CORRECTIONS based on local knowledge or pilot publications. The Den Danske Lods (Danish Pilot) gives tidal info for many minor Danish ports.",
    "why": "Almanacs can't list every harbour. For uncommon destinations, you fall back on pilot books or local information. Approximation is necessary — be conservative with depth margins to compensate for the lower confidence.",
    "danish": "Beregne tide for ikke-listet havn",
    "src": "RYA-NAV",
    "profileType": "skipper"
  },
  {
    "id": "t49",
    "cat": "Tides",
    "subcat": "Calculation",
    "levels": [
      "DS"
    ],
    "front": "Common exam errors in tidal problems — what to watch for?",
    "back": "(1) Reading time-from-HW with the wrong sign (rising vs falling tide). (2) Using spring values when today is neap (or vice versa). (3) Forgetting to interpolate between spring and neap when range is intermediate. (4) Plotting the stream vector in the direction it CAME from instead of WHERE IT IS GOING. (5) Forgetting to add safety margin to required clearance.",
    "why": "These are the standard exam traps and the standard real-world mistakes. The signs (+/−) and the directions (from/to) are easy to get backwards under exam pressure. Slow down, sketch the situation, double-check direction conventions.",
    "danish": "Almindelige fejl",
    "src": "RYA-NAV",
    "profileType": "skipper"
  },
  {
    "id": "t50",
    "cat": "Tides",
    "subcat": "Calculation",
    "levels": [
      "DS"
    ],
    "front": "Tidal calculation — safety margins",
    "back": "Always add safety margin to clearance calculations: typical 0.3-0.5m for keel + sea state + uncertainty in predictions. For shallow obstacles, even 1m of margin is wise. For under-keel clearance, never aim for less than 50% of your draft as buffer in unsettled conditions.",
    "why": "Predictions, sounding accuracy, atmospheric effects, and wave action all add uncertainty. The cost of a 30cm error in calculation might be a grounding. Cost of 50cm extra margin is just waiting an extra 20 minutes. Always err generously.",
    "danish": "Sikkerhedsmargin",
    "src": "RYA-NAV",
    "profileType": "skipper"
  },

    "back": "Joins two ropes of DIFFERENT thicknesses or materials. Thicker rope forms a bight; thinner passes through and around. Double for very different sizes.",

    "back": "Attaches a smaller line to a larger one (or to a spar) when pull is ALONG the length. Used to take load off a riding turn on a winch.",

    "back": "When a second boat's line is on the same shore bollard, pass YOUR loop UP through theirs before dropping it over the bollard. Either boat can leave without disturbing the other.",
    "why": "If both loops just sit on top of each other, the lower boat can't leave without lifting the upper boat's line. Dipping interlocks them so either can be lifted off independently. Standard courtesy in shared moorings.",

    "back": "A sheet bend with the working end taking a SECOND turn around the bight before tucking under itself. Used when joining lines of very different sizes, or when one line is slippery (modern braid).",

  {

    "subcat": "Knots proper",

      "CC"
    ],
    "front": "Why a reef knot fails on mooring lines",
    "back": "A reef knot capsizes (turns into two half-hitches that slide apart) under unequal pull on its tails. Mooring loads are inherently unequal — one side is the standing line, the other is the short tail. Use a sheet bend or bowlines instead.",
    "why": "The reef knot is reliable ONLY when both ends pull symmetrically (e.g. tying a sail bundle). Once one side pulls harder than the other, it can slip silently. Many \"experienced\" sailors have lost boats to this.",
    "danish": "Hvorfor råbåndsknob fejler",

  },
  {

    "subcat": "Knots proper",
    "levels": [

    ],
    "front": "OXO method for cleat hitches",
    "back": "Memory aid for tying off on a horn cleat: O (round turn around the base), X (one or more figure-eights crossing the horns), O (final round turn / locking hitch). Don't skip the round turn — it takes the load while you tie.",
    "why": "The opening round turn means you can finish the knot with the line under no tension. Without it, you're fighting the load through every step.",

  {

    "subcat": "Knots proper",

      "CC"
    ],
    "front": "How NOT to tie a cleat",
    "back": "WRONG: many wraps without figure-eights — line jams under load. WRONG: figure-eights without final lock — vibration shakes line free. WRONG: the loose tail UNDER the locking turn — can't release. The short end of the line should finish ON TOP, easy to grab.",
    "why": "A cleat hitch must hold under load AND release on demand. The wrong configuration fails one or the other. The \"tail on top\" rule means you can release in seconds in an emergency.",

  {

    "cat": "Knots",
    "subcat": "Coiling & throwing",
    "levels": [
      "CC"
    ],
    "front": "Coiling a rope — clockwise twist",
    "back": "Coil into your left hand, twisting your right wrist AWAY from you slightly with each loop so the rope lies flat. Even loop sizes by holding your arms the same width apart on every loop.",
    "why": "Three-strand laid rope has a built-in twist. Coiling clockwise with the twist makes it lie flat; against the twist makes a tangled mess. Without the wrist twist, the rope tries to figure-eight back on itself.",

  },
  {

    "cat": "Knots",
    "subcat": "Coiling & throwing",
    "levels": [
      "CC"
    ],
    "front": "Figure-eight coiling (for braided line)",
    "back": "Modern braided lines have no twist. Coil them by alternating loops in a figure-eight pattern (one loop normal, next twisted the other way) so the line lies flat without trying to spring back.",
    "why": "Braided line in regular round coils develops kinks because there's no inherent twist to balance the bending. Figure-eight coiling neutralises this. Use for halyards and modern sheets.",

    "front": "Finishing a coil — the wrap-and-tuck",
    "back": "After coiling: wrap the tail tightly around the upper portion of the coil 3-4 times, push a bight of the tail through the top of the coil, bring the bight back over the top, pull tight. Coil hangs neatly without slipping.",

  {

    ],
    "front": "Securing a halyard on a cleat (loop method)",
    "back": "Coil the halyard starting AT THE CLEAT and working away. (1) Pass a hand through the coil and grab the rope coming from the cleat. (2) Pull a bight through the coil. (3) Twist the bight and drop it over the top of the cleat. Pulls the coil down tight.",
    "why": "A loose halyard coil can fall and unravel in a flogging sail, fouling everything. This method locks the entire coil onto the cleat. Standard professional finish on every halyard.",

  },
  {

    "cat": "Knots",
    "subcat": "Coiling & throwing",
    "levels": [
      "CC"
    ],
    "front": "Why coil halyards starting AT the cleat",
    "back": "If you coil from the loose end working back to the cleat, every twist gets locked in by the cleat — you end up with a tangle. Starting at the cleat and working outward, twists run out the free end and the coil lies flat.",
    "why": "Counter-intuitive but critical. New sailors do this backwards constantly and end up fighting tangled halyards in 25 knots. Practise it dockside.",
    "danish": "Begynd ved klampen",

  },
  {

    "cat": "Knots",
    "subcat": "Coiling & throwing",
    "levels": [
      "CC"
    ],
    "front": "Throwing a heaving line — split coil",
    "back": "Coil the line. Split the coil into TWO HALVES, holding one half in each hand with slack between them. Throw the first half toward the target; the second half pays out cleanly behind it. Doubles your range vs. throwing a whole coil.",
    "why": "A whole coil tossed all at once stops dead in the air after a few metres — the trailing rope drags the leading edge down. Split-coil throwing means the second half is feeding line as the first flies, so the throw extends much further.",

    "src": "RYA-CC",

  },
  {

    "subcat": "Coiling & throwing",

    ],
    "front": "Aiming a thrown line",
    "back": "Aim FOR THE PERSON'S CHEST, not their hands or the dock. A line landing across them is easier to grab than one bouncing past their feet. Yell \"ROPE!\" before throwing — surprise + a flying rope = a bad combination.",
    "why": "The thrower can't see exactly where their line will land. Aiming high (chest height) gives the catcher more reaction time and a longer window to grab. Hands-only targets are too small.",

  {

    "subcat": "Coiling & throwing",

    "front": "Sweating up a halyard (without a winch)",
    "back": "Two-person technique to add tension. Person A holds the line vertically against the mast at the cleat. Person B grabs the halyard above and pulls it sideways AWAY from the mast (perpendicular to the line). Person A takes up the slack at the cleat as the line springs back.",

  {

    "cat": "Knots",
    "subcat": "Cleats & jammers",
    "levels": [
      "CC"
    ],
    "front": "Why never wrap rope around your hand",
    "back": "A loaded line that suddenly accelerates (sheet flogging, halyard slipping under wind load) can pull a wrapped hand into a winch or block fast enough to remove fingers. Always grip with the hand OPEN and wrapped only around the line, never with the line around your wrist or palm.",
    "why": "A boat under sail can develop loads of hundreds of kg on a single line. Human strength is irrelevant against that. The instant the line moves, anything looped around flesh goes with it. This is the most common serious sailing injury.",
    "danish": "Aldrig tovet om hånden",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k25",
    "cat": "Knots",
    "subcat": "Cleats & jammers",
    "levels": [
      "CC"
    ],
    "front": "Cam cleat — how it works and how to release",
    "back": "A cam cleat has two spring-loaded toothed jaws. Pull the rope UP into the jaws to lock it. To release: pull the rope DOWN sharply, OUT of the jaws. NEVER try to pry the line sideways out under load — fingers can be trapped.",
    "why": "Cams hold under load by friction increasing as the rope is pulled tighter. Releasing requires breaking that friction by pulling the line clear in the right direction. Releasing under heavy load is risky; ease load first if possible.",
    "danish": "Camklampe",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k26",
    "cat": "Knots",
    "subcat": "Cleats & jammers",
    "levels": [
      "CC"
    ],
    "front": "Rope jammers — closed and open",
    "back": "A rope jammer (clutch) is a one-way grip that lets line travel one direction (usually toward the winch) but locks against the other. CLOSED jammer = locks line. OPEN jammer = line free to run. Multiple jammers let one winch service several halyards/control lines.",
    "why": "Clutches let one winch handle five or six lines (each with its own jammer). You winch line A tight, close its jammer, open jammer B, winch line B, etc. Cockpit gets simpler with fewer winches needed.",
    "danish": "Tovklemmer",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k27",
    "cat": "Knots",
    "subcat": "Cleats & jammers",
    "levels": [
      "CC"
    ],
    "front": "Releasing a jammer under load — proper sequence",
    "back": "(1) Take a few wraps of the line on a winch BEHIND the jammer. (2) Hold tension on the winch with one hand. (3) Open the jammer with the other hand — the winch now holds the load. (4) Ease line off the winch in controlled fashion.",
    "why": "Opening a loaded jammer without winch backup means the rope rips through, possibly burning your hand or running uncontrollably. Always transfer load to the winch first.",
    "danish": "Frigøre en klemme under last",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k28",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "Loading a winch — direction",
    "back": "ALWAYS clockwise (looking down at the drum from above). Winches are designed to be turned clockwise; loading anti-clockwise won't work and can damage the ratchet pawls. Two or three full turns around the drum before adding the handle.",
    "why": "The ratchet inside the winch only engages clockwise rotation. Anti-clockwise loading either spins free or jams the mechanism. Standard convention on every modern boat.",
    "danish": "Vinde med uret",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k29",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "How many wraps around a winch?",
    "back": "Light load: 2 wraps. Heavy load (loaded jib sheet, big breeze): 3 wraps. With self-tailing, the upper jaws hold the tail; without, a crew member must \"tail\" by hand. Adding wraps under load: feed in from below as the drum turns.",
    "why": "Each wrap multiplies grip via friction (capstan equation — tension grows exponentially with wraps). Too few wraps and the line slips; too many and the wraps pile up and jam (\"riding turn\"). 3 is a typical safe number.",
    "danish": "Antal vindinger",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k30",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "Riding turn — what it is and how to fix",
    "back": "A riding turn is when one wrap of line on a winch overrides another, jamming the line on the drum so it can't be eased. Caused by too many wraps, an angle that's too low, or a tail allowed to feed over the top. Fix: use a rolling hitch on the loaded part, transfer load to a second winch, then unwind the jam.",
    "why": "Riding turns happen at the worst times — flogging sail, big breeze. The rolling hitch trick is what turns a crisis into a 60-second fix. Practise it dockside.",
    "danish": "Overslag på spil",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k31",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "Self-tailing winch",
    "back": "Has a grooved jaw assembly above the drum that grips the line's tail. One person can both crank and tension without a separate \"tailer\". Feed the line into the jaw guide; the jaws bite as load applies.",
    "why": "On a single-handed boat or with small crew, self-tailing is essential. On a fully crewed racing boat, a dedicated tailer can pull faster and adjust grip — so racing winches often aren't self-tailing.",
    "danish": "Selvbedøvende spil",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k32",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "Two-speed winch — how to use",
    "back": "Most winches have two gears. Turn the handle one direction = high gear (fast, less power, for taking up slack). Turn the OTHER direction = low gear (slow, more power, for the last few centimetres under load). Don't fight a heavy load in high gear.",
    "why": "Switching to low gear at the moment of high load is the difference between effortless trim and exhausting struggle. The handle just reverses; the drum keeps turning the same way.",
    "danish": "To-gears spil",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "k33",
    "cat": "Knots",
    "subcat": "Winches",
    "levels": [
      "CC"
    ],
    "front": "Easing a line off a winch — flat hand",
    "back": "Hold the tail with a FLAT, OPEN hand pressed against the line and drum, NEVER with fingers wrapped around. Let line slip through controlled. The friction of your palm regulates speed.",
    "why": "A wrapped hand can be pulled into the winch by a sudden surge. A flat hand has no part the line can grip — at worst you let go and the line runs free. Worst case is much better than losing fingers.",

    "front": "Whipping the end of a rope",
    "back": "Wrapping fine twine tightly around a rope's end to prevent fraying. Most modern boats just heat-shrink or melt synthetic rope ends instead — but knot tests still ask. Common whipping: bind twine in tight wraps over a doubled-back loop, then pull the loop through to lock.",
    "why": "A frayed rope end can't be threaded through a block or sheave. Whipping is the traditional fix; melting (for synthetic only) is the modern shortcut. Natural fibre rope must be whipped — heat doesn't fuse it.",

    ],
    "front": "Stopper knots at the end of every working line",
    "back": "Every sheet, halyard, and control line should have a stopper knot (figure-eight) at its end. Without one, an over-eased sheet can fly out of its block in a flogging sail and you've lost control of that sail entirely.",
    "why": "In a knockdown or accidental gybe, you sometimes need to ease a sheet completely. Without a stopper, the line escapes the cockpit and the sail flogs uncontrolled — damage to rig, possibly to crew, and a recovery procedure that can take 10+ minutes. The stopper is 2 seconds of insurance.",

    "front": "Geostrophic wind — what is it?",

    "why": "Without Coriolis, wind would blow in straight lines from high to low pressure (and tornadoes wouldn't spin). The deflection sets up the rotational pattern of weather systems and explains why isobars form closed loops around highs and lows rather than just radiating out.",

    "back": "Most marine diesels are indirect (closed) cooled. Fresh water + antifreeze circulates through the engine block, kept cool by a heat exchanger. Raw (sea) water flows through the heat exchanger then exits via the exhaust. Direct raw-water cooling exists but corrodes faster — uncommon on modern engines.",

        "text": "Lead the line up and over to make a figure-eight: cross diagonally over the top of the cleat to the far horn."
      },

        "n": 3,
        "text": "Continue the figure-eight back across to the near horn — one or two crossings depending on line size and load."
      },

        "n": 4,
        "text": "Form a locking hitch: twist the line so the tail tucks UNDER the last cross, with the tail pointing back along the standing part."

    "front": "Pilotage vs navigation — what's the distinction and when do you switch?",
    "back": "Navigation = open-water work using charts, compass, fixes, EP/DR. Pilotage = close-water work using visual references (transits, leading lines, marks) directly, without plotting. You switch to pilotage mode roughly when you can see the marks that define the channel — typically the last few miles into harbour. The shift means eyes-up, head out of the chart, and a prepared sequence rather than running calculations on the fly.",
    "why": "Day Skipper-level distinction. New skippers often try to keep navigating (plotting fixes) when conditions demand pilotage (visual recognition). The mistake is operational, not knowledge — they have the information but apply the wrong mode.",

    "front": "Leading lines (ledelinjer) — how do they work and why are they better than a single bearing?",
    "back": "A leading line is two charted marks (often a pair of lit beacons) arranged so that when they appear vertically aligned from your position, you're on a precise line — usually the safe approach into harbour. Better than a single bearing because: (1) no compass error possible — it's purely visual, (2) error is angular, so you see deviation immediately, (3) precision improves as you approach (geometry tightens). Stay on the line until clear of the hazard the line was designed to guide you past. See also card n08 — transits are the general principle, leading lines are the charted/lit version.",
    "why": "The most accurate single tool in pilotage. Compass-bearing fixes have ±2° of inherent error; a transit/leading line has zero — either the marks are aligned or they aren't.",

    "front": "Clearing bearings — what are they and how do you use them?",
    "back": "A clearing bearing is a pre-planned compass bearing to a charted mark such that as long as your actual bearing to the mark stays on the safe side of that number, you're clear of a known hazard. Example: 'keep the lighthouse on a bearing of more than 270°M and you'll clear the reef.' You don't have to plot anything underway — just glance at the hand-bearing compass periodically. Use 'NLT' (not less than) or 'NMT' (not more than) on the pilotage plan to make the safe side unambiguous.",

    "back": "Compare echo-sounder reading to charted depth at your assumed position (corrected for tide). If they match, your position is consistent. If they don't, something's wrong — either you're not where you think, or the tidal correction is off. Most useful: (1) running along a depth contour (e.g. 'follow the 10m line into the bay'), (2) confirming you've crossed a known feature (a bar, a hole), (3) the only available check at night or in poor visibility when marks aren't visible. Echo-sounder reads from the transducer; know your transducer-to-keel and transducer-to-waterline offsets.",

    "front": "Sectored leading lights — how do the colour sectors work?",
    "back": "A sector light shows different colours depending on the bearing from which you view it. Standard IALA convention: white = on the safe approach line, red = port (left) of the safe sector, green = starboard (right) of the safe sector. So if you see red, you've drifted to port of the line and need to come right to recover white. The colour boundary is sharp at the sector edge but you may see a brief mixed appearance right at the cusp. Sector limits and ranges are charted and listed in the Light List.",

    "back": "Before approaching an unfamiliar harbour, the pilot book (e.g. Imray, Reeds, Den Danske Havnelods) should give you: (1) approach hazards — shoals, rocks, restricted areas, (2) leading lines and marks with bearings, (3) tidal stream behaviour in the approach, (4) least depth in the channel and at low water, (5) marina layout, visitor berths, contact channel/phone, (6) prevailing wind effects (gusts off cliffs, fetch in bay), (7) holding ground if anchoring, (8) shoreside facilities and access. Read it the night before, mark the chart, build the pilotage plan. Don't wait until you're closing on the harbour.",

    "back": "(Heuristic.) Don't read forecasts as predictions; read them as probability distributions. Practical method: (1) look at the synoptic chart, not just the surface forecast — fronts, lows, isobar spacing tell you the system, not just one day's wind. (2) Check multiple sources (DMI, Met Office, Windy/ECMWF) and look for agreement; disagreement means uncertainty. (3) Look at how the forecast has changed over the last 24-48h — if it's been stable, trust it more; if it's wobbling, trust it less. (4) For passage planning, you need a window covering departure + passage duration + a buffer for delay. (5) Note the direction of degradation — is it 'might be windier than forecast' or 'might be fog'? Different responses. (6) Bias toward later departure if the window is marginal — easier to wait than to abort. (7) Treat 'Force 5' near the edge of your boat/crew comfort as 'might be Force 6 or 7' — forecast accuracy drops for stronger winds. (8) Specific to Danish waters: DMI 5-day text forecasts plus marine warnings on www.dmi.dk + the synoptic chart.",

    "front": "Tidal gates — how do you identify them and build the plan around them?",
    "back": "(Heuristic — planning craft.) A tidal gate is a point on the route where you must arrive within a specific tidal window (right state of tide and/or right direction of stream), or you can't safely pass. Typical gates: narrows with strong streams (>2 kts), shallow bars where you need water depth, headlands with overfalls, locks. Method: (1) From the appraisal, mark each gate on the chart with its tidal constraint (e.g. 'pass within 2h of HW Esbjerg' or 'stream must be NE-going'). (2) Work back from the most restrictive gate: when does it open? (3) From that, calculate your required arrival time. (4) From that, calculate your departure time, accounting for distance, speed-made-good, and tide on the way. (5) Build in a margin — 30 min to 1h either side. (6) If you miss the gate, what's the alternative? Wait at anchor for the next cycle? Divert? (7) For passages with multiple gates, the most restrictive one drives the schedule. Cross-ref t15 (tidal gates from a tide-mechanics angle).",

  "COL-1": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 1",
    "text": "(a) These Rules shall apply to all vessels upon the high seas and in all waters connected therewith navigable by seagoing vessels.\n\n(b) Nothing in these Rules shall interfere with the operation of special rules made by an appropriate authority for roadsteads, harbours, rivers, lakes or inland waterways connected with the high seas and navigable by seagoing vessels. Such special rules shall conform as closely as possible to these Rules.\n\n(c) Nothing in these Rules shall interfere with the operation of any special rules made by the Government of any State with respect to additional station or signal lights, shapes or whistle signals for ships of war and vessels proceeding under convoy, or with respect to additional station or signal lights or shapes for fishing vessels engaged in fishing as a fleet. These additional station or signal lights, shapes or whistle signals shall, so far as possible, be such that they cannot be mistaken for any light, shapes or signal authorized elsewhere under these Rules.\n\n(d) Traffic separation schemes may be adopted by the Organization for the purpose of these Rules.\n\n(e) Whenever the Government concerned shall have determined that a vessel of special construction or purpose cannot comply fully with the provisions of any of these Rules with respect to the number, position, range or arc of visibility of lights or shapes, as well as to the disposition and characteristics of sound-signalling appliances, such vessel shall comply with such other provisions in regard to the number, position, range or arc of visibility of lights or shapes, as well as to the disposition and characteristics of sound-signalling appliances, as her Government shall have determined to be the closest possible compliance with these Rules in respect to that vessel.",
    "title": "COLREGs Rule 1",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-10": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 10",
    "text": "(a) This Rule Applies to traffic separation schemes adopted by the Organization and does not relieve any vessel of her obligation under any other rule.\n\n(b) A vessel using a traffic separation scheme shall:\n\n(i)   proceed in the appropriate traffic lane in the general direction of traffic flow for that lane;\n(ii) so far as practicable keep clear of a traffic separation line or separation zone;\n(iii) normally join or leave a traffic lane at the termination of the lane, but when joining or leaving from either side shall do so at as small an angle to the general direction of traffic flow as practicable.\n\n(c) A vessel shall so far as practicable avoid crossing traffic lanes, but if obliged to do so shall cross on a heading as nearly as practicable at right angles to the general direction of traffic flow.\n\n(d)\n\n(i)  A vessel shall not use an inshore traffic zone when she can safely use the appropriate traffic lane within the adjacent traffic separation scheme. However, vessels of less than 20 meters in length, sailing vessels and vessels engaged in fishing may use the inshore traffic zone.\n(ii) Notwithstanding subparagraph (d) (i), a vessel may use an inshore traffic zone when en route to or from a port, offshore installation or structure, pilot station or any other place situated within the inshore traffic zone, or to avoid immediate danger.\n\n(e) A vessel, other than a crossing vessel, or a vessel joining or leaving a lane shall not normally enter a separation zone or cross a separation line except:\n\n(i) in cases of emergency to avoid immediate danger;\n(ii) to engage in fishing within a separation zone.\n\n(f) A vessel navigating in areas near the terminations of traffic separation schemes shall do so with particular caution.\n\n(g) A vessel shall so far as practicable avoid anchoring in a traffic separation scheme or in areas near its terminations.\n\n(h) A vessel not using a traffic separation scheme shall avoid it by as wide a margin as is practicable.\n\n(i) A vessel engaged in fishing shall not impede the passage of any vessel following a traffic lane.\n\n(j) A vessel of less than 20 meters in length or a sailing vessel shall not impede the safe passage of a power-driven vessel following a traffic lane.\n\n(k) A vessel restricted in her ability to manoeuvre when engaged in an operation for the maintenance of safety of navigation in a traffic separation scheme is exempted from complying with this Rule to the extent necessary to carry out the operation.\n\n(l) A vessel restricted in her ability to manoeuvre when engaged in an operation for the laying, servicing or picking up of a submarine cable, within a traffic separation scheme, is exempted from complying with this Rule to the extent necessary to carry out the operation.\n\nSECTION II CONDUCT OF VESSELS IN SIGHT OF ONE ANOTHER",
    "title": "COLREGs Rule 10",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-11": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 11",
    "text": "Rules in this Section apply to vessels in sight of one another.",
    "title": "COLREGs Rule 11",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-12": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 12",
    "text": "(a) When two sailing vessels are approaching one another, so as to involve risk of collision, one of them shall keep out of the way of the other as follows;\n\n(i) when each has the wind on a different side, the vessel which has the wind on the port side shall keep out of the way of the other;\n(ii) when both have the wind on the same side, the vessel which is to windward shall keep out of the way of the vessel which is to leeward;\n(iii) if a vessel with the wind on the port side sees a vessel to windward and cannot determine with certainty whether the other vessel has the wind on the port or on the starboard side, she shall keep out of the way of the other.\n\n(b) For the purposes of this Rule the windward side shall be deemed to be the side opposite to that on which the mainsail is carried or, in the case of a square-rigged vessel, the side opposite to that on which the largest fore-and-aft sail is carried.",
    "title": "COLREGs Rule 12",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-13": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 13",
    "text": "(a) Notwithstanding anything contained in the Rules of Part B, Sections I and II any vessel overtaking any other shall keep out of the way of the vessel being overtaken.\n\n(b) A vessel shall be deemed to be overtaking when coming up with another vessel from a direction more than 22.5 degrees abaft her beam, that is, in such a position with reference to the vessel she is overtaking, that at night she would be able to see only the sternlight of that vessel but neither of her sidelights.\n\n(c) When a vessel is in any doubt as to whether she is overtaking another, she shall assume that this is the case and act accordingly.\n\n(d) Any subsequent alteration of the bearing between the two vessels shall not make the overtaking vessel a crossing vessel within the meaning of these Rules or relieve her of the duty of keeping clear of the overtaken vessel until she is finally past and clear.",
    "title": "COLREGs Rule 13",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-14": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 14",
    "text": "(a) When two power-driven vessels are meeting on reciprocal or nearly reciprocal courses so as to involve risk of collision each shall alter her course to starboard so that each shall pass on the port side of the other.\n\n(b) Such a situation shall be deemed to exist when a vessel sees the other ahead or nearly ahead and by night she could see the masthead lights of the other in a line or nearly in a line and/or both sidelights and by day she observes the corresponding aspect of the other vessel.\n\n(c) When a vessel is in any doubt as to whether such a situation exists she shall assume that it does exist and act accordingly.",
    "title": "COLREGs Rule 14",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-15": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 15",
    "text": "When two power-driven vessels are crossing so as to involve risk of collision, the vessel which has the other on her own starboard side shall keep out of the way and shall, if the circumstances of the case admit, avoid crossing ahead of the other vessel.",
    "title": "COLREGs Rule 15",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-16": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 16",
    "text": "Every vessel which is directed to keep out of the way of another vessel shall, so far as possible, take early and substantial action to keep well clear.",
    "title": "COLREGs Rule 16",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-17": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 17",
    "text": "(a)\n\n(i) Where one of two vessels is to keep out of the way the other shall keep her course and speed.\n(ii) The latter vessel may however take action to avoid collision by her manoeuvre alone, as soon as it becomes apparent to her that the vessel required to keep out of the way is not taking appropriate action in compliance with these Rules.\n\n(b) When, from any cause, the vessel required to keep her course and speed finds herself so close that collision cannot be avoided by the action of the give-way vessel alone, she shall take such action as will best aid to avoid collision.\n\n(c) A power-driven vessel which takes action in a crossing situation in accordance with sub-paragraph\n(a)(ii) of this Rule to avoid collision with another power-driven vessel shall, if the circumstances of the case admit, not alter course to port for a vessel on her own port side.\n\n(d) This Rule does not relieve the give-way vessel of her obligation to keep out of the way",
    "title": "COLREGs Rule 17",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-18": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 18",
    "text": "(The new paragraph (f) shall enter into force on 29 November 2003, as amended by Resolution A.919(22))\n\nExcept where Rules 9, 10 and 13 otherwise require:\n\n(a) A power-driven vessel underway shall keep out of the way of:\n\n(i) a vessel not under command;\n(ii) a vessel restricted in her ability to manoeuvre;\n(iii) a vessel engaged in fishing;\n(iv) a sailing vessel.\n\n(b) A sailing vessel underway shall keep out of the way of:\n\n(i) a vessel not under command;\n(ii) a vessel restricted in her ability to manoeuvre;\n(iii) a vessel engaged in fishing.\n\n(c) A vessel engaged in fishing when underway shall, so far as possible, keep out of the way of:\n\n(i) a vessel not under command;\n(ii) a vessel restricted in her ability to manoeuvre.\n\n(d)\n\n(i)  Any vessel other than a vessel not under command or a vessel restricted in her ability to manoeuvre shall, if the circumstances of the case admit, avoid impeding the safe passage of a vessel constrained by her draught, exhibiting the signals in Rule 28.\n(ii) A vessel constrained by her draught shall navigate with particular caution having full regard to her special condition.\n\n(e) A seaplane on the water shall, in general, keep well clear of all vessels and avoid impeding their navigation. In circumstances, however, where risk of collision exists, she shall comply with the Rules of this Part.\n\n(f)\n\n(i) A WIG craft shall, when taking off, landing and in flight near the surface, keep well clear of all other vessels and avoid impeding their navigation;\n(ii) a WIG craft operating on the water surface shall comply with the Rules of this Part as a power-driven vessel.\n\nSection III-Conduct of Vessels in Restricted Visibility",
    "title": "COLREGs Rule 18",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-19": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 19",
    "text": "(a) This Rule applies to vessels not in sight of one another when navigating in or near an area of restricted visibility.\n\n(b) Every vessel shall proceed at a safe speed adapted to the prevailing circumstances and conditions of restricted visibility. A power-driven vessel shall have engines ready for immediate manoeuvre.\n\n(c) Every vessel shall have due regard to the prevailing circumstances and conditions of restricted visibility when complying with the Rules of Section I of this Part.\n\n(d) A vessel which detects by radar alone the presence of another vessel shall determine if a close- quarters situation is developing and/or risk of collision exists. If so, she shall take avoiding action in ample time, provided that when such action consists of an alteration of course, so far as possible the following shall be avoided:\n\n(i) an alteration of course to port for a vessel forward of the beam, other than for a vessel being overtaken;\n(ii) an alteration of course towards a vessel abeam or abaft the beam.\n(e) Except where it has been determined that a risk of collision does not exist, every vessel which hears apparently forward of her beam the fog signal of another vessel, or which cannot avoid a close quarters situation with another vessel forward of her beam, shall reduce her speed to the minimum at which she can be kept on her course. She shall if necessary take all her way off and in any event navigate with extreme caution until danger of collision is over.",
    "title": "COLREGs Rule 19",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-2": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 2",
    "text": "(a) Nothing in these Rules shall exonerate any vessel, or the owner, master or crew thereof, from the consequences of any neglect to comply with these Rules or of the neglect of any precaution which may be required by the ordinary practice of seamen, or by the special circumstances of the case.\n\n(b) In construing and complying with these Rules due regard shall be had to all dangers of navigation and collision and to any special circumstances, including the limitations of the vessels involved, which may make a departure from these Rules necessary to avoid immediate danger.",
    "title": "COLREGs Rule 2",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-21": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 21",
    "text": "(a) 'Masthead light' means a white light placed over the fore and aft centerline of the vessel showing an unbroken light over an arc of the horizon of 225 degrees and so fixed as to show the light from right ahead to 22.5 degrees abaft the beam on either side of the vessel.\n\n(b) 'Sidelights' means a green light on the starboard side and a red light on the port side each showing an unbroken light over an arc of the horizon of 112.5 degrees and so fixed as to show the light from right ahead to 22.5 degrees abaft the beam on its respective side. In a vessel of less than 20 meters in length the sidelights may be combined in one lantern carried on the fore and aft centreline of the vessel.\n\n(c) 'Sternlight' means a white light placed as nearly as practicable at the stern showing an unbroken light over an arc of the horizon of 135 degrees and so fixed as to show the light 67.5 degrees from right aft on each side of the vessel.\n\n(d) 'Towing light' means a yellow light having the same characteristics as the 'sternlight' defined in paragraph(c) of this Rule.\n\n(e) 'All round light' means a light showing an unbroken light over an arc of the horizon of 360 degrees.\n\n(f) 'Flashing light' means a light flashing at regular intervals at a frequency of 120 flashes or more per minute.",
    "title": "COLREGs Rule 21",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-23": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 23",
    "text": "(The new paragraph (c) shall enter into force on 29 November 2003, as amended by Resolution A.919(22))\n\n(a) A power-driven vessel underway shall exhibit:\n\n(i) a masthead light forward;\n\n(ii) a second masthead light abaft of and higher than the forward one; except that a vessel of less than 50 meters in length shall not be obliged to exhibit such light but may do so;\n\n(iii) sidelights;\n\n(iv) a sternlight.\n\n(b) An air-cushion vessel when operating in the non-displacement mode shall, in addition to the lights prescribed in paragraph (a) of this Rule exhibit an all-round flashing yellow light.\n\n(c) A WIG craft only when taking off, landing and in flight near the surface shall, in addition to the lights prescribed in paragraph (a) of this Rule, exhibit a high intensity all-round flashing red light.\n\n(d)\n\n(i) A power-driven vessel of less than 12 meters in length may in lieu of the lights prescribed in paragraph (a) of this Rule exhibit an all-round white light and sidelights:\n\n(ii) a power-driven vessel of less than 7 meters in length whose maximum speed does not exceed 7 knots may in lieu of the lights prescribed in paragraph (a) of\n\nthis Rule exhibit an all-round white light and shall, if practicable, also exhibit sidelights;\n\n(iii) the masthead light or all-round white light on a power-driven vessel of less than 12 meters in length may be displaced from the fore and aft centreline of the vessel if centreline fitting is not practicable, provided that the sidelights are combined in one lantern which shall be carried on the fore and aft centreline of the vessel or located as nearly as practicable in the same fore and aft line as the masthead light or the all-round white light.",
    "title": "COLREGs Rule 23",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-25": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 25",
    "text": "(a) A sailing vessel underway shall exhibit:\n\n(i) sidelights;\n\n(ii) a sternlight.\n\n(b) In a sailing vessel of less than 20 metres in length the lights prescribed in paragraph (a) of this Rule may be combined in one lantern carried at or near the top of the mast where it can best be seen.\n\n(c) A sailing vessel underway may, in addition to the lights prescribed in paragraph\n(a) of this Rule, exhibit at or near the top of the mast, where they can best be seen, two all-round lights in a vertical line, the upper being red and the lower green, but these lights shall not be exhibited in conjunction with the combined lantern permitted by paragraph (b) of this Rule.\n\n(d)\n\n(i) A sailing vessel of less than 7 metres in length shall, if practicable, exhibit the lights prescribed in paragraph (a) or (b) of this Rule, but if she does not, she shall have ready at hand an electric torch or lighted lantern showing a white light which shall be exhibited in sufficient time to prevent collision.\n\n(ii) A vessel under oars may exhibit the lights prescribed in this Rule for sailing vessels, but if she does not, she shall have ready at hand an electric torch or lighted lantern showing a white light which shall be exhibited in sufficient time to prevent collision.\n\n(e) A vessel proceeding under sail when also being propelled by machinery shall exhibit forward where it can best be seen a conical shape, apex down wards.",
    "title": "COLREGs Rule 25",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-26": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 26",
    "text": "(a) A vessel engaged in fishing, whether underway or at anchor, shall exhibit only the lights and shapes prescribed in this Rule.\n\n(b) A vessel when engaged in trawling, by which is meant the dragging through the water of a dredge net or other apparatus used as a fishing appliance, shall exhibit:\n\n(i) two all-round lights in a vertical line, the upper being green and the lower white, or a shape consisting of two cones with their apexes together in a vertical line one above the other;\n\n(ii) a masthead light abaft of and higher than the all-round green light; a vessel of less than 50 metres in length shall not be obliged to exhibit such a light but may do so;\n\n(iii) when making way through the water, in addition to the lights prescribed in this paragraph, sidelights and a sternlight.\n\n(c) A vessel engaged in fishing, other than trawling, shall exhibit:\n\n(i) two all-round lights in a vertical line, the upper being red and the lower white, or a shape consisting of two cones with apexes together in a vertical line one above the other;\n\n(ii) when there is outlying gear extending more than 150 metres horizontally from the vessel, an all-round white light or a cone apex upwards in the direction of the gear;\n\n(iii) when making way through the water, in addition to the lights prescribed in this paragraph, sidelights and a sternlight.\n\n(d) The additional signals described in Annex II to these Regulations apply to a vessel engaged in fishing in close proximity to other vessels engaged in fishing.\n\n(e) A vessel when not engaged in fishing shall not exhibit the lights or shapes prescribed in this Rule, but only those prescribed for a vessel of her length.",
    "title": "COLREGs Rule 26",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-27": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 27",
    "text": "(a) A vessel not under command shall exhibit:\n\n(i) two all-round red lights in a vertical line where they can best be seen;\n\n(ii) two balls or similar shapes in a vertical line where they can best be seen;\n\n(iii) when making way through the water, in addition to the lights prescribed in this paragraph, sidelights and a sternlight.\n\n(b) A vessel restricted in her ability to manoeuvre, except a vessel engaged in mineclearance operations, shall exhibit:\n\n(i) three all-round lights in a vertical line where they can best be seen. The highest and lowest of these lights shall be red and the middle light shall be white;\n\n(ii) three shapes in a vertical line where they can best be seen. The highest and lowest of these shapes shall be balls and the middle one a diamond;\n\n(iii) when making way through the water, a masthead light or lights, sidelights and a sternlight in addition to the lights prescribed in subparagraph (i);\n\n(iv) when at anchor, in addition to the lights or shapes prescribed in sub- paragraphs (i) and (ii), the light, lights or shape prescribed in Rule 30.\n\n(c) A power-driven vessel engaged in a towing operation such as severely restricts the towing vessel and her tow in their ability to deviate from their course shall, in addition to the lights or shapes prescribed in Rule 24(a), exhibit the lights or shapes prescribed in sub-paragraphs (b)(i) and (ii) of this Rule.\n\n(d) A vessel engaged in dredging or underwater operations, when restricted in her ability to manoeuvre, shall exhibit the lights and shapes prescribed in sub-paragraphs\n(b) (i),(ii) and (iii) of this Rule and shall in addition, when an obstruction exists, exhibit:\n\n(i) two all-round red lights or two balls in a vertical line to indicate the side on which the obstruction exists;\n\n(ii) two all-round green lights or two diamonds in a vertical line to indicate the side on which another vessel may pass;\n\n(iii) when at anchor, the lights or shapes prescribed in this paragraph instead of the lights or shape prescribed in Rule 30.\n\n(e) Whenever the size of a vessel engaged in diving operations makes it impracticable to exhibit all lights and shapes prescribed in paragraph (d) of this Rule, the following shall be exhibited:\n\n(i) three all-round lights in a vertical line where they can best be seen. The highest and lowest of these lights shall be red and the middle light shall be white;\n\n(ii) a rigid replica of the International Code flag \"A\" not less than 1 metre in height. Measures shall be taken to ensure its all-round visibility.\n\n(f) A vessel engaged in mineclearance operations shall in addition to the lights prescribed for a power-driven vessel in Rule 23 or to the lights or shape prescribed for a vessel at anchor in Rule 30 as appropriate, exhibit three all-round green lights or three balls. One of these lights or shapes shall be exhibited near the foremast head and one at each end of the fore yard. These lights or shapes indicate that it is dangerous for another vessel to approach within 1000 metres of the mineclearance vessel.\n\n(g) Vessels of less than 12 metres in length, except those engaged in diving operations, shall not be required to exhibit the lights and shapes prescribed in this Rule.\n\n(h) The signals prescribed in this Rule are not signals of vessels in distress and requiring assistance. Such signals are contained in Annex IV to these Regulations",
    "title": "COLREGs Rule 27",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-29": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 29",
    "text": "(a) A vessel engaged on pilotage duty shall exhibit:\n\n(i) at or near the masthead, two all-round lights in a vertical line, the upper being white and the lower red;\n\n(ii) when underway, in addition, sidelight and a sternlight;\n\n(iii) when at anchor, in addition to the lights prescribed in subparagraph (i), the light, lights or shape prescribed in Rule 30 for vessels at anchor.\n\n(b) A pilot vessel when not engaged on pilotage duty shall exhibit the lights or shapes prescribed for a similar vessel of her length.",
    "title": "COLREGs Rule 29",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-3": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 3",
    "text": "(A amended paragraph (a) and a new paragraph (m) shall enter into force on 29 November 2003, as amended by Resolution A.919(22))\n\nFor the purpose of these Rules, except where the context otherwise requires:\n\n(a) The word 'vessel includes every description of water craft, including non- displacement craft, WIG craft and seaplanes, used or capable of being used as a means of transportation on water'.\n\n(b) The term 'power-driven vessel' means any vessel propelled by machinery.\n\n(c) The term 'sailing vessel' means any vessel under sail provided that propelling machinery, if fitted, is not being used.\n\n(d) The term 'vessel engaged in fishing' means any vessel fishing with nets, lines, trawls or other fishing apparatus which restrict manoeuvrability, but does not include a vessel fishing with trolling lines or other fishing apparatus which do not restrict manoeuvrability.\n\n(e) The word 'seaplane' includes any aircraft designed to manoeuvre on the water.\n\n(f) The term 'vessel not under command' means a vessel which through some exceptional circumstance is unable to manoeuvre as required by these Rules and is therefore unable to keep out of the way of another vessel.\n\n(g) The term 'vessel restricted in her ability to manoeuvre' means a vessel which from the nature of her work is restricted in her ability to manoeuvre as required by these Rules and therefore is unable to keep out of the way of another vessel.\n\nThe term 'vessels restricted in their ability to manoeuvre' shall include but not be limited to;\n\n(i)    a vessel engaged in laying, servicing or picking up a navigation mark, submarine cable or pipeline;\n(ii) a vessel engaged in dredging, surveying or underwater operations;\n(iii) a vessel engaged in replenishment or transferring persons, provisions or cargo while underway;\n(iv) a vessel engaged in the launching or recovery of aircraft;\n(v) a vessel engaged in mineclearance operations;\n(vi) a vessel engaged in a towing operation such as severely restricts the towing vessel and her tow in their ability to deviate from their course.\n(h) The term 'vessel constrained by her draught' means a power-driven vessel which because of her draught in relation to the available depth and width of navigable water, is severely restricted in her ability to deviate from the course she is following.\n\n(i) The word 'underway' means that a vessel is not at anchor, or made fast to the shore, or aground.\n\n(j) The words 'length' and 'breadth' of a vessel mean her length overall and greatest breadth.\n\n(k) Vessels shall be deemed to be in sight of one another only when one can be observed visually from the other.\n\n(l) The term 'restricted visibility' means any condition in which visibility is restricted by fog, mist, falling snow, heavy rainstorms, sandstorms or any other similar causes.\n\n(m) The term 'Wing-In-Ground (WIG) craft' means a multimodal craft which, in its main operational mode, flies in close proximity to the surface by utilizing surface- effect action.",
    "title": "COLREGs Rule 3",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-30": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 30",
    "text": "(a) A vessel at anchor shall exhibit where it can best be seen:\n\n(i) in the fore part, an all-round white light or one ball;\n\n(ii) at or near the stern and at a lower level than the light prescribed in sub- paragraph (i), an all-round white light\n\n(b) A vessel of less than 50 metres in length may exhibit an all-round white light where it can best be seen instead of the lights prescribed in paragraph (a) of this Rule.\n\n(c) A vessel at anchor may, and a vessel of 100 metres and more in length shall, also use the available working or equivalent lights to illuminate her decks.\n\n(d) A vessel aground shall exhibit the lights prescribed in paragraph (a) or (b) of this Rule and in addition, where they can best be seen:\n\n(i) two all-round red lights in a vertical line;\n\n(ii) three balls in a vertical line.\n\n(e) A vessel of less than 7 metres in length, when at anchor, not in or near a narrow channel, fairway or anchorage, or where other vessels normally navigate, shall not be required to exhibit the lights or shape prescribed in paragraphs (a), (b) of this Rule.\n\n(f) A vessel of less than 12 metres in length, when aground, shall not be required to exhibit the lights or shapes prescribed in sub-paragraphs (d)(i) and (ii) of this Rule.",
    "title": "COLREGs Rule 30",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-32": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 32",
    "text": "(a) The word 'whistle' means any sound signalling appliance capable of producing the prescribed blasts and which complies with the specifications in Annex III to these Regulations.\n\n(b) The term 'short blast' means a blast of about one second's duration.\n\n(c) The term 'prolonged blast' means a blast of from four to six seconds's duration.",
    "title": "COLREGs Rule 32",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-34": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 34",
    "text": "(a) When vessels are in sight of one another, a power-driven vessel underway, when manoeuvring as authorized or required by these Rules, shall indicate that manoeuvre by the following signals on her whistle:\n\n- one short blast to mean 'I am altering my course to starboard ';\n\n- two short blasts to mean 'I am altering my course to port ';\n\n- three short blasts to mean 'I am operating astern propulsion'.\n\n(b) Any vessel may supplement the whistle signals prescribed in paragraph (a) of this Rule by light signals, repeated as appropriate, whilst the manoeuvre is being carried out:\n\n(i) these light signals shall have the following significance:\n\n- one flash to mean 'I am altering my course to starboard ';\n\n- two flashes to mean 'I am altering my course to port ';\n\n- three flashes to mean 'I am operating astern propulsion';\n\n(ii)     the duration of each flash shall be about one second, the interval between flashes shall be about one second, and the interval between successive signals shall be not less than ten seconds;\n\n(iii) the light used for this signals shall, if fitted, be an all-round white light, visible at a minimum range of 5 miles and shall comply with the provisions of Annex I to these Regulations.\n\n(c) When in sight of one another in a narrow channel or fairway:\n\n(i)       a vessel intending to overtake another shall in compliance with Rule 9(e) (i) indicate her intention by the following signals on her whistle :\n\n- two prolonged blasts followed by one short blast to mean 'I intend to overtake you on your starboard side';\n\n- two prolonged blasts followed by two short blasts to mean 'I intend to overtake you on your port side';\n\n(ii)      the vessel about to be overtaken when acting in accordance with Rule 9(e)(i) shall indicate her agreement by the following signal on her whistle:\n\n- one prolonged, one short, one prolonged and one short blast, in that order.\n\n(d) When vessels in sight of one another are approaching each other and from any cause either vessel fails to understand the intentions or actions of the other, or is in\n\ndoubt whether sufficient action is being taken by the other to avoid collision, the vessel in doubt shall immediately indicate such doubt by giving at least five short and rapid blasts on the whistle. Such signal may be supplemented by a light signal of at least five short and rapid flashes.\n\n(e) A vessel nearing a bend or an area of a channel or fairway where other vessels may be obscured by an intervening obstruction shall sound one prolonged blast. Such signal shall be answered with a prolonged blast by any approaching vessel that may be within hearing around the bend or behind the intervening obstruction.\n\n(f) If whistles are fitted on a vessel at a distance apart of more than 100 metres, one whistle only shall be used for giving manoeuvring and warning signals.",
    "title": "COLREGs Rule 34",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-35": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 35",
    "text": "(A new paragraph (i) shall enter into force on 29 November 2003, as amended by Resolution A.919(22))\n\nIn or near an area of restricted visibility, whether by day or night, the signals prescribed in this Rule shall be used as follows:\n\n(a) A power-driven vessel making way through the water shall sound at intervals of not more than 2 minutes one prolonged blast.\n\n(b) A power-driven vessel underway but stopped and making no way through the water shall sound at intervals of not more than 2 minutes two prolonged blasts in succession with an interval of about 2 seconds between them.\n\n(c) A vessel not under command, a vessel restricted in her ability to manoeuvre, a vessel constrained by her draught, a sailing vessel, a vessel engaged in fishing and a vessel engaged in towing or pushing another vessel shall, instead of the signals prescribed in paragraphs (a) or (b) of this Rule sound at intervals of not more than 2 minutes three blasts in succession, namely one prolonged followed by two short blasts.\n\n(d) A vessel engaged in fishing, when at anchor, and a vessel restricted in her ability to manoeuvre when carrying out her work at anchor, shall instead of the signals prescribed in paragraph (g) of this Rule sound the signal prescribed in paragraph (c) of this Rule.\n\n(e) A vessel towed or if more than one vessel is towed the last vessel of the tow, if manned, shall at intervals of not more than 2 minutes sound four blasts in succession, namely one prolonged followed by three short blasts. When practicable, this signal shall be made immediately after the signal made by the towing vessel.\n\n(f) When a pushing vessel and a vessel being pushed ahead are rigidly connected in a composite unit they shall be regarded as a power-driven vessel and shall give the signals prescribed in paragraphs (a) or (b) of this Rule.\n\n(g) A vessel at anchor shall at intervals of not more than one minute ring the bell rapidly for about 5 seconds. In a vessel of 100 metres or more in length the bell shall be sounded in the forepart of the vessel and immediately after the ringing of the bell the gong shall be sounded rapidly for about 5 seconds in the after part of the vessel. A vessel at anchor may in addition sound three blasts in succession, namely one short, one prolonged and one short blast, to give warning of her position and of the possibility of collision to an approaching vessel.\n\n(h) A vessel aground shall give the bell signal and if required the gone signal prescribed in paragraph (g) of this Rule and shall, in addition, give three separate and distinct strokes on the bell immediately before and after the rapid ringing of the bell. A vessel aground may in addition sound an appropriate whistle signal.\n\n(i) A vessel of 12 metres or more but less than 20 metres in length shall not be obliged to give the bell signals prescribed in paragraphs (g) and (h) of this Rule. However, if she does not, she shall make some other efficient sound signal at intervals of not more than 2 minutes.\n\n(j) A vessel of less than 12 metres in length shall not be obliged to give the above- mentioned signals but, if she does not, shall make some other efficient sound signal at intervals of not more than 2 minutes.\n\n(k) A pilot vessel when engaged on pilotage duty may in addition to the signals prescribed in paragraphs (a), (b) or (g) of this Rule sound an identity signal consisting of four short blasts.",
    "title": "COLREGs Rule 35",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },

    "text": "Rules in this Section apply in any condition of visibility.",
    "title": "COLREGs Rule 4",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"

  "COL-5": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 5",
    "text": "Every vessel shall at all times maintain a proper look-out by sight and hearing as well as by all available means appropriate in the prevailing circumstances and conditions so as to make a full appraisal of the situation and of the risk of collision.",
    "title": "COLREGs Rule 5",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-6": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 6",
    "text": "Every vessel shall at all times proceed at a safe speed so that she can take proper and effective action to avoid collision and be stopped within a distance appropriate to the prevailing circumstances and conditions. In determining a safe speed the following factors shall be among those taken into account:\n\n(a) By all vessels:\n\n(i) the state of visibility;\n(ii) the traffic density including concentrations of fishing vessels or any other vessels;\n(iii) the manoeuvrability of the vessel with special reference to stopping distance and turning ability in the prevailing conditions;\n(iv) at night the presence of background light such as from shore lights or from back scatter of her own lights;\n(v) the state of wind, sea and current, and the proximity of navigational hazards;\n(vi) the draught in relation to the available depth of water.\n\n(b) Additionally, by vessels with operational radar:\n\n(i) the characteristics, efficiency and limitations of the radar equipment;\n(ii) any constraints imposed by the radar range scale in use;\n(iii) the effect on radar detection of the sea state, weather and other sources of interference;\n(iv) the possibility that small vessels, ice and other floating objects may not be detected by radar at an adequate range;\n(v) the number, location and movement of vessels detected by radar;\n(vi) the more exact assessment of the visibility that may be possible when radar is used to determine the range of vessels or other objects in the vicinity.",
    "title": "COLREGs Rule 6",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-7": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 7",
    "text": "(a) Every vessel shall use all available means appropriate to the prevailing circumstances and conditions to determine if risk of collision exists. If there is any doubt such risk shall be deemed to exist.\n\n(b) Proper use shall be made of radar equipment if fitted and operational, including long-range scanning to obtain early warning of risk of collision and radar plotting or equivalent systematic observation of detected objects.\n\n(c) Assumptions shall not be made on the basis of scanty information, especially scanty radar information.\n\n(d) In determining if risk of collision exists the following considerations shall be among those taken into account:\n\n(i) Such risk shall be deemed to exist if the compass bearing of an approaching vessel does not appreciably change;\n(ii) such risk may sometimes exist even when an appreciable bearing change is evident, particularly when approaching a very large vessel or a tow or when approaching a vessel at close range.",
    "title": "COLREGs Rule 7",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-8": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 8",
    "text": "(A amended paragraph (a) shall enter into force on 29 November 2003, as amended by Resolution A.919(22))\n\n(a) Any action to avoid collision shall be taken in accordance with the Rules of this Part and shall, if the circumstances of the case admit, be positive, made in ample time and with due regard to the observance of good seamanship.\n\n(b) Any alteration of course and/or speed to avoid collision, shall, if the circumstances of the case admit, be large enough to be readily apparent to another vessel observing visually or by radar; a succession of small alterations of course and/or speed should be avoided.\n\n(c) If there is sufficient sea room, alteration of course alone may be the most effective action to avoid a close-quarters situation provided that it is made in good time, is substantial and does not result in another close-quarters situation.\n\n(d) Action taken to avoid collision with another vessel shall be such as to result in passing at a safe distance. The effectiveness of the action shall be carefully checked until the other vessel is finally past and clear.\n\n(e) If necessary to avoid collision or allow more to assess the situation, a vessel shall slacken her speed or take all way off by stopping or reversing her means of propulsion.\n\n(f)\n\n(i)   A vessel which, by any of these Rules, is required not to impede the passage or safe passage of another vessel shall, when required by the circumstances of the case, take early action to allow sufficient sea room for the safe passage of the other vessel.\n(ii) A vessel required not to impede the passage or safe passage of another vessel is not relieved of this obligation if approaching the other vessel so as to involve risk of collision and shall, when taking action, have full regard to the action which may be required by the Rules of this part.\n(iii) A vessel the passage of which is not to be impeded remains fully obliged to comply with the rules of this part when the two vessels are approaching one another so as to involve risk of collision.",
    "title": "COLREGs Rule 8",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
  "COL-9": {
    "fullName": "International Regulations for Preventing Collisions at Sea (1972), Rule 9",
    "text": "(a) A vessel proceeding along the course of a narrow channel or fairway shall keep as near to the outer limit of the channel or fairway which lies on her starboard side as is safe and practicable.\n\n(b) A vessel of less than 20 metres in length or a sailing vessel shall not impede the passage of a vessel which can safely navigate only within a narrow channel or fairway.\n\n(c) A vessel engaged in fishing shall not impede the passage of any other vessel navigating within a narrow channel or fairway.\n\n(d) A vessel shall not cross a narrow channel or fairway if such crossing impedes the passage of a vessel which can safely navigate only within such channel or fairway. The latter vessel may use the sound signal prescribed in Rule 34(d) if in doubt as to the intention of the crossing vessel.\n\n(e)\n\n(i)  In a narrow channel or fairway when overtaking can take place only if the vessel to be overtaken has to take action to permit safe passing, the vessel intending to overtake shall indicate her intention by sounding the appropriate signal prescribed in Rule 34(c)(i). The vessel to be overtaken shall, if in agreement, sound the appropriate signal prescribed in Rule 34(c)(ii) and take steps to permit safe passing. If in doubt she may sound the signals prescribed in Rule 34(d).\n(ii) This Rule does not relieve the overtaking vessel of her obligation under Rule 13.\n\n(f)   A vessel nearing a bend or an area of a narrow channel or fairway where other vessels may be obscured by an intervening obstruction shall navigate with particular alertness and caution and shall sound the appropriate signal prescribed in Rule 34(e).\n\n(g) Any vessel shall, if the circumstances of the case admit, avoid anchoring in a narrow channel.",
    "title": "COLREGs Rule 9",
    "url": "https://www.imo.org/en/about/conventions/pages/colreg.aspx"
  },
