     v16 changelog:
       - Cardinal-marks generator family (SESSION-GRAPHICAL: cardinal-marks).

         + New generator: `renderCardinalMark` — front-on cardinal buoy
           diagram. Params: { direction, showLight? }. ~120 lines, renders
           all 4 directions (N/E/S/W) with correct topmark cone orientation
           (up-up / away / down-down / toward) and body band pattern
           (B/Y, B/Y/B, Y/B, Y/B/Y). Reuses the visual language from the
           static img_cardinal_north (same palette, stroke weights,
           viewBox 200x280, waterline arcs).

         + Registered in IMAGE_GENERATORS as 'cardinalMark'. Schema
           doc updated.

         + 4 cards in IALA-A buoyage / Cardinal subcat:
             img_cardinal_north  (REPLACES existing static-SVG card,
                                 same id, swapped to front_image_gen)
             img_cardinal_east   (NEW)
             img_cardinal_south  (NEW)
             img_cardinal_west   (NEW)
           All use kind:"image" + front_image_gen:"cardinalMark".

         + showLight param defaults false — reserved for future flash-
           identification card families. Generator produces a small
           dot+long-bar flash diagram when set true (verified renders
           correctly for all 4 directions in the pilot).

         Net deck: 497 -> 500 cards (+3 net; img_cardinal_north was
         already in the deck, just migrated). Image kind: 12 -> 15.

       - BUGFIX: image cards rendering invisibly in Chrome/Firefox.

         Root cause: a known cross-browser bug where inline SVG with
         no explicit width/height attributes, inside a flex container
         with `width:100%; height:100%` from CSS, collapses to 0x0 in
         Chrome and Firefox (Safari/Edge handle it differently). See
         Mozilla bug 1409529, flexbugs #184. Affected ALL kind:"image"
         cards in v15 — both static and generator-produced — in modern
         Chromium and Firefox.

         Fix is two-pronged, both minimal risk:
           1. CSS: added `min-width: 0; min-height: 0; display: block`
              to `.flashcard .image-front-svg svg` and
              `.quiz-question-image svg`. Forces the SVG out of inline
              flow and removes the min-size constraint that triggers
              the 0x0 collapse.
           2. Defensive: getImageMarkup() now injects width="100%"
              height="100%" preserveAspectRatio="xMidYMid meet" into
              the root <svg> tag of every generator output and every
              static front_image. Belt-and-braces — if the CSS fix
              ever regresses, the SVG still has intrinsic sizing
              attributes that browsers respect.

         Both fixes apply to every kind:"image" card (points-of-sail,
         cardinal marks, chart symbols), so the fix is also forward-
         compatible with future generators.

         Known limitations:
           - The CSS-only fix has not been visually verified across
             all target browsers — Chrome and Firefox were the
             primary repro; Safari behaviour should be unchanged
             since it was already working there.

     v15 changelog:
       - Parameterised image generators (new infrastructure).

         + IMAGE_GENERATORS registry added — string-keyed map of
           generator functions. Card schema extended with optional
           `front_image_gen` (generator name) and `front_image_params`
           (object). When set, the front-face SVG is produced at render
           time instead of being stored as a static string in
           `front_image`. Massive leverage: one generator function gives
           many cards.

         + First generator: `pointOfSail` — top-down sailboat schematic.
           Params: { point, tack, showLabel? }. ~150 lines, renders all
           10 points-of-sail diagrams in this batch + reusable for
           future scenarios (apparent wind, tacking, gybing).

         + getImageMarkup() helper centralises image resolution. Both
           the flashcard renderer and the browse-mode renderer now use
           it, so generated images appear consistently everywhere.

         + Quiz mode now supports image cards. Previously filtered out
           ((c.kind || 'basic') === 'basic'); now allows 'basic' OR
           'image'. Image cards quiz as forward-only (reverse mode
           would have no useful text to ask). Question SVG appears
           between the prompt and the answer options; distractors are
           pulled from same-cat image-card backs so the choices match
           the visual question type. Falls back gracefully if a
           category has fewer than 4 image cards. New CSS class:
           .quiz-question-image.

         + 10 new cards in Points of sail / Sail points subcat:
           img_pos_irons, img_pos_close_hauled_(stbd|port),

     v7 changelog:
       - PROMPT-06 (image card support) verification pass.
         Image card infrastructure (schema doc, renderImageCardBody
         dispatcher, image CSS classes, two test cards
         img_cardinal_north + img_kort1_wreck_dangerous) all confirmed

         Two fixes applied to make image cards actually usable as
         study material:

         1. UX bug — front face was rendering `card.front_alt` as
            visible italic text under the SVG, which gives the answer
            away before the user flips. The actual prompt
            (`card.front`, e.g. "Identify this cardinal mark") was
            never shown. Fix: front now renders `card.front` as the
            prompt (basic-card style), and `card.front_alt` is used
            only as aria-label / title on the SVG container — invisible
            to sighted learners, available to screen readers.

         2. Back face now shows `card.front_alt` as a small italic
            written description under the smaller image. Safe to show
            on the back; useful as an accessibility echo when flipped
            and as a sanity check the learner can compare against.

         CSS: .image-front-alt removed (no longer used);
         .image-back-alt added.

         Known issue (NOT fixed): both test SVGs exceed PROMPT-06's
         <500-byte size limit. img_cardinal_north is 647 bytes (+29%);
         img_kort1_wreck_dangerous is 523 bytes (+5%). Tightening the
         SVG style guide is deferred to before PROMPT-11/12/13 chart

    min-height: 100vh;
  }

    max-width: 920px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ============================================================
     === LAYOUT ===
     Page-level structure: header strip, masthead, profile bar,
     stats, navigation tabs.
     ============================================================ */
  /* ===== Signal flag header strip ===== */
  .flag-strip {
    display: flex;
    height: 6px;
    margin: 0 -16px;
    overflow: hidden;
  }
  .flag-strip > div { flex: 1; }
  .flag-strip .f1 { background: var(--flag-red); }
  .flag-strip .f2 { background: var(--flag-yellow); }
  .flag-strip .f3 { background: var(--flag-blue); }
  .flag-strip .f4 { background: var(--flag-white); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .flag-strip .f5 { background: var(--flag-green); }
  .flag-strip .f6 { background: var(--flag-black); }
  .flag-strip .f7 { background: var(--flag-yellow); }
  .flag-strip .f8 { background: var(--flag-red); }

  /* ===== Header ===== */
  header.masthead {
    padding: 24px 0 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .masthead-title {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .masthead-title .anchor-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--r-md);
    background: var(--navy);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .masthead h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1;
    margin: 0;
    color: var(--navy);
  }
  .masthead .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 500;
  }

  /* ===== Profile selector ===== */
  .profile-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    border: 1px solid var(--rule);
    padding: 6px 8px 6px 14px;
    border-radius: var(--r-pill);
    box-shadow: var(--shadow-sm);
  }
  .profile-bar label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .profile-bar select {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: var(--r-sm);
  }
  .profile-bar select:focus { outline: 2px solid var(--navy-2); outline-offset: 1px; }
  .profile-bar button.icon-btn {
    background: var(--navy-light);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--navy);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .profile-bar button.icon-btn:hover { background: var(--navy); color: white; }

  /* ===== Stats strip ===== */
  .stats-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat-pill {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-pill);
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill strong { color: var(--navy); font-weight: 600; }
  .stat-pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--flag-green);
  }

  /* ===== Mode tabs ===== */
  nav.modes {
    display: flex;
    gap: 4px;
    background: var(--white);
    padding: 4px;
    border-radius: var(--r-pill);
    border: 1px solid var(--rule);
    margin-bottom: 24px;
    overflow-x: auto;
    box-shadow: var(--shadow-sm);
  }
  nav.modes button {
    background: transparent;
    border: none;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-radius: var(--r-pill);
    transition: all 0.15s;
    white-space: nowrap;
  }
  nav.modes button:hover { color: var(--navy); }
  nav.modes button.active {
    background: var(--navy);
    color: white;
    box-shadow: var(--shadow-sm);
  }

  /* ============================================================
     === BUTTONS ===
     Buttons, level chips — reusable interactive elements.
     ============================================================ */
  /* ===== Generic ===== */
  button.btn {
    background: var(--navy);
    color: white;
    border: none;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: var(--r-md);
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  button.btn:hover { background: var(--navy-2); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  button.btn:active { transform: translateY(0); }
  button.btn.secondary {
    background: var(--white);
    color: var(--navy);
    border: 1px solid var(--rule);
  }
  button.btn.secondary:hover { background: var(--navy-light); border-color: var(--navy-2); }
  button.btn.danger { background: var(--flag-red); }
  button.btn.danger:hover { background: #b71c1c; }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.btn.small { padding: 7px 14px; font-size: 12px; }

  select, input[type="text"] {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    background: var(--white);
    border: 1px solid var(--rule);
    color: var(--ink);
    border-radius: var(--r-md);
    transition: border-color 0.15s;
  }
  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--navy-2);
    box-shadow: 0 0 0 3px rgba(26, 84, 144, 0.15);
  }

  .controls-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .controls-row label.field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }

  /* ===== Level chips (CC/DS/DUE/DK/KDY) ===== */
  .level-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-right: 4px;
    vertical-align: middle;
  }
  .level-CC { background: #e3f2fd; color: #1565c0; }
  .level-DS { background: #f3e5f5; color: #6a1b9a; }
  .level-DUE { background: #fff3e0; color: #e65100; }
  .level-DK { background: #ffebee; color: #c62828; }
  .level-KDY { background: #e8f5e9; color: #2e7d32; }

  /* ============================================================
     === FLASHCARDS ===
     Flashcard front/back surfaces and the rating row.
     ============================================================ */
  /* ===== Flashcard ===== */
  .flashcard-wrap { display: flex; flex-direction: column; gap: 16px; }
  .flashcard {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-xl);
    padding: 28px 28px 24px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    box-shadow: var(--shadow-md);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .flashcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .flashcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right,
      var(--flag-red) 0% 14%,
      var(--flag-yellow) 14% 28%,
      var(--flag-blue) 28% 42%,
      var(--flag-white) 42% 56%,
      var(--flag-green) 56% 70%,
      var(--flag-black) 70% 86%,
      var(--flag-yellow) 86% 100%);
  }
  .flashcard .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    margin-top: 4px;
  }
  .flashcard .category {
    background: var(--navy-light);
    color: var(--navy);
    padding: 4px 12px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .flashcard .levels-display { display: flex; gap: 4px; flex-wrap: wrap; }
  .flashcard .review-info {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .flashcard .card-front {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.3;
    color: var(--navy);
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 0;
  }
  .flashcard .card-back-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }
  .flashcard .answer-section {
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
  }
  .flashcard .answer-section .label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .flashcard .why-section {
    background: var(--navy-light);
    border-left: 3px solid var(--navy);
    border-radius: var(--r-md);
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-2);
  }
  .flashcard .why-section .label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--navy);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .flashcard .danish-section {
    background: #fff5f5;
    border-radius: var(--r-md);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--flag-red);
    font-weight: 500;
  }
  .flashcard .danish-section .label {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--flag-red);
    font-weight: 700;
    margin-right: 8px;
    opacity: 0.7;
  }
  /* === Drill cards ===
     Drill cards reveal an ordered sequence of steps one at a time.
     The container wraps the running list of revealed steps, each
     numbered and visually grouped. The "next step" button sits below
     the most recent step until the sequence is fully revealed. */
  .flashcard .drill-intro {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .flashcard .drill-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .flashcard .drill-step {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    background: var(--navy-light);
    border-radius: var(--r-md);
    border-left: 3px solid var(--flag-blue);
    animation: drillStepIn 0.25s ease-out;
  }
  @keyframes drillStepIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .flashcard .drill-step .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--navy);
    flex-shrink: 0;
    min-width: 22px;
  }
  .flashcard .drill-step .step-text {
    flex: 1;
    line-height: 1.5;
  }
  .flashcard .drill-progress {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
  }
  .flashcard .drill-next-row {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }
  .flashcard .drill-next-btn {
    padding: 10px 22px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--r-md);
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.15s, transform 0.1s;
  }
  .flashcard .drill-next-btn:hover {
    background: var(--navy-2);
    transform: translateY(-1px);
  }
  .flashcard .drill-complete-banner {
    background: #e8f5e9;
    border-left: 3px solid var(--flag-green);
    color: #2e7d32;
    padding: 10px 14px;
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    text-align: center;
  }

  /* === Calc cards ===
     Calc cards present a numerical problem. The user can either type
     an answer (which is checked against the card's `answer` object
     with `tolerance`) or skip straight to the worked solution. After
     reveal, the working steps and the final answer are shown together
     (no drip — the user has already done the computation by hand). */
  .flashcard .calc-front {
    /* Multi-line problem statements: preserve line breaks so cards
       authored with \n stay readable. */
    white-space: pre-wrap;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .flashcard .calc-input-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 14px;
    padding: 14px;
    background: var(--navy-light);
    border-radius: var(--r-md);
  }
  .flashcard .calc-input-row .calc-input-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .flashcard .calc-input-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .flashcard .calc-input-fields .calc-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1 1 120px;
  }
  .flashcard .calc-input-fields .calc-field label {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .flashcard .calc-input-fields .calc-field input {
    padding: 8px 10px;
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    background: white;
  }
  .flashcard .calc-input-fields .calc-field input:focus {
    outline: none;
    border-color: var(--navy-2);
    box-shadow: 0 0 0 2px rgba(26, 84, 144, 0.15);
  }
  .flashcard .calc-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .flashcard .calc-submit-btn,
  .flashcard .calc-skip-btn {
    padding: 9px 16px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    border: none;
    transition: background 0.15s, transform 0.1s;
  }
  .flashcard .calc-submit-btn {
    background: var(--navy);
    color: white;
  }
  .flashcard .calc-submit-btn:hover {
    background: var(--navy-2);
    transform: translateY(-1px);
  }
  .flashcard .calc-skip-btn {
    background: white;
    color: var(--ink-2);
    border: 1px solid var(--rule);
  }
  .flashcard .calc-skip-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
  }
  /* Result banner shown after the user submits an answer (NOT after skip).
     Green when within tolerance, red when not. Persists in the revealed
     view so the user can see how they did against the model solution. */
  .flashcard .calc-result-banner {
    padding: 10px 14px;
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    text-align: center;
  }
  .flashcard .calc-result-banner.correct {
    background: #e8f5e9;
    border-left: 3px solid var(--flag-green);
    color: #2e7d32;
  }
  .flashcard .calc-result-banner.incorrect {
    background: #ffebee;
    border-left: 3px solid var(--flag-red);
    color: var(--flag-red);
  }
  .flashcard .calc-result-banner.skipped {
    background: var(--navy-light);
    border-left: 3px solid var(--navy-2);
    color: var(--navy);
  }
  .flashcard .calc-workings {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .flashcard .calc-working-step {
    padding: 12px 14px;
    background: var(--navy-light);
    border-radius: var(--r-md);
    border-left: 3px solid var(--flag-blue);
  }
  .flashcard .calc-working-step .calc-step-title {
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 4px;
    font-size: 14px;
  }
  .flashcard .calc-working-step .calc-step-explain {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-2);
  }
  .flashcard .calc-final-answer {
    padding: 14px;
    background: white;
    border: 2px solid var(--navy);
    border-radius: var(--r-md);
    margin-bottom: 14px;
  }
  .flashcard .calc-final-answer .calc-final-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .flashcard .calc-final-answer .calc-final-values {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
  }
  .flashcard .calc-final-answer .calc-final-value-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .flashcard .calc-final-answer .calc-final-value-item .calc-final-key {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  /* Inline diff: show user's submitted value next to the model answer
     when they got it wrong. Compact and unobtrusive. */
  .flashcard .calc-final-value-item .calc-user-submitted {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--flag-red);
    margin-top: 2px;
  }

  /* === Image cards ===
     Image cards have a visual front (chart symbol, buoy silhouette,
     etc.) and a textual back (identification). The image container
     uses an aspect-ratio box so SVGs scale predictably regardless
     of viewBox dimensions. */
  .flashcard .image-front-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
  }
  .flashcard .image-front-svg {
    /* v18.1: container no longer forces a square aspect ratio. Instead,
       the SVG's intrinsic viewBox drives the height (via `height: auto`
       on the SVG below). Default max-width 360px; landscape SVGs
       (boat-anatomy side-view) override this to use more horizontal
       space — see .aspect-landscape rule below. Portrait/square SVGs
       (cardinal marks, points of sail, top-view boat) stay at the
       default to avoid eating the whole mobile screen. */
    width: 100%;
    max-width: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 12px;
  }
  /* Wider cap for landscape SVGs (e.g. boat-anatomy side-view 600x320
     — squished into 360px max-width would be only ~190px tall, too
     small for the labelled diagram to be readable). */
  .flashcard .image-front-svg.aspect-landscape,
  .quiz-question-image.aspect-landscape {
    max-width: 560px;
  }
  /* Even tighter cap for tall portrait SVGs to avoid going off-screen
     on phones (cardinal marks 200x280 at 360px wide → 504px tall). */
  .flashcard .image-front-svg.aspect-portrait,
  .quiz-question-image.aspect-portrait {
    max-width: 300px;
  }
  .flashcard .image-front-svg svg {
    /* v18.1: width 100%, height auto lets the SVG scale to fill the
       container width while preserving its viewBox aspect ratio.
       display:block + min-width:0 (Chrome/Firefox flex bug fix from
       v16) is preserved. max-height caps tall SVGs absolutely so they
       can never blow past one screen on phones, regardless of class. */
    width: 100%;
    height: auto;
    max-height: 65vh;
    min-width: 0;
    display: block;
  }
  .flashcard .image-front-svg img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .flashcard .image-back-alt {
    /* Alt-text description, shown on the BACK face only — small italic
       under the image as a written description of what the symbol is.
       Safe to show here; the user has already flipped. NEVER appears
       on the front (would give the answer away). */
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    margin: -8px auto 12px;
    max-width: 280px;
  }
  .flashcard .image-back-image {
    /* On reveal, show the same image smaller alongside the answer
       so the user can keep it in view as they read. */
    max-width: 140px;
    aspect-ratio: 1 / 1;
    margin: 0 auto 14px;
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .flashcard .image-back-image svg,
  .flashcard .image-back-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .flashcard .source-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
  }
  /* Clickable source code tag inside any "Source: <code>" line.
     Acts like a link: underlined on hover, navy colour on hover/focus.
     The click handler is attached globally and opens the source-view modal. */
  .src-tag {
    cursor: pointer;
    color: var(--muted);
    border-bottom: 1px dotted var(--muted);
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .src-tag:hover, .src-tag:focus {
    color: var(--navy);
    border-bottom-color: var(--navy);
    outline: none;
  }
  /* Source-view modal — wider than the profile modal because rule text is long. */
  .modal.source-modal {
    max-width: 640px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }
  .source-modal h3 {
    margin-bottom: 6px;
  }
  .source-modal .source-fullname {
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 12px;
  }
  .source-modal .source-url {
    font-size: 13px;
    margin-bottom: 16px;
    word-break: break-all;
  }
  .source-modal .source-url a {
    color: var(--navy);
    text-decoration: underline;
  }
  .source-modal .source-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-1, #0a3d62);
    white-space: pre-wrap;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 14px 16px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    margin-bottom: 16px;
  }
  .source-modal .source-empty {
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .flashcard .flip-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    font-weight: 500;
  }

  /* ===== Rating buttons (clearer labels) ===== */
  .rating-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .rating-row button {
    padding: 14px 10px 10px;
    background: var(--white);
    border: 2px solid var(--rule);
    cursor: pointer;
    font-family: inherit;
    border-radius: var(--r-md);
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .rating-row button:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .rating-row .rate-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }
  .rating-row .rate-time {
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .rating-row button.again:hover { border-color: var(--flag-red); background: #ffebee; }
  .rating-row button.again .rate-label { color: var(--flag-red); }
  .rating-row button.hard:hover { border-color: var(--flag-yellow); background: #fff8e1; }
  .rating-row button.hard .rate-label { color: #e65100; }
  .rating-row button.good:hover { border-color: var(--flag-green); background: #e8f5e9; }
  .rating-row button.good .rate-label { color: var(--flag-green); }
  .rating-row button.easy:hover { border-color: var(--flag-blue); background: #e3f2fd; }
  .rating-row button.easy .rate-label { color: var(--flag-blue); }

  /* Locked rating row: a single full-width "Continue" button, used by
     calc cards when the user skipped to the working (PROMPT-05 spec
     auto-grades these as 'again'). One column instead of four. */
  .rating-row.rating-row-locked {
    grid-template-columns: 1fr;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .progress-meter {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  /* ============================================================
     === QUIZ ===
     Multiple-choice question UI and quiz results screen.
     ============================================================ */
  /* ===== Quiz ===== */
  .quiz-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-xl);
    padding: 28px;
    box-shadow: var(--shadow-md);
  }
  .quiz-question {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    line-height: 1.3;
    margin: 0 0 20px;
    color: var(--navy);
    font-weight: 500;
  }
  /* Image embedded in a quiz question (used for image-kind cards in
     quiz mode). Sits between the prompt text and the answer options;
     same visual container as the flashcard image front so the look
     is consistent between flashcard mode and quiz mode. */
  .quiz-question-image {
    /* v18.1: see .flashcard .image-front-svg above for rationale. */
    width: 100%;
    max-width: 360px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 12px;
  }
  .quiz-question-image svg {
    width: 100%;
    height: auto;
    max-height: 60vh;
    min-width: 0;
    display: block;
  }
  .quiz-question-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option {
    text-align: left;
    padding: 14px 16px;
    background: var(--white);
    border: 1.5px solid var(--rule);
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-radius: var(--r-md);
    width: 100%;
  }
  .quiz-option:hover:not(:disabled) {
    border-color: var(--navy-2);
    background: var(--navy-light);
  }
  .quiz-option .letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    background: var(--navy);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .quiz-option.correct { border-color: var(--flag-green); background: #e8f5e9; }
  .quiz-option.correct .letter { background: var(--flag-green); }
  .quiz-option.wrong { border-color: var(--flag-red); background: #ffebee; }
  .quiz-option.wrong .letter { background: var(--flag-red); }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    margin-top: 20px;
    padding: 16px;
    border-radius: var(--r-md);
    font-size: 14px;
    line-height: 1.6;
  }
  .quiz-feedback.correct { background: #e8f5e9; border-left: 4px solid var(--flag-green); }
  .quiz-feedback.wrong { background: #ffebee; border-left: 4px solid var(--flag-red); }
  .quiz-feedback strong { display: block; margin-bottom: 6px; }
  .quiz-feedback .why-block {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 13px;
    color: var(--ink-2);
  }
  .quiz-feedback .why-block .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    color: var(--navy);
    margin-right: 6px;
  }

  .quiz-summary {
    text-align: center;
    padding: 40px 20px;
    background: var(--white);
    border-radius: var(--r-xl);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow-md);
  }
  .quiz-summary .score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    color: var(--navy);
  }
  .quiz-summary .score-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
  }
  .quiz-summary .summary-actions {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ============================================================
     === BROWSE LIST ===
     Card-list view with filters, search, expand-on-click.
     ============================================================ */
  /* ===== Browse ===== */
  .browse-list {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .browse-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.1s;
  }
  .browse-item:last-child { border-bottom: none; }
  .browse-item:hover { background: var(--navy-light); }
  .browse-item .row-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .browse-item .cat-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
  }
  .browse-item .term {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--navy);
  }
  .browse-item .stat {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
  }
  .browse-item.expanded { background: var(--navy-light); }
  .browse-item.expanded .term-detail {
    margin-top: 10px;
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.55;
  }
  .browse-item.expanded .why-detail {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--white);
    border-left: 3px solid var(--navy);
    border-radius: var(--r-sm);
    font-size: 13px;
    color: var(--ink-2);
  }
  .browse-item.expanded .why-detail .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    color: var(--navy);
    margin-right: 6px;
  }
  .browse-item.expanded .danish-detail {
    font-size: 12px;
    color: var(--flag-red);
    margin-top: 8px;
    font-weight: 500;
  }

  /* ============================================================
     === PROGRESS ===
     Stats-by-category and reset controls.
     ============================================================ */
  /* ===== Progress ===== */
  .progress-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .progress-stat {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
  }
  .progress-stat .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: var(--navy);
  }
  .progress-stat .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-progress-row {
    display: grid;
    grid-template-columns: 200px 1fr 70px;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 13px;
  }
  .cat-progress-row:last-child { border-bottom: none; }
  .cat-progress-row .bar {
    height: 8px;
    background: var(--rule-2);
    border-radius: var(--r-pill);
    overflow: hidden;
  }
  .cat-progress-row .bar .fill {
    height: 100%;
    background: var(--flag-green);
    transition: width 0.3s;
    border-radius: var(--r-pill);
  }
  .cat-progress-row .pct {
    font-size: 12px;
    text-align: right;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  /* ============================================================
     === TYPOGRAPHY ===
     Headings shared across modes.
     ============================================================ */
  /* ===== Section headings ===== */
  h2.section {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 24px;
    margin: 24px 0 16px;
    color: var(--navy);
  }
  h3.subsection {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-2);
    margin: 20px 0 10px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
  }

  .info-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .info-card p { margin: 0 0 12px; }
  .info-card p:last-child { margin: 0; }
  .info-card .meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
  }

  .source-list { font-size: 13px; color: var(--ink-2); line-height: 1.7; }
  .source-list a { color: var(--navy); text-decoration: none; border-bottom: 1px dotted; }
  .source-list a:hover { border-bottom-style: solid; }

  /* ============================================================
     === MODAL ===
     Centered overlay used for profile management.
     ============================================================ */
  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 61, 98, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--white);
    border-radius: var(--r-xl);
    padding: 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 {
    margin: 0 0 16px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--navy);
    font-weight: 700;
  }
  .modal p { margin: 0 0 16px; font-size: 14px; color: var(--ink-2); }
  .modal input[type="text"] { width: 100%; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  @media (max-width: 600px) {
    .masthead h1 { font-size: 24px; }
    .flashcard .card-front { font-size: 22px; }
    .quiz-question { font-size: 19px; }
    .browse-item .stat { display: none; }
    .cat-progress-row { grid-template-columns: 1fr; gap: 4px; }
    .rating-row { grid-template-columns: repeat(2, 1fr); }
    .rating-row.rating-row-locked { grid-template-columns: 1fr; }
  }

  /* v19: disclaimer modal — wider than profile modal so the full
     liability text reads naturally. Scrollable on short phones. */
  .disclaimer-modal {
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .disclaimer-modal p { font-size: 13.5px; line-height: 1.55; }
  .disclaimer-modal .small-print {
    font-size: 12px;
    color: var(--muted);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
  }

  /* v19: persistent footer disclaimer — small grey line under the
     main content. Always visible so the user never forgets the
     "study aid, not navigation" framing, even mid-card. */
  .app-footer {
    margin-top: 24px;
    padding: 14px 16px 18px;
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--rule);
  }
  .app-footer strong { color: var(--ink-2); }
  .app-footer a {
    color: var(--muted);
    text-decoration: underline;
  }
</style>
</head>

    basic cards:

    calc cards (numerical-answer problems):

      back         string, identification / explanation revealed on flip

  is unchanged and still operates on user-progress profiles. profileType

  ============================================================
-->

    "back": "Zinc blocks attached to underwater metal parts. They corrode FIRST, protecting the prop, shaft, and metal seacocks.",

    "front_alt": "Top-down deck plan with the anchor locker hatch near the bow highlighted in red",
    "back": "A compartment near the bow where the anchor chain (and sometimes the anchor itself) is stowed. Drains overboard, not into the bilge. Accessed via a deck hatch.",
    "profileType": "skipper",
    "why": "Wet, muddy chain has to go somewhere. Draining the locker overboard keeps the chain weight low (good for trim) and prevents the bilge filling with seawater every time you weigh anchor.",

    "front_alt": "Top-down deck plan with the bow roller (V-shape at the very tip of the bow) highlighted in red",
    "back": "A grooved roller at the very bow over which the anchor chain runs. Lets the chain pay out and come in without chafing on the deck or hull.",
    "profileType": "skipper",
    "why": "Without it, anchor chain saws into fibreglass or wood as it works under load. The roller turns sliding friction into rolling friction and keeps the chain centred.",

    "src": "RYA-CC"
  },

      "CC",
      "DUE"
    ],
    "front": "Fairlead",
    "back": "A smooth-edged guide that directs a mooring line over the toerail without chafing or kinking. Usually metal or hard plastic, fitted at strategic points around the deck edge.",
    "why": "A line dragged over a sharp toerail edge cuts through in hours under load. The fairlead distributes the friction and keeps the line's angle of pull aligned with the cleat behind it.",

    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a34",

    "why": "\"One hand for the boat, one hand for yourself\" — basic safety on a heeling, pitching deck. Continuous grab rails mean you're never reaching for the next handhold across empty space.",

    "front": "Fender",
    "back": "An inflatable or foam cylinder hung between the boat and the dock (or another boat) to absorb impact and prevent hull damage. Sized to the boat — typically 4-6 fenders, 30-60 cm long, on each side ready to deploy.",
    "why": "Marina speeds are slow, but boat momentum is huge. A 6-tonne yacht touching a concrete dock at 0.5 knots without a fender breaks gelcoat or bends the toerail. Fenders absorb that energy harmlessly.",

    "src": "RYA-CC",
    "profileType": "skipper"
  },

    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC"
    ],
    "front": "Fender board",
    "back": "A wooden plank hung horizontally outside two fenders, used when moored against rough or projecting walls (pilings, ladders, tyres). The board distributes the load across both fenders and shields the hull from the projection.",
    "why": "A single fender between the boat and a piling can rotate around the piling and let the hull touch. The fender board spans across, keeping the hull off projections that fenders alone can't cover.",

    "back": "The inflatable side tube of a rigid inflatable boat (RIB) or inflatable dinghy. Provides buoyancy, shock absorption, and stability. Divided into multiple chambers so a single puncture doesn't sink the boat.",
    "why": "Multiple chambers are critical for safety — one chamber holed (sharp coral, dock cleat) means the boat still floats. Check the chamber valves periodically; slow leaks are common.",

    "src": "RYA-CC",
    "profileType": "skipper"

    "front_alt": "Side profile of a sailboat with the sprayhood (canvas dome over the companionway) highlighted in red",
    "back": "A folding fabric cover over the front of the cockpit, protecting crew from spray, rain, and wind blowing aft. Frame is stainless tubing; cover is acrylic canvas or similar UV-resistant cloth.",

    "why": "On a wet beat, the difference between a working sprayhood and no sprayhood is the difference between miserable and tolerable. Most cruisers consider it standard equipment.",

    "front": "Dodger and bimini",
    "back": "DODGER = the sprayhood (UK term). BIMINI = a fabric awning over the cockpit for sun shade. Some boats have both — sprayhood/dodger forward against spray, bimini further aft for sun.",

    "front": "Lazy jacks",
    "back": "Lines running from the mast down to the boom on each side of the mainsail, forming a \"cradle\". When the sail drops, the lazy jacks catch and contain it on top of the boom.",
    "why": "Without lazy jacks, a dropped main flops over both sides of the boom and someone has to gather it in. Lazy jacks make single-handed sail dropping practical. Trade-off: battens can snag on the lazy jacks when hoisting if you're not directly head-to-wind.",

    "back": "A fitted UV-resistant cloth cover over the stowed mainsail on the boom. Protects the sail from sun damage when not in use. Removed before sailing; refitted at the end of the day.",

  {
    "id": "a50",
    "cat": "Boat anatomy",
    "subcat": "Hull & deck",
    "levels": [
      "CC"
    ],
    "front": "Propeller types — fixed, folding, feathering",
    "back": "FIXED: simple, cheap, but creates significant drag while sailing. FOLDING: blades fold back when not driven (like an umbrella) — minimal drag, but less efficient in reverse. FEATHERING: blades pivot to align with water flow when sailing — drag close to folding, much better in reverse.",
    "why": "Drag from a fixed prop costs ~0.5 knots of sailing speed. Folding/feathering props are expensive but standard on cruiser-racers. Different reverse behaviour: fixed > feathering > folding.",
    "danish": "Propeltyper",
    "src": "GEN",
    "profileType": "skipper"
  },
  {
    "id": "a51",
    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC"
    ],
    "front": "Piston hank",
    "back": "A spring-loaded clip on the luff of a hanked-on jib. You squeeze the piston, the clip opens, you slide it onto the forestay, release. Sail is now mechanically locked to the stay.",
    "why": "Hank-on jibs use these every 30-40cm up the luff. The piston is the spring mechanism — old ones can stick or fail to lock fully. Inspect before each season; a hank that pops off in big breeze can let the sail go.",
    "danish": "Stagskydestift",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a52",
    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC",
      "DS"
    ],
    "front": "Luff foil / headfoil",
    "back": "A grooved aluminium extrusion that fits over the forestay. The luff of the jib slides up a groove inside the foil, holding the sail to the stay aerodynamically (no projecting hanks). Used on racing boats and roller-furling systems.",
    "why": "A foil-mounted sail is aerodynamically cleaner — the front edge is smooth instead of bumpy with hanks. Roller-furling foils have two grooves so a new sail can be hoisted in one groove while the old comes down the other.",
    "danish": "Forstag-profil",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a53",
    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC"
    ],
    "front": "Gooseneck",
    "back": "The hinged fitting where the boom attaches to the mast. Lets the boom swing horizontally (for tacking and gybing) and pivot vertically (for reefing and sail-down).",
    "why": "Single point of attachment carrying massive loads. Modern goosenecks are precision-machined stainless. A failed gooseneck means the boom drops onto the cockpit. Inspect for hairline cracks at the bolt holes.",
    "danish": "Gooseneck / bom-beslag",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a54",
    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC"
    ],
    "front": "Ram's horn",
    "back": "A curved horn-shaped fitting near the gooseneck. The reefing cringle (loop in the luff of the sail) is hooked over the ram's horn when reefing, securing the new tack of the sail.",
    "why": "When you reef, the original tack of the sail rises out of use; the next reefing cringle becomes the new tack. The ram's horn holds it in place against the boom's downward pull, freeing your hands to deal with the reefing line.",
    "danish": "Vædderhorn",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a55",
    "cat": "Boat anatomy",
    "subcat": "Fittings & hardware",
    "levels": [
      "CC",
      "DS"
    ],
    "front": "Spreaders — what they do",
    "back": "Horizontal struts about halfway up the mast, projecting outward to push the shrouds out at an angle. Without them, shrouds running straight from the masthead to the deck edge would be too vertical to support the mast against side-loads.",
    "why": "A shroud at 5° from vertical can't resist side-loading without snapping. The spreader pushes it out to 15-20°, where its tension can actually counter the sideways force from the sails. Spreaders themselves take huge compression load.",
    "danish": "Vantspredere",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "img_a55_spreaders",

  {
    "id": "a56",
    "cat": "Boat anatomy",

    "levels": [
      "CC",
      "DS"
    ],
    "front": "Masthead instruments — overview",
    "back": "At the top of the mast: WINDEX (mechanical wind direction arrow), ANEMOMETER (wind speed sensor), TRICOLOUR LIGHT (combined sidelights + sternlight, sailing at night), ANCHOR LIGHT (all-round white), VHF ANTENNA, sometimes a steaming light below.",
    "why": "The masthead is the highest point — best place for wind sensors (clean undisturbed air), best place for VHF (line-of-sight range), best place for anchor light (visible from all directions). Service in port — lots of fragile hardware up there.",
    "danish": "Masttop-instrumenter",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a57",
    "cat": "Boat anatomy",
    "subcat": "Below decks",
    "levels": [
      "DS"
    ],
    "front": "Nav station and chart table",
    "back": "A dedicated workspace below decks for charts, instruments, and the radio. Chart table is large enough for a folded paper chart. Surrounding bulkhead carries VHF, GPS plotter, instrument repeaters, electrical panel, and barometer.",
    "why": "Centralising the navigation gear means one person can plan, navigate, and communicate from one position. On a passage at night, the navigator works at the chart table while the helm steers; both stay in voice contact through the companionway.",
    "danish": "Kortbord",
    "src": "GEN",
    "profileType": "skipper"
  },
  {
    "id": "a58",
    "cat": "Boat anatomy",
    "subcat": "Below decks",
    "levels": [
      "CC"
    ],
    "front": "Gimbals (gimballed stove)",
    "back": "A pivoting mounting that lets the stove swing freely fore-and-aft on bearings. Gravity keeps it level no matter how the boat heels. A locking pin holds it level when not in use (so it doesn't swing in port).",
    "why": "Without gimbals, a 30° heel means hot food and boiling water on the cabin sole. Pivot axis is fore-and-aft because boats heel sideways much more than they pitch. Locking pin prevents the stove banging in chop at anchor.",
    "danish": "Kardansk ophæng",
    "src": "RYA-CC",
    "profileType": "skipper"
  },
  {
    "id": "a59",
    "cat": "Boat anatomy",
    "subcat": "Below decks",
    "levels": [
      "CC",
      "DUE"
    ],
    "front": "Holding tank",
    "back": "A sealed tank below decks that collects waste from the heads (toilet) instead of discharging it overboard. Pumped out at marina pump-out stations, or discharged offshore where regulations permit.",
    "why": "Discharge of untreated sewage is prohibited within 12 nm of the Danish coast and in many other zones. Holding tanks let you use the heads in port without polluting the marina. Most modern Danish marinas have free pump-out.",
    "danish": "Holdingtank",
    "src": "DUE-7.5",
    "profileType": "skipper"
  },
  {
    "id": "a60",
    "cat": "Boat anatomy",
    "subcat": "Below decks",
    "levels": [
      "CC",
      "DUE"
    ],
    "front": "Gas locker",
    "back": "A sealed compartment housing the LPG (propane/butane) bottles for the cooker. CRITICAL: drains directly OVERBOARD (not into the bilge), so any gas leak escapes the boat instead of pooling in the bilge.",
    "why": "LPG is heavier than air. A leak from a bottle in the bilge = explosion risk on the next stove ignition. The overboard drain in the gas locker is mandatory by every safety standard. Inspect the drain hose annually — a blocked hose defeats the whole system.",
    "danish": "Gasflaskeskab",
    "src": "DUE-7.4",
    "profileType": "skipper"
  },
  {
    "id": "r01",
    "cat": "Rig & sails",
    "levels": [
      "CC",

    ],
    "front": "Mast",
    "back": "The vertical spar supporting the sails. Stepped on the keel (\"keel-stepped\") or on the deck (\"deck-stepped\").",

    "front": "Boom",
    "back": "The horizontal spar extending aft from the mast, holding the foot of the mainsail.",

  },
  {
    "id": "r04",
    "cat": "Rig & sails",

    "front": "Jib",
    "back": "A triangular headsail set forward of the mast, attached to the forestay.",

  {
    "id": "r05",
    "cat": "Rig & sails",
    "levels": [
      "CC"
    ],
    "front": "Genoa",
    "back": "A large jib that overlaps the mainsail. Provides more drive in light to moderate wind.",
    "why": "The overlap creates a \"slot effect\" between genoa and main, accelerating airflow over the lee side of the main and increasing total drive.",
    "danish": "Genua",

    "profileType": "skipper",

  },
  {
    "id": "r06",
    "cat": "Rig & sails",
    "levels": [
      "DS"
    ],
    "front": "Spinnaker",
    "back": "A large, balloon-shaped, lightweight downwind sail. Symmetric (with pole) or asymmetric (no pole).",
    "why": "Off the wind, a flat sail is inefficient. A spinnaker's rounded shape captures much more air — like the difference between a flag and a parachute.",
    "danish": "Spiler",
    "src": "GEN",
    "profileType": "skipper",
    "subcat": "Sails"
  },
  {
    "id": "r07",
    "cat": "Rig & sails",
    "levels": [
      "CC",
      "DUE"
    ],
    "front": "Halyard",
    "back": "A line used to HOIST a sail. Main halyard, jib halyard, spinnaker halyard.",
    "why": "\"Hal-yard\" = haul-yard (haul up the sail). Each sail has its own halyard.",
    "danish": "Fald",
    "src": "GEN",
    "profileType": "skipper",

  },
  {

    "cat": "Rig & sails",
    "levels": [
      "CC",
      "DUE"
    ],
    "front": "Sheet",
    "back": "A line used to control the angle of a sail to the wind. Main has a mainsheet; jib has port and starboard sheets.",
    "why": "Confusing terminology: a \"sheet\" is a rope, NOT the sail itself. From Old English \"sceata\" = corner of a sail. The line attached to that corner became \"the sheet\".",
    "danish": "Skøde",
    "src": "GEN",
    "profileType": "skipper",
    "subcat": "Running rigging"
  },
  {
    "id": "r09",
    "cat": "Rig & sails",
    "levels": [
      "CC"
    ],
    "front": "Vang (boom vang / kicker)",
    "back": "A tackle from the boom down to the base of the mast. Prevents the boom rising when off-wind.",
    "why": "Without it, off the wind the boom rises and the mainsail twists open at the top — top of sail lets wind out, power is wasted. Vang holds boom down, sail keeps shape.",
    "danish": "Bomstrammer",
    "src": "RYA-CC",
    "profileType": "skipper",
    "subcat": "Spars & standing rig"
  },
  {
    "id": "r10",
    "cat": "Rig & sails",
    "levels": [
      "CC"
    ],
    "front": "Topping lift",
    "back": "A line from the masthead to the end of the boom, supporting the boom when sails are down.",
    "why": "When mainsail is up, the sail itself holds the boom. When down or being reefed, topping lift takes over — otherwise the boom crashes onto the cockpit.",
    "danish": "Pikfald",
    "src": "RYA-CC",
    "profileType": "skipper",
    "subcat": "Spars & standing rig"
  },
  {
    "id": "r11",
    "cat": "Rig & sails",
    "levels": [
      "DS"
    ],
    "front": "Shrouds and stays",
    "back": "Standing rigging. Shrouds run from mast to sides (chainplates). Forestay (forward) and backstay (aft) run fore-and-aft.",
    "danish": "Vant og stag",
    "src": "GEN",
    "profileType": "skipper",
    "subcat": "Spars & standing rig"
  },
  {

    "cat": "Rig & sails",

      "DS"
    ],
    "front": "Standing vs running rigging",
    "back": "STANDING = fixed wires holding the mast up. RUNNING = lines you actively pull (halyards, sheets).",
    "why": "Standing rigging stays put; running rigging is the \"moving parts\". Standing rigging fatigues invisibly — replaced every 10-15 years on cruising boats.",
    "danish": "Stående vs løbende rigning",
    "src": "GEN",

    ],
    "front": "Head, tack, clew",
    "back": "Three corners of a triangular sail. HEAD = top. TACK = lower forward (at mast/bow). CLEW = lower aft (where sheet attaches).",
    "why": "\"Tack\" the corner is different from \"tack\" the manoeuvre. The corner is named because the sail is \"tacked down\" there.",

    ],
    "front": "Reefing",
    "back": "Reducing sail area in strong wind by partially lowering and tying down a portion of the sail.",
    "why": "A boat is fastest with the right amount of sail for the wind, NOT the most. Excessive heel slows the boat (keel becomes less effective) and increases weather helm. First reef ~18-20 kt, second ~25 kt.",

    ],
    "front": "Telltales",
    "back": "Small streamers on sails or shrouds showing airflow. On a jib: when both sides stream straight back, sail is trimmed correctly.",

    ],

    "back": "HANKED-ON: jib clipped to forestay with piston hanks. Hard to lose. ROLLER-FURLING: jib wraps around the forestay; cockpit-controlled.",
    "why": "Hanked-on is most secure for offshore (drop the sail and it stays attached). Roller-furling is most convenient. Different boats use different systems.",

    ],
    "front": "Preventer",
    "back": "A line from the boom forward to a strong point on deck, preventing the boom swinging across in an accidental gybe.",
    "why": "Downwind, an accidental gybe in 25 kt can break the boom or your skull. The preventer is cheap insurance. Never sail downwind without one in real wind.",

    ],
    "front": "Close-hauled",
    "back": "Sailing as close to wind as possible — typically 30-45° off true wind. Sails pulled in tight.",
    "why": "You can't sail directly into wind. The \"no-go zone\" is ~45° each side of dead upwind. To reach a point upwind, you must zig-zag.",

    ],
    "front": "Beam reach",
    "back": "Wind directly on the beam (90° to boat). Often the fastest, easiest point of sail.",

    "front": "No-go zone (in irons)",
    "back": "The arc directly into wind (~45° each side) where a sailboat cannot generate forward drive. Stuck head-to-wind = \"in irons\".",

    "back": "Every vessel must AT ALL TIMES maintain a proper lookout by sight and hearing as well as by all available means.",

    "back": "When both on the SAME TACK, the WINDWARD vessel must give way to the LEEWARD vessel.",

    "front": "Rule 1 — Application",
    "back": "COLREGs apply to ALL VESSELS upon the high seas and in all waters connected to them navigable by seagoing vessels. National authorities may make additional rules for inland waters, harbours, and roadsteads, but these must conform AS CLOSELY AS POSSIBLE to the international rules.",
    "why": "A single global rulebook is the whole point — a Greek tanker meeting a Danish yacht in the Sound must be able to predict each other's actions. Local rules can add detail but can't contradict the international ones. This is why Danish harbour rules look very similar to UK harbour rules.",
    "danish": "Anvendelsesområde",
    "src": "COL-1",
    "profileType": "skipper"
  },
  {
    "id": "c17",
    "cat": "COLREGs",
    "subcat": "General principles",
    "levels": [
      "DUE",
      "DS"
    ],
    "front": "Rule 2(a) — Responsibility",
    "back": "Nothing in the Rules excuses any vessel, owner, master, or crew from the consequences of any neglect to comply with them, OR from neglect of any precaution required by ordinary practice of seamen, OR by the special circumstances of the case.",
    "why": "The \"general prudential rule\". Following the letter of COLREGs while ignoring an obvious approaching disaster doesn't excuse you. Courts and inquiries explicitly look for whether you used GOOD SEAMANSHIP — a standard above and beyond the written rules. \"I followed Rule 17\" isn't a defence if a competent skipper would have seen the collision coming and acted.",
    "danish": "Almindeligt sømandsskab",
    "src": "COL-2",
    "profileType": "skipper"
  },
  {
    "id": "c18",
    "cat": "COLREGs",
    "subcat": "General principles",
    "levels": [
      "DS"
    ],
    "front": "Rule 2(b) — Departure from the Rules",
    "back": "Due regard must be had to all dangers of navigation and collision, and to any SPECIAL CIRCUMSTANCES, including the limitations of the vessels involved, which may make a DEPARTURE FROM THE RULES NECESSARY to avoid immediate danger.",
    "why": "Recognises that rigid rule-following can sometimes cause the very collision the rules try to prevent. If breaking a rule will save a collision, you must break it. Example: stand-on vessel turning early because the give-way vessel clearly isn't reacting — technically violates Rule 17 but is the right thing to do.",
    "danish": "Afvigelse fra reglerne",
    "src": "COL-2",
    "profileType": "skipper"
  },

    ],
    "front": "Rule 3 — Key definitions",
    "back": "\"VESSEL\" = every craft used or capable of being used as a means of transportation on water. \"POWER-DRIVEN VESSEL\" = any vessel propelled by machinery. \"SAILING VESSEL\" = any vessel under sail provided machinery, if fitted, is NOT BEING USED. \"VESSEL ENGAGED IN FISHING\" = vessel fishing with nets/lines/trawls or other fishing apparatus that restrict manoeuvrability (NOT trolling lines).",
    "why": "Definitions matter because the rules apply differently to different vessel types. A yacht trolling for mackerel is NOT a \"vessel engaged in fishing\" — the trolling line doesn't restrict manoeuvrability. A trawler with nets out IS, and gets right-of-way protection. Read the definitions; they're tested.",
    "danish": "Definitioner",
    "src": "COL-3",
    "profileType": "skipper"
  },
  {
    "id": "c20",
    "cat": "COLREGs",

      "DS"
    ],
    "front": "Rule 3 — Restricted in ability to manoeuvre vs. not under command",
    "back": "\"NOT UNDER COMMAND\" = vessel UNABLE through some EXCEPTIONAL CIRCUMSTANCE to keep out of the way (engine failure, broken steering). \"RESTRICTED IN ABILITY TO MANOEUVRE\" = vessel that, FROM THE NATURE OF HER WORK, is restricted (dredgers, cable-layers, vessels servicing buoys, vessels engaged in towing operations that limit manoeuvrability).",
    "why": "Different categories, different lights, different priorities. NUC = something went wrong. Restricted = doing a job that physically prevents normal manoeuvring. A dredger isn't broken — it's working. The rules respect both with right-of-way protection but signal them differently.",
    "danish": "Manøvreudygtig vs begrænset manøvredygtig",
    "src": "COL-3",
    "profileType": "skipper"
  },
  {
    "id": "c21",
    "cat": "COLREGs",
    "subcat": "General principles",
    "levels": [
      "DS"
    ],
    "front": "Rule 3 — Constrained by draught",
    "back": "\"VESSEL CONSTRAINED BY HER DRAUGHT\" = a power-driven vessel which, because of her draught in relation to available depth and width of navigable water, is SEVERELY RESTRICTED in her ability to deviate from her course. Applies in international rules; not all national rules adopt it.",
    "why": "A loaded VLCC with 22m draft in a 23m channel literally cannot move sideways without grounding. Other vessels must keep clear regardless of who has \"right of way\" under the standard rules. Day shape: black cylinder. Lights: three red vertically (Rule 28).",
    "danish": "Hindret af dybgang",
    "src": "COL-3",
    "profileType": "skipper"
  },
  {
    "id": "c22",
    "cat": "COLREGs",
    "subcat": "General principles",
    "levels": [
      "DS"
    ],
    "front": "Rule 4 — Application of Steering and Sailing Rules",
    "back": "The rules in PART B (Steering and Sailing Rules, Rules 4-19) apply in any condition of visibility. The Rules in Section II of Part B (Rules 11-18, conduct in sight of one another) apply only when vessels can SEE each other. Section III (Rule 19) applies in or near restricted visibility.",
    "why": "Different rules for different conditions. In fog, you don't apply Rule 12 (sailing vessels meeting) — you apply Rule 19 instead. Many sailors miss this and try to apply visual rules when they've only got a radar contact. The rule structure tells you which framework you're in.",
    "danish": "Anvendelse af styre- og sejladsregler",
    "src": "COL-4",
    "profileType": "skipper"
  },
  {
    "id": "c23",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DUE",
      "DS"
    ],
    "front": "Rule 8 — Action to avoid collision",
    "back": "Action must be: POSITIVE, made in AMPLE TIME, and with due regard to the observance of GOOD SEAMANSHIP. Alterations of COURSE and/or SPEED must be LARGE ENOUGH to be readily apparent to another vessel observing visually or by radar. Avoid a series of small alterations. Slow, stop, or reverse if necessary.",
    "why": "A series of small adjustments looks like normal yawing on radar — the other vessel can't tell you're giving way. ONE big, obvious turn says clearly \"I am keeping clear.\" This is also why the rule emphasises \"ample time\" — late action means small turns are too risky and you're forced into emergency manoeuvres.",
    "danish": "Handling for at undgå sammenstød",
    "src": "COL-8",
    "profileType": "skipper"
  },
  {
    "id": "c24",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DS"
    ],
    "front": "Rule 8(c)(d)(e) — Specific guidance on action",
    "back": "(c) If room exists, an alteration of COURSE alone may be the most effective. (d) Action must result in passing at a SAFE DISTANCE — checked until the other vessel is finally past and clear. (e) If necessary, slacken speed, stop, or reverse propulsion.",
    "why": "(c) Course change is more visible than speed change — it changes the silhouette the other vessel sees. (d) \"Safe distance\" isn't defined as a number — it depends on size, speed, sea state. Keep monitoring until clear; near-misses don't count as success. (e) Stopping is always available as the ultimate avoidance — too many sailors forget this.",
    "danish": "Detaljer i handling",
    "src": "COL-8",
    "profileType": "skipper"
  },
  {
    "id": "c25",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DS"
    ],
    "front": "Rule 9 — Narrow channels",
    "back": "Vessels must keep AS NEAR TO THE OUTER LIMIT OF THE CHANNEL OR FAIRWAY ON HER STARBOARD SIDE as is safe and practicable. Vessels under 20m, sailing vessels, and fishing vessels must NOT IMPEDE the passage of any vessel which can safely navigate ONLY within the channel.",
    "why": "In narrow water, big ships have NO sideways margin. Yachts have options; ships don't. The \"starboard side\" rule means traffic flows like cars — keep right, pass port-to-port. The \"do not impede\" clause is stronger than normal give-way: even if you have technical right of way (e.g. starboard tack), you cannot get in the way of a vessel constrained to the channel.",
    "danish": "Snævre løb",
    "src": "COL-9",
    "profileType": "skipper"
  },
  {
    "id": "c26",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DS"
    ],
    "front": "Rule 9(d)(e) — Crossing and overtaking in narrow channels",
    "back": "(d) A vessel must NOT CROSS A NARROW CHANNEL or fairway if such crossing impedes the passage of a vessel that can navigate only within it. The vessel about to be impeded may use sound signal in doubt (Rule 34(d)). (e) Overtaking in a narrow channel where the overtaken vessel must take action to permit safe passage requires sound signal coordination.",
    "why": "(d) Crossing perpendicular to a TSS or shipping lane requires NOT being in the way of constrained traffic. Wait for a gap; don't time it tight. (e) In narrow water, overtaking is safer if both vessels agree — the sound signals (Rule 34) coordinate this.",
    "danish": "Krydse og indhente i snævert løb",
    "src": "COL-9",
    "profileType": "skipper"
  },
  {
    "id": "c27",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DS"
    ],
    "front": "Rule 10 — Traffic separation schemes (TSS)",
    "back": "Proceed in the appropriate lane in the GENERAL DIRECTION of traffic flow. Keep clear of separation lines and zones. So far as practicable, AVOID CROSSING traffic lanes; if obliged to do so, cross AS NEARLY AS PRACTICABLE AT RIGHT ANGLES to the direction of traffic flow.",
    "why": "A TSS is a one-way road system at sea. Going the wrong way is illegal and dangerous. If you must cross, do so quickly (right angles minimises time in the lane) and obviously (90° heading vs. lane direction makes intent clear to ships in the lane). Drifting across at 45° is the worst option.",
    "danish": "Trafiksepareringsområder",
    "src": "COL-10",
    "profileType": "skipper"
  },
  {
    "id": "c28",
    "cat": "COLREGs",
    "subcat": "Special situations",
    "levels": [
      "DS"
    ],
    "front": "Rule 10 — Vessels exempt or required to keep clear of TSS",
    "back": "A vessel under 20m, a sailing vessel, or a vessel engaged in fishing must NOT IMPEDE the safe passage of a power-driven vessel following a traffic lane. A vessel may use the inshore traffic zone in certain circumstances (e.g. <20m, sailing vessel, fishing, en route to/from a port within the zone, or in emergency).",
    "why": "The rule recognises that small craft and sailing vessels can't maintain TSS speeds. They're kept out of the lanes (or required not to impede) and given the inshore zone — close to the coast, away from the deep-water shipping. Practical compromise.",
    "danish": "Trafiksepareringsområder — undtagelser",
    "src": "COL-10",
    "profileType": "skipper"
  },

    "why": "Critical scope-setting rule. The \"in sight\" requirement means visual rules don't apply when you can only see the other vessel on radar or AIS. In fog or at night beyond visual range, switch to Rule 19 (restricted visibility) framework instead. The dividing line: can you actually see her hull or lights?",

    "front": "Rule 12(a)(iii) — Doubt about other tack",
    "back": "When two sailing vessels approach so as to involve risk of collision: if a vessel WITH THE WIND ON THE PORT SIDE sees a vessel to windward and CANNOT DETERMINE WITH CERTAINTY whether the other has the wind on port or starboard, she must KEEP OUT OF THE WAY of the other.",
    "why": "Default-to-safe principle. If the other vessel could be on starboard tack (have right of way), assume the worst case — give way. Better an unnecessary course change than a collision over a misread silhouette. Hardest to judge at night or against a bright horizon.",

    ],
    "front": "Rule 16 — Action by give-way vessel",
    "back": "Every vessel directed to keep out of the way of another vessel must, SO FAR AS POSSIBLE, take EARLY and SUBSTANTIAL ACTION to keep WELL CLEAR.",
    "why": "Three operative words. \"EARLY\" — don't wait until the last moment; the other vessel needs time to recognise your action. \"SUBSTANTIAL\" — make the manoeuvre big enough to be obviously a give-way action, not just normal yawing. \"WELL CLEAR\" — not \"barely clear\"; pass with comfortable margin so any misjudgement on either side doesn't cause contact.",

      "DS"
    ],
    "front": "Rule 17(a) — Action by stand-on vessel",
    "back": "(i) Where one of two vessels is to keep out of the way, the OTHER must KEEP HER COURSE AND SPEED. (ii) The stand-on vessel MAY however take action to avoid collision by her manoeuvre alone, AS SOON AS IT BECOMES APPARENT that the give-way vessel is not taking appropriate action.",
    "why": "(i) \"Stand on\" doesn't mean \"do nothing forever\". It means \"be predictable so the give-way vessel can avoid you\". The give-way vessel is planning their manoeuvre based on your continuing course and speed — change either, and you ruin their solution. (ii) The \"may\" in (ii) is permissive: stand-on vessel CAN act early if it's clear the other side isn't responding, even though they're not yet required to.",
    "danish": "Skib med ret holder kurs",
    "src": "COL-17",
    "profileType": "skipper"

    "subcat": "Steering rules",

      "DS"
    ],
    "front": "Rule 17(b)(c) — When stand-on MUST act",
    "back": "(b) When, from any cause, the stand-on vessel finds herself so close that COLLISION CANNOT BE AVOIDED BY THE ACTION OF THE GIVE-WAY VESSEL ALONE, she SHALL TAKE SUCH ACTION AS WILL BEST AID to avoid collision. (c) A power-driven stand-on vessel, taking action under (a)(ii) in a crossing situation, shall NOT alter course to PORT for a vessel on her own port side.",
    "why": "(b) The \"moment of last clear chance\" — when the give-way vessel can't fix the problem alone. The stand-on must act decisively. By this point, both vessels are doing it. (c) Specific anti-collision rule: in a crossing situation under late action, turning to port toward a vessel on your port side puts you in front of them — exactly where they're trying to avoid. Always turn starboard or stop.",

    "front": "Rule 19 — Restricted visibility (general)",
    "back": "Applies in or near an area of restricted visibility. Every vessel must proceed at SAFE SPEED adapted to conditions. Power-driven vessels must have ENGINES READY for immediate manoeuvre. Every vessel must have due regard to prevailing circumstances when complying with Section I (Rules 4-10).",
    "why": "In fog, the rules change. You don't know the type or status of the other vessel from a radar contact alone — you can't apply the sail-vs-power hierarchy or right-of-way logic that requires \"in sight\". Engines ready means no delay if you must accelerate or reverse out of trouble. Safe speed is reduced — lower than in clear visibility.",

    "src": "COL-19",
    "profileType": "skipper"
  },

    "id": "c35",
    "cat": "COLREGs",
    "subcat": "Restricted visibility",
    "levels": [
      "DS"
    ],
    "front": "Rule 19(d) — Action when detecting another vessel by radar",
    "back": "A vessel which detects by radar alone the presence of another vessel must determine if a CLOSE-QUARTERS SITUATION is developing and/or risk of collision exists. If so, she must take avoiding action in AMPLE TIME, provided that when such action consists of an alteration of course, SO FAR AS POSSIBLE the following must be AVOIDED: (i) an alteration to PORT for a vessel forward of the beam (other than for a vessel being overtaken); (ii) an alteration of course toward a vessel abeam or abaft the beam.",
    "why": "(i) The \"no port turn\" rule for fog mirrors Rule 14 (head-on): if everyone defaults to starboard turns, two vessels both turning starboard end up well clear. Turning port could turn into another vessel's starboard turn — head-on collision. (ii) Turning toward a vessel behind you closes the range — wrong direction.",
    "danish": "Handling ved radar-kontakt i tåge",
    "src": "COL-19",
    "profileType": "skipper"
  },

    "front": "Rule 19(e) — Action on hearing fog signal forward of the beam",
    "back": "A vessel which hears apparently FORWARD OF HER BEAM the fog signal of another vessel, OR which cannot avoid a close-quarters situation with another vessel forward of her beam, must REDUCE HER SPEED to the minimum at which she can be kept on her course. She must, IF NECESSARY, take all her way off, and in any event navigate with EXTREME CAUTION until the danger of collision is over.",
    "why": "Sound in fog tells you direction roughly, not range. A foghorn forward of your beam means another vessel is somewhere ahead, and you don't know how close. Slowing to bare steerageway buys time to figure out the situation and react. \"Take all her way off\" = stop entirely if needed. This is the most direct tactical instruction in the COLREGs.",

    ],
    "front": "Wind effect on water level (storm surge) — what's the rule?",
    "back": "Sustained wind of force 6+ blowing onshore can pile water up, raising local water levels 30-100 cm above predictions. Offshore wind has the opposite effect — water blown away from the coast lowers levels. Effect is strongest in funnel-shaped bays and at the head of estuaries.",
    "why": "Wind transfers momentum to surface water; sustained wind moves significant volumes. Famous extreme: 1953 North Sea storm surge raised tide levels 3+ metres in the Netherlands and UK, killing 2,500 people. Less dramatic surges of 30-50 cm are common in any winter gale.",
    "danish": "Stormflod",
    "src": "RYA-NAV",
    "profileType": "skipper"
  },
  {

    "cat": "Tides",
