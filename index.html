// pointOfSail — top-down sailboat diagram for points-of-sail study.
//
// Params:
//   point — 'irons' | 'close-hauled' | 'close-reach' | 'beam-reach'
//           | 'broad-reach' | 'run'
//   tack  — 'starboard' | 'port' (ignored for irons & run, which are
//           symmetric)
//   showLabel — bool, default false. When true, renders the point-of-sail
//           name in the diagram. Default false because the flashcard
//           prompt already asks for the name; showing it on the front
//           would give away the answer. The card's back-face renderer
//           can flip this on if you want the name visible on reveal.
//
// Coordinate system:
//   viewBox 0 0 200 200. Wind blows DOWN from the top. Boat sits in
//   centre at (100, 100). Heading 0° = bow pointing into the wind
//   (up); positive degrees rotate clockwise (port tack). Negative
//   rotate counter-clockwise (starboard tack).
function renderPointOfSail(opts) {
  const HEADING_FROM_WIND = {
    'irons':        0,    // pointing straight into wind
    'close-hauled': 45,   // ~45° off the wind, can't sail closer
    'close-reach':  60,   // between close-hauled and beam reach
    'beam-reach':   90,   // wind on the beam (side)
    'broad-reach':  135,  // wind over the quarter
    'run':          180,  // dead downwind
  };
  const POINT_LABELS = {
    'irons':        'In irons (no-go)',
    'close-hauled': 'Close-hauled',
    'close-reach':  'Close reach',
    'beam-reach':   'Beam reach',
    'broad-reach':  'Broad reach',
    'run':          'Run',
  };
  // Sail angle off centreline. 0° = sheeted in tight along boat axis,
  // 90° = perpendicular (boom all the way out). Rough but recognisable.
  const SAIL_ANGLE = {
    'irons':        0,
    'close-hauled': 15,
    'close-reach':  30,
    'beam-reach':   55,
    'broad-reach':  75,
    'run':          85,
  };

  const {
    point,
    tack = 'starboard',
    showLabel = false,
  } = opts;

  // Heading conversion: HEADING_FROM_WIND is the angle off dead-upwind.
  // On starboard tack, wind hits starboard (right) side -> boat angles
  // to LEFT of wind line (negative rotation). Port tack mirrors.
  let headingDeg = HEADING_FROM_WIND[point];
  const isAsymmetric = point !== 'irons' && point !== 'run';
  if (isAsymmetric) {
    headingDeg = tack === 'starboard' ? -headingDeg : headingDeg;
  }

  // Sail boom always swings to leeward. On starboard tack, leeward is
  // port (left in boat-local frame = -1). On port tack, leeward is
  // starboard (right = +1). For irons, sail is centred. For run, we
  // arbitrarily put it to port for a recognisable shape.
  let sailAngleDeg = SAIL_ANGLE[point];
  let sailSide = -1;
  if (point === 'irons') {
    sailAngleDeg = 0;
  } else if (point === 'run') {
    sailSide = -1;
  } else {
    sailSide = tack === 'starboard' ? -1 : 1;
  }

  const parts = [];

  // 1. Background compass ring — dashed circle, low contrast.
  parts.push(`<circle cx="100" cy="100" r="78" fill="none" stroke="#d6e0eb" stroke-width="1" stroke-dasharray="2 3"/>`);

  // 2. No-go zone — wedge ±45° from dead upwind. Pale red.
  //    Geometry: arc from (44.85, 44.85) to (155.15, 44.85), radius 78.
  parts.push(`<path d="M 100 100 L 44.85 44.85 A 78 78 0 0 1 155.15 44.85 Z" fill="#d32f2f" fill-opacity="0.08" stroke="#d32f2f" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="3 3"/>`);

  // 3. Wind arrow at top of viewBox, pointing down.
  parts.push(`<g stroke="#0a3d62" stroke-width="2" stroke-linecap="round" fill="none"><line x1="100" y1="6" x2="100" y2="30"/><polyline points="93,22 100,32 107,22" stroke-linejoin="round"/></g><text x="100" y="3" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0a3d62" font-weight="600">WIND</text>`);

  // 4. Boat group — rotated to heading. Drawn pointing up (0° = bow
  //    into wind) in its local frame; parent transform rotates it.
  const boatParts = [];
  // Hull as a teardrop/leaf shape, bow up.
  boatParts.push(`<path d="M 0,-26 C 8,-18 10,0 7,18 L 0,24 L -7,18 C -10,0 -8,-18 0,-26 Z" fill="#ffffff" stroke="#0a3d62" stroke-width="1.8" stroke-linejoin="round"/>`);
  // Mast — small filled dot near the bow.
  boatParts.push(`<circle cx="0" cy="-10" r="2" fill="#0a3d62"/>`);

  if (point !== 'irons') {
    // Boom + sail curve. Compute boom endpoint and a Bezier control
    // point offset perpendicular to the boom toward leeward, so the
    // sail bellies out the correct way.
    const boomLen = 22;
    const rad = (sailAngleDeg * Math.PI) / 180;
    const boomDirX = sailSide * Math.sin(rad);
    const boomDirY = Math.cos(rad);
    const boomEndX = boomLen * boomDirX;
    const boomEndY = -10 + boomLen * boomDirY;
    const bellyMag = 5;
    const midX = boomEndX / 2;
    const midY = (-10 + boomEndY) / 2;
    // Perpendicular to boom = rotate (boomDirX, boomDirY) by 90°
    // -> (boomDirY, -boomDirX). Multiply by sailSide to face leeward.
    const ctrlX = midX + sailSide *  boomDirY * bellyMag;
    const ctrlY = midY + sailSide * -boomDirX * bellyMag;
    boatParts.push(`<path d="M 0,-10 Q ${ctrlX.toFixed(1)},${ctrlY.toFixed(1)} ${boomEndX.toFixed(1)},${boomEndY.toFixed(1)}" stroke="#1a5490" stroke-width="2.2" fill="none" stroke-linecap="round"/>`);
    // Sheet line — thin dashed line from clew back to stern.
    boatParts.push(`<line x1="${boomEndX.toFixed(1)}" y1="${boomEndY.toFixed(1)}" x2="0" y2="22" stroke="#7a8a9e" stroke-width="0.8" stroke-dasharray="1 2"/>`);
  } else {
    // In irons: sail luffing along centreline. Short dashed line aft.
    boatParts.push(`<line x1="0" y1="-10" x2="0" y2="14" stroke="#7a8a9e" stroke-width="2" stroke-dasharray="3 2" stroke-linecap="round"/>`);
  }
  parts.push(`<g transform="translate(100,100) rotate(${headingDeg})">${boatParts.join('')}</g>`);

  // 5. Optional label (used on back-face renders, off by default).
  if (showLabel) {
    parts.push(`<text x="100" y="188" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="13" font-weight="600" fill="#1a2e44">${POINT_LABELS[point]}</text>`);
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">${parts.join('')}</svg>`;
}

// Registry of available generators. Keys are the string values stored
// in card.front_image_gen.
const IMAGE_GENERATORS = {
  'cardinalMark': renderCardinalMark,
  'pointOfSail':  renderPointOfSail,
  'boatAnatomy':  renderBoatAnatomy,
};

// Helper: produce the SVG markup for an image card, whether from a
// generator or from the static front_image string. Returns an SVG
// string ready to drop into a container, or empty string if neither
// source is present. Used by both flashcard and browse-mode renderers.
function getImageMarkup(card) {
  let svg = null;

  // Generator path: card specifies a registered generator + params.
  if (card.front_image_gen && IMAGE_GENERATORS[card.front_image_gen]) {
    const params = card.front_image_params || {};
    try {
      svg = IMAGE_GENERATORS[card.front_image_gen](params);
    } catch (err) {
      // Defensive: if a generator throws, don't crash the whole card.
      // Log and fall through to static front_image (if any) or return
      // an empty placeholder.
      console.error('Image generator failed:', card.front_image_gen, err);
    }
  }

  // Static path: raw SVG string or image URL.
  if (svg === null) {
    const src = (card.front_image || '').trim();
    if (!src) return '';
    if (src.startsWith('<svg')) {
      svg = src;
    } else {
      // Treat anything else as an image URL/data URI.
      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(card.front_alt || '')}" />`;
    }
  }

  // v16 defensive sizing: inject width/height/preserveAspectRatio into
  // the root <svg> tag if not already present. This is belt-and-braces
  // alongside the CSS fix (min-width:0; min-height:0; display:block on
  // .image-front-svg svg and .quiz-question-image svg) for a known
  // Chrome/Firefox bug where inline SVG without explicit sizing
  // attributes collapses to 0x0 inside a flex container with
  // aspect-ratio. Authors should NOT add width/height on the SVG
  // themselves — let this helper standardise it.
  return ensureSvgSizing(svg);
}

// Inject width="100%" height="100%" preserveAspectRatio="xMidYMid meet"
// into the root <svg ...> opening tag if those attributes are not
// already present. Idempotent: re-running on a sized SVG is a no-op.
// Operates on the FIRST occurrence of `<svg` only — nested <svg>
// elements (rare but legal) are untouched, which is what we want.
function ensureSvgSizing(svgStr) {
  if (!svgStr || !svgStr.startsWith('<svg')) return svgStr;
  // Find end of the opening <svg ...> tag. Doesn't break on attribute
  // values containing ">" because none of our generators produce that.
  const endOfOpen = svgStr.indexOf('>');
  if (endOfOpen < 0) return svgStr;
  const openTag = svgStr.slice(0, endOfOpen);
  const rest    = svgStr.slice(endOfOpen);
  const addAttr = (tag, name, value) =>
    new RegExp('\\b' + name + '\\s*=').test(tag) ? tag : (tag + ` ${name}="${value}"`);
  let fixed = openTag;
  fixed = addAttr(fixed, 'width',  '100%');
  fixed = addAttr(fixed, 'height', '100%');
  fixed = addAttr(fixed, 'preserveAspectRatio', 'xMidYMid meet');
  return fixed + rest;
}

// v18.1: Extract viewBox aspect ratio class from an inline SVG string.
// Returns one of:
//   'aspect-landscape' — width > height (e.g. side-view boat 600x320)
//   'aspect-portrait'  — height > width (e.g. cardinal mark 200x280)
//   'aspect-square'    — within ±15% of square (e.g. pointOfSail 200x200)
//   '' (empty)         — couldn't parse a viewBox
// The class is applied to the container so CSS can size landscape SVGs
// wider (good use of horizontal space) and portrait/square ones
// narrower (to avoid eating the whole mobile screen). Without this
// hint, one max-width number can't satisfy both extremes — anatomy
// side-view wants ~480px, cardinal mark wants ~280px.
function getSvgAspectClass(svgStr) {
  if (!svgStr || !svgStr.startsWith('<svg')) return '';
  const m = svgStr.match(/viewBox\s*=\s*"([^"]+)"/);
  if (!m) return '';
  const parts = m[1].trim().split(/[\s,]+/).map(Number);
  if (parts.length !== 4 || parts.some(isNaN)) return '';
  const w = parts[2], h = parts[3];
  if (w <= 0 || h <= 0) return '';
  const ratio = w / h;
  if (ratio > 1.15) return 'aspect-landscape';
  if (ratio < 0.85) return 'aspect-portrait';
  return 'aspect-square';
}

// IMAGE card body: front shows the prompt + an SVG/image to identify,
// back shows the answer + the same image smaller alongside, plus the
// alt-text description for accessibility-when-flipped and as a written
// sanity check the user can compare against.
//
// Image source resolution (handled by getImageMarkup):
//   1. If front_image_gen is set, call the named generator.
//   2. Else, use front_image as raw inline SVG or as an img src.
//
// `front_alt` is accessibility metadata: it is NEVER shown as visible
// text on the front (that would give the answer away). It is used for
// aria-label / title on the front, and rendered as small italic text
// on the back.
function renderImageCardBody(card, flipped) {
  // SECURITY NOTE: card data is authored statically in this file, not
  // user-supplied, so embedding raw SVG without sanitising is safe in
  // this app. Treat that as a fixed constraint of the deck.
  const imgHtml = getImageMarkup(card);

  // Accessibility attributes for the SVG container. `aria-label` is
  // read by screen readers; `title` is the hover tooltip. Both safe
  // for the front face — they don't visually leak the answer to a
  // sighted learner.
  const a11yAttrs = card.front_alt
    ? `role="img" aria-label="${escapeHtml(card.front_alt)}" title="${escapeHtml(card.front_alt)}"`
    : '';

  if (!flipped) {
    // Front face: prompt at top (matches basic-card style), then the
    // image to identify. NO visible alt text — that would be the
    // answer. Alt is only conveyed via aria-label for screen readers.
    // v18.1: aspect class added so portrait and landscape SVGs get
    // different max-width treatment on mobile.
    const aspectCls = getSvgAspectClass(imgHtml);
    return {
      body: `
        <div class="card-front">${escapeHtml(card.front || '')}</div>
        <div class="image-front-container">
          <div class="image-front-svg ${aspectCls}" ${a11yAttrs}>
            ${imgHtml}
          </div>
        </div>
        <div class="flip-hint">Tap card or press Space to identify</div>`,
      showRating: false,
    };
  }
  // Back face: smaller image, then the alt-text description in italics
  // (now safe to show — the user has already committed to an answer),
  // then the actual answer block + extras + source line.
  return {
    body: `
      <div class="image-back-image" ${a11yAttrs}>
        ${imgHtml}
      </div>
      ${card.front_alt ? `<div class="image-back-alt">${escapeHtml(card.front_alt)}</div>` : ''}
      <div class="card-back-content">
        <div class="answer-section">
          <span class="label">Answer</span>
          ${escapeHtml(card.back || '')}
        </div>
        ${renderCardExtras(card)}
      </div>
      ${renderSourceLine(card)}`,
    showRating: true,
  };
}

function renderFlashcards() {
  const cards = getFlashcardPool();
  const catOptions = `
    <option value="all">All categories (${CARDS.length})</option>
    <option value="due">Due for review</option>
    <option value="weak">Weak cards</option>
    <option value="unseen">Unseen</option>
    ${buildCatOptionsHtml(flashcardFilter)}
  `;
  const levelOptions = `
    <option value="all">All levels</option>
    ${LEVELS.map(lv => `<option value="${lv}">${LEVEL_LABELS[lv]} (${CARDS.filter(c => c.levels && c.levels.includes(lv)).length})</option>`).join('')}
  `;

  const controls = `
    <div class="controls-row">
      <label class="field-label">Deck</label>
      <select id="fc-filter">${catOptions}</select>
      <label class="field-label">Level</label>
      <select id="fc-level">${levelOptions}</select>
      <button class="btn secondary small" id="fc-shuffle">↻ Shuffle</button>
    </div>
  `;

  if (cards.length === 0) {
    return controls + '<div class="empty-state">No cards match these filters.</div>';
  }

  if (flashcardIndex >= cards.length) flashcardIndex = 0;
  const card = cards[flashcardIndex];
  const cs = getCardState(card.id);

  // Dispatch on card kind. The body and rating-row visibility are
  // determined by the per-kind renderer.
  const { body, showRating, gradingLocked } = renderCardBody(card, flashcardFlipped);

  // Build the rating row. Two shapes:
  //   - normal: full 4-button SRS rating row (again / hard / good / easy)
  //   - locked: single "Continue" button that grades as `gradingLocked`
  //     (e.g. calc cards where the user skipped to working — spec says
  //     auto-grade as 'again', but we still let them read the working
  //     before clicking Continue to advance).
  let ratingRowHtml = '';
  if (showRating) {
    if (gradingLocked) {
      const labelMap = {
        again: { label: 'Continue', sub: 'graded as "forgot it"' },
        hard:  { label: 'Continue', sub: 'graded as "struggled"' },
        good:  { label: 'Continue', sub: 'graded as "got it"' },
        easy:  { label: 'Continue', sub: 'graded as "easy"' },
      };
      const m = labelMap[gradingLocked] || labelMap.again;
      ratingRowHtml = `
        <div class="rating-row rating-row-locked">
          <button class="${escapeHtml(gradingLocked)}" data-grade="${escapeHtml(gradingLocked)}">
            <span class="rate-label">${escapeHtml(m.label)}</span>
            <span class="rate-time">${escapeHtml(m.sub)}</span>
          </button>
        </div>
      `;
    } else {
      ratingRowHtml = `
        <div class="rating-row">
          <button class="again" data-grade="again">
            <span class="rate-label">Forgot it</span>
            <span class="rate-time">show again now</span>
          </button>
          <button class="hard" data-grade="hard">
            <span class="rate-label">Struggled</span>
            <span class="rate-time">~1 day</span>
          </button>
          <button class="good" data-grade="good">
            <span class="rate-label">Got it</span>
            <span class="rate-time">~3-6 days</span>
          </button>
          <button class="easy" data-grade="easy">
            <span class="rate-label">Easy</span>
            <span class="rate-time">~3 weeks+</span>
          </button>
        </div>
      `;
    }
  }

  return controls + `
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" data-card-kind="${escapeHtml(card.kind || 'basic')}">
        <div class="card-meta">
          <span class="category">${escapeHtml(card.cat)}</span>
          <div class="levels-display">${renderLevelChips(card.levels)}</div>
          <span class="review-info">${cs.reviews}× · ${cs.lastResult || 'new'}</span>
        </div>
        ${body}
      </div>

      ${ratingRowHtml}

      <div class="nav-row">
        <button class="btn secondary small" id="fc-prev">← Prev</button>
        <span class="progress-meter">${flashcardIndex + 1} / ${cards.length}</span>
        <button class="btn secondary small" id="fc-next">Next →</button>
      </div>
    </div>
  `;
}

function renderQuiz() {
  if (!quizState) {
    return `
      <h2 class="section">Quiz</h2>
      <div class="info-card">
        <p>Multiple-choice questions drawn from the cards. Wrong answers automatically mark cards for extra review.</p>
      </div>
      <div class="controls-row">
        <label class="field-label">Scope</label>
        <select id="quiz-scope">
          <option value="all">All topics</option>
          ${buildCatOptionsHtml(null)}
        </select>
        <label class="field-label">Level</label>
        <select id="quiz-level">
          <option value="all">All levels</option>
          ${LEVELS.map(lv => `<option value="${lv}">${LEVEL_LABELS[lv]}</option>`).join('')}
        </select>
        <label class="field-label">Length</label>
        <select id="quiz-length">
          <option value="10">10 questions</option>
          <option value="20" selected>20 questions</option>
          <option value="30">30 questions</option>
        </select>
        <button class="btn" id="quiz-start">Start Quiz</button>
      </div>
    `;
  }

  if (quizState.finished) {
    const pct = Math.round((quizState.correct / quizState.questions.length) * 100);
    return `
      <div class="quiz-summary">
        <div class="score">${pct}%</div>
        <div class="score-label">${quizState.correct} of ${quizState.questions.length} correct</div>
        <div class="summary-actions">
          <button class="btn" id="quiz-restart">New Quiz</button>
          <button class="btn secondary" id="quiz-review-wrong">Review wrong cards</button>
        </div>
      </div>
    `;
  }

  const q = quizState.questions[quizState.idx];
  const answered = quizState.answers[quizState.idx] !== undefined;
  const chosen = quizState.answers[quizState.idx];

  return `
    <div style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
      <span class="progress-meter">Question ${quizState.idx + 1} of ${quizState.questions.length}</span>
      <span class="progress-meter">Score: ${quizState.correct}</span>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">${escapeHtml(q.question)}</div>
      ${q.questionImageHtml ? `
        <div class="quiz-question-image ${getSvgAspectClass(q.questionImageHtml)}"
             role="img"
             aria-label="${escapeHtml(q.questionImageAlt || '')}"
             title="${escapeHtml(q.questionImageAlt || '')}">
          ${q.questionImageHtml}
        </div>
      ` : ''}
      <div class="quiz-options">
        ${q.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (answered) {
            if (i === q.correctIndex) cls += ' correct';
            else if (i === chosen) cls += ' wrong';
          }
          return `<button class="${cls}" data-opt="${i}" ${answered ? 'disabled' : ''}>
            <span class="letter">${String.fromCharCode(65+i)}</span>
            <span>${escapeHtml(opt)}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered ? `
        <div class="quiz-feedback ${chosen === q.correctIndex ? 'correct' : 'wrong'}">
          <strong>${chosen === q.correctIndex ? '✓ Correct.' : '✗ Not quite.'}</strong>
          ${escapeHtml(q.explanation)}
          ${q.why ? `<div class="why-block"><span class="label">Why?</span>${escapeHtml(q.why)}</div>` : ''}
          ${q.source ? `<div style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:8px;">Source: ${escapeHtml(q.source)}</div>` : ''}
        </div>
        <div style="margin-top: 16px; text-align: right;">
          <button class="btn" id="quiz-next">${quizState.idx === quizState.questions.length - 1 ? 'Finish →' : 'Next →'}</button>
        </div>
      ` : ''}
    </div>
  `;
}

// Many cards have a `front` field that is just a term ("Bow", "Cleat")
// or a topic label ("Vessel at anchor — light"), not a real question.
// Showing one of those raw as a quiz prompt leaves the user with no
// idea what's being asked. This helper guarantees the prompt always
// reads as a question:
//   - if the front already ends with "?", trust the author and use it as-is
//   - otherwise, wrap it in a generic "What is meant by..." form
// We also strip a trailing "— xyz" qualifier into the question stem so
// prompts like `Vessel at anchor — light` become a clear question about
// the qualifier ("...the light").
function phraseAsQuestion(rawFront) {
  const front = (rawFront || '').trim();
  if (!front) return 'Which option matches this card?';
  if (front.endsWith('?')) return front;
  // Split on em-dash or hyphen-dash patterns used in the deck:
  //   "Topic — sub-aspect"  →  topic = "Topic", aspect = "sub-aspect"
  const dashMatch = front.match(/^(.+?)\s+[—–-]\s+(.+)$/);
  if (dashMatch) {
    const topic = dashMatch[1].trim();
    const aspect = dashMatch[2].trim();
    // If the aspect itself is already an interrogative phrase
    // ("what is it?", "procedure?"), the original was effectively
    // a question and we just re-punctuate it.
    if (/\?$/.test(aspect)) return `${topic} — ${aspect}`;
    return `${topic} — what about ${aspect}?`;
  }
  return `What is meant by "${front}"?`;
}

function buildQuiz(scope, level, length) {
  let pool;
  if (scope === 'all') {
    pool = CARDS;
  } else if (scope.includes(SUBCAT_SEP)) {
    const [cat, sub] = scope.split(SUBCAT_SEP);
    pool = CARDS.filter(c => c.cat === cat && c.subcat === sub);
  } else {
    pool = CARDS.filter(c => c.cat === scope);
  }
  pool = pool.filter(c => passesLevelFilter(c, level));
  // Multiple-choice quiz uses card.front <-> card.back text. Drill cards
  // have an ordered `steps` array instead of a single `back` string, so
  // they don't fit the quiz format. Calc cards have a structured numeric
  // answer rather than a single text string. Both excluded from the
  // quiz pool — as question targets AND as distractor sources (a drill
  // or calc as a distractor would render `undefined` as an option).
  //
  // Image cards ARE quizzable: question = the SVG image, options =
  // text from `back` field of sibling image cards. Forward direction
  // only (asking "name this image"); reverse doesn't make sense.
  pool = pool.filter(c => {
    const k = c.kind || 'basic';
    return k === 'basic' || k === 'image';
  });
  if (pool.length < 4) return null;
  const picks = shuffle(pool).slice(0, Math.min(length, pool.length));
  const questions = picks.map(card => {
    const kind = card.kind || 'basic';
    // Image cards force forward-only quizzing. Distractor pool also
    // restricted to image cards so options are point-of-sail names,
    // not random text from the broader category.
    if (kind === 'image') {
      const sameCatImages = pool.filter(c =>
        (c.kind || 'basic') === 'image' &&
        c.cat === card.cat &&
        c.id !== card.id
      );
      const distractorPool = sameCatImages.length >= 3
        ? sameCatImages
        : pool.filter(c => (c.kind || 'basic') === 'image' && c.id !== card.id);
      // Need at least 3 distractors of the same kind. If not enough
      // image cards exist, fall back to using card.front (the prompt)
      // as a degenerate question and skip rendering the image —
      // but in practice we should have enough. Bail safely on
      // insufficient pool.
      if (distractorPool.length < 3) {
        // Degrade gracefully: treat as a regular text card if there
        // aren't enough image siblings to form a quiz question.
        const samCat = pool.filter(c => c.cat === card.cat && c.id !== card.id);
        const fallbackDistractors = shuffle(samCat).slice(0, 3).map(c => c.back || c.front);
        const allFallback = shuffle([card.back, ...fallbackDistractors]);
        return {
          question: phraseAsQuestion(card.front),
          options: allFallback,
          correctIndex: allFallback.indexOf(card.back),
          explanation: card.back,
          why: card.why,
          source: card.src,
          cardId: card.id,
        };
      }
      const distractors = shuffle(distractorPool).slice(0, 3).map(c => c.back);
      const all = shuffle([card.back, ...distractors]);
      return {
        question: card.front || 'What does this image show?',
        questionImageHtml: getImageMarkup(card),
        questionImageAlt: card.front_alt || '',
        options: all,
        correctIndex: all.indexOf(card.back),
        explanation: card.back,
        why: card.why,
        source: card.src,
        cardId: card.id,
      };
    }
    // Basic card path (unchanged behaviour).
    const reverse = Math.random() < 0.4;
    const correctText = reverse ? card.front : card.back;
    const questionText = reverse ? `Which term matches: "${card.back}"` : phraseAsQuestion(card.front);
    // Restrict distractor pool to basic cards too — picking an image
    // card's `back` here would be a fine text option, but picking
    // its `front` (which is just "Identify this cardinal mark") would
    // produce a meaningless distractor in reverse mode.
    const samCat = pool.filter(c =>
      (c.kind || 'basic') === 'basic' &&
      c.cat === card.cat &&
      c.id !== card.id
    );
    const distractorPool = samCat.length >= 3
      ? samCat
      : pool.filter(c => (c.kind || 'basic') === 'basic' && c.id !== card.id);
    const distractors = shuffle(distractorPool).slice(0, 3).map(c => reverse ? c.front : c.back);
    const all = shuffle([correctText, ...distractors]);
    const correctIndex = all.indexOf(correctText);
    return {
      question: questionText,
      options: all,
      correctIndex,
      explanation: reverse ? `${card.front} — ${card.back}` : card.back,
      why: card.why,
      source: card.src,
      cardId: card.id,
    };
  });
  return { questions, idx: 0, answers: {}, correct: 0, finished: false };
}

function renderBrowse() {
  const catOptions = `
    <option value="all">All categories</option>
    ${buildCatOptionsHtml(browseFilter)}
  `;
  const levelOptions = `
    <option value="all">All levels</option>
    ${LEVELS.map(lv => `<option value="${lv}" ${browseLevelFilter===lv?'selected':''}>${LEVEL_LABELS[lv]}</option>`).join('')}
  `;
  let cards;
  if (browseFilter === 'all') {
    cards = CARDS;
  } else if (browseFilter.includes(SUBCAT_SEP)) {
    const [cat, sub] = browseFilter.split(SUBCAT_SEP);
    cards = CARDS.filter(c => c.cat === cat && c.subcat === sub);
  } else {
    cards = CARDS.filter(c => c.cat === browseFilter);
  }
  cards = cards.filter(c => passesLevelFilter(c, browseLevelFilter));
  if (browseSearch) {
    const q = browseSearch.toLowerCase();
    cards = cards.filter(c => {
      // Search across all human-readable fields. Each field is checked
      // defensively because card kinds vary in which fields they have:
      //   basic: front + back
      //   drill: front + steps[].text
      //   calc:  front (problem statement) + workings[].step/explanation
      //   image: front (label) + back (answer)
      if (c.front && c.front.toLowerCase().includes(q)) return true;
      if (c.back && c.back.toLowerCase().includes(q)) return true;
      if (c.danish && c.danish.toLowerCase().includes(q)) return true;
      if (c.why && c.why.toLowerCase().includes(q)) return true;
      if (Array.isArray(c.steps) && c.steps.some(s => s.text && s.text.toLowerCase().includes(q))) return true;
      if (Array.isArray(c.workings) && c.workings.some(w =>
        (w.step && w.step.toLowerCase().includes(q)) ||
        (w.explanation && w.explanation.toLowerCase().includes(q))
      )) return true;
      if (c.front_alt && c.front_alt.toLowerCase().includes(q)) return true;
      return false;
    });
  }
  return `
    <div class="controls-row">
      <label class="field-label">Filter</label>
      <select id="br-filter">${catOptions}</select>
      <label class="field-label">Level</label>
      <select id="br-level">${levelOptions}</select>
      <input type="text" id="br-search" placeholder="Search…" value="${escapeHtml(browseSearch)}" style="flex:1; min-width: 160px;" />
    </div>
    <div class="browse-list">
      ${cards.length === 0 ? '<div class="empty-state">No matches.</div>' : cards.map(c => {
        const cs = getCardState(c.id);
        const expanded = browseExpanded === c.id;
        if (expanded) {
          // Body content depends on card kind:
          //   basic: c.back as plain text
          //   drill: ordered step list
          //   calc:  problem statement + working steps + final answer
          //   image: the SVG/image inline + c.back as identification
          const kind = c.kind || 'basic';
          let detailHtml;
          if (kind === 'drill' && Array.isArray(c.steps)) {
            detailHtml = `<ol class="term-detail" style="margin:0; padding-left:20px;">
                 ${c.steps.map(s => `<li style="margin-bottom:6px;">${escapeHtml(s.text)}</li>`).join('')}
               </ol>`;
          } else if (kind === 'calc') {
            const ans = c.answer || {};
            const units = ans.units || {};
            const keys = Object.keys(ans).filter(k => k !== 'units');
            const workingsHtml = Array.isArray(c.workings) ? c.workings.map((w, i) =>
              `<li style="margin-bottom:8px;"><strong>${escapeHtml(w.step || '')}:</strong> ${escapeHtml(w.explanation || '')}</li>`
            ).join('') : '';
            const ansHtml = keys.map(k => {
              const v = ans[k];
              const u = (units[k] && (typeof units[k] !== 'string' || !units[k].toUpperCase().includes('HH:MM'))) ? ` ${units[k]}` : '';
              return `<span style="margin-right:14px;"><strong>${escapeHtml(k)}:</strong> ${escapeHtml(String(v))}${escapeHtml(u)}</span>`;
            }).join('');
            detailHtml = `
              <div class="term-detail" style="white-space:pre-wrap; margin-bottom:10px;">${escapeHtml(c.front || '')}</div>
              ${workingsHtml ? `<ol style="margin:0 0 10px; padding-left:20px; font-size:13px; color:var(--ink-2);">${workingsHtml}</ol>` : ''}
              <div style="padding:8px 12px; background:var(--navy-light); border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:13px;">
                <strong>Answer:</strong> ${ansHtml}
              </div>`;
          } else if (kind === 'image') {
            // Use the shared image-markup helper so generated and
            // static images both render correctly in the browse list.
            const imgMarkup = getImageMarkup(c);
            detailHtml = `
              <div style="display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;">
                <div style="width:140px; height:140px; flex-shrink:0; background:white; border:1px solid var(--rule); border-radius:8px; padding:8px; display:flex; align-items:center; justify-content:center;">
                  ${imgMarkup}
                </div>
                <div class="term-detail" style="flex:1; min-width:200px;">${escapeHtml(c.back || '')}</div>
              </div>`;
          } else {
            detailHtml = `<div class="term-detail">${escapeHtml(c.back || '')}</div>`;
          }
          // Tiny visual marker in the front line so each non-basic
          // kind is visually distinct in the browse list.
          const kindBadgeColor = { drill: 'var(--flag-blue)', calc: '#6a4caf', image: '#0d8a6b' }[kind] || '';
          const kindBadge = (kind !== 'basic')
            ? `<span style="font-size:10px; font-weight:600; padding:2px 6px; background:${kindBadgeColor}; color:white; border-radius:4px; margin-left:6px; text-transform:uppercase;">${kind}</span>`
            : '';
          return `<div class="browse-item expanded" data-card-id="${c.id}">
            <div class="row-top">
              <span class="cat-tag">${escapeHtml(c.cat)}</span>
              <div>${renderLevelChips(c.levels)}</div>
              <span class="stat" style="margin-left:auto;">${cs.reviews}× · ${cs.lastResult || 'new'}</span>
            </div>
            <div class="term">${escapeHtml(c.front)}${kindBadge}</div>
            ${detailHtml}
            ${c.why ? `<div class="why-detail"><span class="label">Why?</span>${escapeHtml(c.why)}</div>` : ''}
            ${c.danish ? `<div class="danish-detail">DA — ${escapeHtml(c.danish)}</div>` : ''}
            <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-top:10px;">Source: <span class="src-tag" data-src-code="${escapeHtml(c.src)}" title="View source">${escapeHtml(c.src)}</span></div>
          </div>`;
        }
        return `<div class="browse-item" data-card-id="${c.id}">
          <div class="row-top">
            <span class="cat-tag">${escapeHtml(c.cat)}</span>
            <div>${renderLevelChips(c.levels)}</div>
            <span class="term" style="flex:1;">${escapeHtml(c.front)}</span>
            <span class="stat">${cs.reviews}×</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderProgress() {
  const total = CARDS.length;
  const seen = CARDS.filter(c => getCardState(c.id).reviews > 0).length;
  const mastered = CARDS.filter(c => {
    const cs = getCardState(c.id);
    return cs.reviews >= 2 && (cs.lastResult === 'good' || cs.lastResult === 'easy');
  }).length;
  const weak = CARDS.filter(c => {
    const cs = getCardState(c.id);
    return cs.lastResult === 'again' || cs.lastResult === 'hard' || (cs.lapses || 0) >= 2;
  }).length;
  const due = CARDS.filter(c => {
    const cs = getCardState(c.id);
    return cs.reviews > 0 && cs.due <= Date.now();
  }).length;

  const catRows = CATEGORIES.map(cat => {
    const inCat = CARDS.filter(c => c.cat === cat);
    const masteredInCat = inCat.filter(c => {
      const cs = getCardState(c.id);
      return cs.reviews >= 2 && (cs.lastResult === 'good' || cs.lastResult === 'easy');
    }).length;
    const pct = Math.round((masteredInCat / inCat.length) * 100);
    return `<div class="cat-progress-row">
      <span>${escapeHtml(cat)}</span>
      <div class="bar"><div class="fill" style="width: ${pct}%"></div></div>
      <span class="pct">${masteredInCat}/${inCat.length}</span>
    </div>`;
  }).join('');

  const levelRows = LEVELS.map(lv => {
    const inLevel = CARDS.filter(c => c.levels && c.levels.includes(lv));
    if (inLevel.length === 0) return '';
    const masteredInLevel = inLevel.filter(c => {
      const cs = getCardState(c.id);
      return cs.reviews >= 2 && (cs.lastResult === 'good' || cs.lastResult === 'easy');
    }).length;
    const pct = Math.round((masteredInLevel / inLevel.length) * 100);
    return `<div class="cat-progress-row">
      <span>${LEVEL_LABELS[lv]} <span class="level-chip level-${lv}" style="margin-left:6px;">${lv}</span></span>
      <div class="bar"><div class="fill" style="width: ${pct}%"></div></div>
      <span class="pct">${masteredInLevel}/${inLevel.length}</span>
    </div>`;
  }).join('');

  return `
    <h2 class="section">Progress — ${escapeHtml(activeProfile)}</h2>
    <div class="progress-grid">
      <div class="progress-stat"><div class="num">${seen}</div><div class="label">Cards seen</div></div>
      <div class="progress-stat"><div class="num">${mastered}</div><div class="label">Mastered</div></div>
      <div class="progress-stat"><div class="num">${weak}</div><div class="label">Weak</div></div>
      <div class="progress-stat"><div class="num">${due}</div><div class="label">Due now</div></div>
    </div>

    <h3 class="subsection">By category</h3>
    ${catRows}

    <h3 class="subsection">By level</h3>
    ${levelRows}

    <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--rule);">
      <button class="btn danger" id="reset-progress">Reset this profile\'s progress</button>
      <span style="margin-left: 12px; color: var(--muted); font-size: 12px;">Wipes all card history for ${escapeHtml(activeProfile)}.</span>
    </div>
  `;
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */
function attachHandlers() {
  document.querySelectorAll('#mode-nav button').forEach(b => {
    b.onclick = () => {
      flashcardFlipped = false;
      flashcardIndex = 0;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      browseExpanded = null;
      setMode(b.dataset.mode);
    };
  });

  if (currentMode === 'flashcards') {
    const f = document.getElementById('fc-filter');
    if (f) {
      f.value = flashcardFilter;
      f.onchange = e => {
        flashcardFilter = e.target.value;
        flashcardIndex = 0;
        flashcardFlipped = false;
        drillStepIndex = 0;
        calcAnswerSubmitted = null;
        calcAnswerInput = {};
        render();
      };
    }
    const lv = document.getElementById('fc-level');
    if (lv) {
      lv.value = flashcardLevelFilter;
      lv.onchange = e => {
        flashcardLevelFilter = e.target.value;
        flashcardIndex = 0;
        flashcardFlipped = false;
        drillStepIndex = 0;
        calcAnswerSubmitted = null;
        calcAnswerInput = {};
        render();
      };
    }
    const sh = document.getElementById('fc-shuffle');
    if (sh) sh.onclick = () => {
      const cards = getFlashcardPool(true);  // force re-shuffle
      if (cards.length === 0) return;
      flashcardIndex = 0;  // start from the top of the new order
      flashcardFlipped = false;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      render();
    };
    // Card surface click. Behaviour depends on card kind + state:
    //   - basic, unflipped:  flip to reveal answer
    //   - basic, flipped:    flip back to front
    //   - drill, unflipped:  start the drill (flip + show step 1)
    //   - drill, mid-drill:  advance to next step (DON'T close — would
    //                        lose progress and force the user to redo
    //                        every step they've already revealed)
    //   - drill, all shown:  flip back to front (start over)
    const fc = document.getElementById('flashcard');
    if (fc) fc.onclick = (e) => {
      // Don't hijack clicks on the explicit "Next step" button; its own
      // handler runs and we'd otherwise advance twice.
      if (e.target && e.target.closest('#drill-next-btn')) return;
      // Calc card buttons and inputs handle themselves — letting the
      // surface tap fall through would either swallow input clicks or
      // collapse the revealed view at the wrong time.
      if (e.target && e.target.closest('.calc-input-row')) return;
      const cards = getFlashcardPool();
      const card = cards[flashcardIndex];
      handleCardSurfaceAdvance(card);
      render();
    };
    // Dedicated "Next step" button on drill cards. Runs the same advance
    // logic but stops propagation so the surface-click handler doesn't
    // also fire (which would cause double-advances).
    const drillNextBtn = document.getElementById('drill-next-btn');
    if (drillNextBtn) drillNextBtn.onclick = (e) => {
      e.stopPropagation();
      const cards = getFlashcardPool();
      const card = cards[flashcardIndex];
      handleCardSurfaceAdvance(card);
      render();
    };

    // Calc card: keep the typed values in calcAnswerInput as the user
    // types so a re-render doesn't wipe them. Each input carries its
    // key on data-calc-key.
    document.querySelectorAll('.flashcard .calc-input-fields input[data-calc-key]').forEach(inp => {
      inp.oninput = (e) => {
        const k = e.target.dataset.calcKey;
        if (k) calcAnswerInput[k] = e.target.value;
      };
      // Enter on any calc input acts like clicking "Check answer".
      inp.onkeydown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('calc-submit-btn')?.click();
        }
      };
    });
    // Calc "Check answer" — runs the tolerance check and flips into the
    // revealed view. We also flip the global flashcardFlipped for any
    // downstream code that watches it (keyboard shortcuts, etc.).
    const calcSubmitBtn = document.getElementById('calc-submit-btn');
    if (calcSubmitBtn) calcSubmitBtn.onclick = (e) => {
      e.stopPropagation();
      const cards = getFlashcardPool();
      const card = cards[flashcardIndex];
      const res = checkCalcAnswer(card, calcAnswerInput);
      calcAnswerSubmitted = res.allCorrect ? 'correct' : 'incorrect';
      flashcardFlipped = true;
      render();
    };
    // Calc "Skip to working" — same revealed view, but flagged as
    // skipped so we don't show a green/red banner.
    const calcSkipBtn = document.getElementById('calc-skip-btn');
    if (calcSkipBtn) calcSkipBtn.onclick = (e) => {
      e.stopPropagation();
      calcAnswerSubmitted = 'skipped';
      flashcardFlipped = true;
      render();
    };

    document.querySelectorAll('.rating-row button').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const cards = getFlashcardPool();
        const card = cards[flashcardIndex];
        gradeCard(card.id, btn.dataset.grade);
        flashcardFlipped = false;
        drillStepIndex = 0;  // reset drill progress for the next card
        calcAnswerSubmitted = null;
        calcAnswerInput = {};
        if (flashcardIndex + 1 >= cards.length) {
          flashcardIndex = 0;
          state.sessionsCompleted += 1;
          saveState();
        } else {
          flashcardIndex += 1;
        }
        render();
      };
    });
    const prev = document.getElementById('fc-prev');
    const next = document.getElementById('fc-next');
    if (prev) prev.onclick = () => {
      const cards = getFlashcardPool();
      if (cards.length === 0) return;
      flashcardIndex = (flashcardIndex - 1 + cards.length) % cards.length;
      flashcardFlipped = false;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      render();
    };
    if (next) next.onclick = () => {
      const cards = getFlashcardPool();
      if (cards.length === 0) return;
      flashcardIndex = (flashcardIndex + 1) % cards.length;
      flashcardFlipped = false;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      render();
    };
  }

  if (currentMode === 'quiz') {
    const start = document.getElementById('quiz-start');
    if (start) start.onclick = () => {
      const scope = document.getElementById('quiz-scope').value;
      const level = document.getElementById('quiz-level').value;
      const length = parseInt(document.getElementById('quiz-length').value, 10);
      const built = buildQuiz(scope, level, length);
      if (!built) { alert('Not enough cards in this scope/level combination.'); return; }
      quizState = built;
      render();
    };
    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.opt, 10);
        const q = quizState.questions[quizState.idx];
        quizState.answers[quizState.idx] = i;
        if (i === q.correctIndex) { quizState.correct += 1; gradeCard(q.cardId, 'good'); }
        else { gradeCard(q.cardId, 'again'); }
        render();
      };
    });
    const nextBtn = document.getElementById('quiz-next');
    if (nextBtn) nextBtn.onclick = () => {
      if (quizState.idx + 1 >= quizState.questions.length) { quizState.finished = true; }
      else { quizState.idx += 1; }
      render();
    };
    const restart = document.getElementById('quiz-restart');
    if (restart) restart.onclick = () => { quizState = null; render(); };
    const reviewWrong = document.getElementById('quiz-review-wrong');
    if (reviewWrong) reviewWrong.onclick = () => {
      quizState = null;
      flashcardFilter = 'weak';
      flashcardIndex = 0;
      flashcardFlipped = false;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      setMode('flashcards');
    };
  }

  if (currentMode === 'browse' || currentMode === 'kdy') {
    const f = document.getElementById('br-filter');
    if (f) f.onchange = e => { browseFilter = e.target.value; browseExpanded = null; render(); };
    const lv = document.getElementById('br-level');
    if (lv) lv.onchange = e => { browseLevelFilter = e.target.value; browseExpanded = null; render(); };
    const s = document.getElementById('br-search');
    if (s) {
      s.oninput = e => {
        browseSearch = e.target.value;
        browseExpanded = null;
        const pos = e.target.selectionStart;
        render();
        const newInput = document.getElementById('br-search');
        if (newInput) { newInput.focus(); newInput.setSelectionRange(pos, pos); }
      };
    }
    document.querySelectorAll('.browse-item').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.cardId;
        browseExpanded = (browseExpanded === id) ? null : id;
        render();
      };
    });
  }

  if (currentMode === 'progress') {
    const reset = document.getElementById('reset-progress');
    if (reset) reset.onclick = () => {
      if (confirm(`Wipe all card history for "${activeProfile}"? Cannot be undone.`)) {
        state = defaultProfileData();
        profiles[activeProfile] = state;
        saveProfiles(profiles);
        render();
      }
    };
  }

  if (currentMode === 'about') {
    const exportBtn = document.getElementById('export-progress');
    if (exportBtn) exportBtn.onclick = () => exportProgress();
    const importBtn = document.getElementById('import-progress-btn');
    const importFile = document.getElementById('import-progress-file');
    if (importBtn && importFile) {
      importBtn.onclick = () => importFile.click();
      importFile.onchange = (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) importProgress(file);
        // Reset value so re-selecting the same file still triggers onchange.
        importFile.value = '';
      };
    }
    // v19: re-read disclaimer button in About tab.
    const discBtn = document.getElementById('about-show-disclaimer');
    if (discBtn) discBtn.onclick = () => showDisclaimerModal({ firstRun: false });
  }
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', (e) => {
  if (currentMode !== 'flashcards') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    // Use the same advance logic as the click handler so space and
    // tap stay perfectly in sync (especially important for drills).
    const cards = getFlashcardPool();
    if (cards.length === 0) return;
    handleCardSurfaceAdvance(cards[flashcardIndex]);
    render();
  } else if (e.key === 'ArrowRight') {
    const cards = getFlashcardPool();
    if (cards.length === 0) return;
    flashcardIndex = (flashcardIndex + 1) % cards.length;
    flashcardFlipped = false;
    drillStepIndex = 0;
    calcAnswerSubmitted = null;
    calcAnswerInput = {};
    render();
  } else if (e.key === 'ArrowLeft') {
    const cards = getFlashcardPool();
    if (cards.length === 0) return;
    flashcardIndex = (flashcardIndex - 1 + cards.length) % cards.length;
    flashcardFlipped = false;
    drillStepIndex = 0;
    calcAnswerSubmitted = null;
    calcAnswerInput = {};
    render();
  } else if (flashcardFlipped) {
    // Grading shortcuts. The rating row is only present when the card
    // is flipped (basic) or all drill steps are revealed. The
    // querySelector simply returns null on drill cards mid-sequence,
    // so number keys are safely no-ops then.
    if (e.key === '1') document.querySelector('[data-grade="again"]')?.click();
    if (e.key === '2') document.querySelector('[data-grade="hard"]')?.click();
    if (e.key === '3') document.querySelector('[data-grade="good"]')?.click();
    if (e.key === '4') document.querySelector('[data-grade="easy"]')?.click();
  }
});

/* ============================================================
   PROFILE SELECTOR EVENTS
   ============================================================ */
document.getElementById('profile-select').onchange = function(e) {
  const val = e.target.value;
  if (val === '__manage__') {
    e.target.value = activeProfile;
    showManageProfilesModal();
  } else {
    switchProfile(val);
  }
};
document.getElementById('profile-add').onclick = showAddProfileModal;

/* ============================================================
   INIT
   ============================================================ */
refreshProfileSelect();
render();

// v19: first-launch disclaimer. Shown once per browser; the ack flag
// is stored in localStorage. Run after initial render so the modal
// appears on top of fully laid-out content (not against a flash of
// unstyled HTML, which would look broken on a slow phone).
try {
  if (!localStorage.getItem(DISCLAIMER_ACK_KEY)) {
    showDisclaimerModal({ firstRun: true });
  }
} catch (e) {
  // localStorage unavailable (private mode on some browsers).
  // Show the modal — better to gate every load than skip the disclaimer
  // entirely when we can't remember the ack.
  showDisclaimerModal({ firstRun: true });
}
