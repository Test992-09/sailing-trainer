<script>
/* ============================================================
   DATA BOOTSTRAP
   Reads the two JSON blocks above and exposes CARDS, SOURCES,
   PROFILE_TYPES as module-level constants. All later code uses
   these names exactly as before, so no other JS changes.
   ============================================================ */
const CARDS = JSON.parse(document.getElementById('cards-data').textContent);
const SOURCES = JSON.parse(document.getElementById('sources-data').textContent);

// Data-layer profile types. Distinct from user-progress "profiles" (which
// are stored separately in localStorage and key off a user-chosen name).
// Every existing card carries profileType: "skipper". "ym" (Yachtmaster)
// and "commercial" are reserved for future card-filtering passes.
const PROFILE_TYPES = ['skipper', 'ym', 'commercial'];
const DEFAULT_PROFILE_TYPE = 'skipper';

// Helper: resolve a card's src code to its SOURCES entry.
// Renderers continue to display card.src as plain text for now (behaviour
// unchanged); future code can call resolveSource(card.src) to get the
// {title, fullName, url} object instead.
function resolveSource(code) {
  return SOURCES[code] || { title: code, fullName: code, url: '' };
}


/* ============================================================
   STATE & STORAGE — multi-profile
   ============================================================ */
const PROFILES_KEY = 'sailing-trainer-profiles-v2';
const ACTIVE_PROFILE_KEY = 'sailing-trainer-active-v2';

function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (!raw) return { 'Default': defaultProfileData() };
    const parsed = JSON.parse(raw);
    if (Object.keys(parsed).length === 0) return { 'Default': defaultProfileData() };
    return parsed;
  } catch (e) {
    return { 'Default': defaultProfileData() };
  }
}
function defaultProfileData() {
  return { cards: {}, sessionsCompleted: 0, lastModified: Date.now() };
}
function saveProfiles(profiles) {
  try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); }
  catch (e) { console.warn('Save failed', e); }
}
function getActiveProfileName() {
  return localStorage.getItem(ACTIVE_PROFILE_KEY) || 'Default';
}
function setActiveProfileName(name) {
  localStorage.setItem(ACTIVE_PROFILE_KEY, name);
}

/* ============================================================
   EXPORT / IMPORT
   ----
   Saves all profiles + their card progress to a JSON file the user can
   download, and lets them re-load it on a new device or after clearing
   site data. localStorage is the only persistence layer; without this,
   weeks of grading vanish on a single browser-data wipe.
   ============================================================ */
function exportProgress() {
  const payload = {
    schema: 'sailing-trainer-progress',
    version: 1,
    exportedAt: new Date().toISOString(),
    activeProfile: getActiveProfileName(),
    profiles: loadProfiles()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // Filename includes date so successive backups don't overwrite.
  const dateStr = new Date().toISOString().slice(0, 10);
  a.download = `sailing-trainer-progress-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importProgress(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Validate: must have profiles object with at least one profile.
      if (!data.profiles || typeof data.profiles !== 'object' || Object.keys(data.profiles).length === 0) {
        alert('Invalid backup file: no profiles found.');
        return;
      }
      // Sanity-check schema if present (older exports might lack it; accept anyway).
      if (data.schema && data.schema !== 'sailing-trainer-progress') {
        alert('This file does not look like a sailing-trainer backup.');
        return;
      }
      const profileNames = Object.keys(data.profiles);
      const msg = `Replace ALL local progress with backup?\n\n`
        + `Backup contains ${profileNames.length} profile(s): ${profileNames.join(', ')}\n`
        + `Exported: ${data.exportedAt || 'unknown date'}\n\n`
        + `Your current local data will be overwritten. This cannot be undone.`;
      if (!confirm(msg)) return;
      // Replace localStorage contents.
      saveProfiles(data.profiles);
      const targetActive = (data.activeProfile && data.profiles[data.activeProfile])
        ? data.activeProfile
        : profileNames[0];
      setActiveProfileName(targetActive);
      // Reload in-memory state to match.
      profiles = loadProfiles();
      activeProfile = getActiveProfileName();
      state = profiles[activeProfile];
      // Reset session-scoped vars that depend on card data.
      flashcardOrder = null;
      flashcardIndex = 0;
      flashcardFlipped = false;
      drillStepIndex = 0;
      calcAnswerSubmitted = null;
      calcAnswerInput = {};
      alert(`Restored. Active profile is now "${activeProfile}".`);
      render();
    } catch (err) {
      alert('Could not read backup file: ' + err.message);
    }
  };
  reader.onerror = () => alert('Could not read the file.');
  reader.readAsText(file);
}

let profiles = loadProfiles();
let activeProfile = getActiveProfileName();
if (!profiles[activeProfile]) {
  activeProfile = Object.keys(profiles)[0];
  setActiveProfileName(activeProfile);
}

let state = profiles[activeProfile];
let quizState = null;
let currentMode = 'flashcards';
let flashcardFilter = 'all';
let flashcardLevelFilter = 'all';
let flashcardIndex = 0;
let flashcardFlipped = false;
// drillStepIndex: how many steps of the current drill card are revealed.
//   0 = none revealed yet (drill card looks like front of basic card)
//   1..N = step 1..N visible
//   N (where N === steps.length) = all steps revealed; rating row shown
// Reset to 0 every time we change cards or unflip.
let drillStepIndex = 0;

// === Calc card state ===
// calcAnswerInput: per-field map of what the user has typed. Keys match
//   the keys of the card's `answer` object (excluding `units`). Values
//   are raw strings; the checker parses them at submit time. We keep
//   the raw strings so a partially-filled input doesn't get clobbered
//   by re-renders.
// calcAnswerSubmitted: tri-state.
//   null     — user hasn't acted yet (front view, input editable)
//   'correct'/'incorrect' — user submitted and we checked
//   'skipped' — user clicked "skip to working"
// When non-null, the card is in the "revealed" view (working + answer).
// Reset both whenever we change cards, unflip, or shuffle.
let calcAnswerInput = {};
let calcAnswerSubmitted = null;

// Centralised "advance the card" logic. Called from card-surface clicks,
// the drill-next button, and the keyboard space handler — keeps all
// three paths in sync so we never end up with inconsistent state.
//
// The space/click semantics are:
//   - basic card, front:           flip to back
//   - basic card, back:            flip back to front (toggle)
//   - drill card, not started:     flip + reveal step 1
//   - drill card, mid-sequence:    reveal next step (don't toggle off)
//   - drill card, all steps shown: toggle back to front (restart)
//
// MUTATES module-level state (flashcardFlipped, drillStepIndex). Caller
// is responsible for re-rendering.
function handleCardSurfaceAdvance(card) {
  if (!card) return;
  const kind = card.kind || 'basic';

  if (kind === 'calc') {
    // Calc cards: tapping the surface should NOT submit the typed
    // answer (the user might just be trying to focus an input). The
    // submit/skip buttons drive forward motion. The only thing surface
    // tap does is collapse a revealed card back to its front so the
    // user can re-attempt — and we keep their typed input on purpose.
    if (calcAnswerSubmitted !== null) {
      flashcardFlipped = false;
      calcAnswerSubmitted = null;
    }
    return;
  }

  if (kind !== 'drill') {
    // Basic / image / unknown: simple toggle.
    flashcardFlipped = !flashcardFlipped;
    return;
  }

  // Drill card.
  const total = Array.isArray(card.steps) ? card.steps.length : 0;
  if (total === 0) {
    // Malformed drill card — fall back to basic-style toggle so the
    // user isn't stuck. Won't happen for well-formed cards.
    flashcardFlipped = !flashcardFlipped;
    return;
  }
  if (!flashcardFlipped) {
    // Start the drill: reveal step 1.
    flashcardFlipped = true;
    drillStepIndex = 1;
  } else if (drillStepIndex < total) {
    // Mid-sequence: reveal next step.
    drillStepIndex += 1;
  } else {
    // All steps revealed and user clicks the surface again: collapse
    // back to front and reset progress (lets them practise again).
    flashcardFlipped = false;
    drillStepIndex = 0;
    calcAnswerSubmitted = null;
    calcAnswerInput = {};
  }
}
// Shuffled order of card IDs for the current flashcard filter. Rebuilt whenever
// filter/level changes or when user hits the shuffle button. We index into this
// array (not into getFilteredCards' output directly) so navigation stays consistent
// across re-renders. null = needs rebuild.
let flashcardOrder = null;
let flashcardOrderKey = '';  // tracks (filter, level) to detect when rebuild needed
let browseFilter = 'all';
let browseLevelFilter = 'all';
let browseSearch = '';
let browseExpanded = null;

function saveState() {
  state.lastModified = Date.now();
  profiles[activeProfile] = state;
  saveProfiles(profiles);
}

function getCardState(id) {
  // lapses = total times this card has been graded "again" (never decremented).
  // Used by the "weak" filter so a card you've failed multiple times stays in your
  // weak pool even if you later answer it correctly once.
  const cs = state.cards[id] || { reviews: 0, lastSeen: 0, lastResult: null, ease: 2.5, due: 0, lapses: 0 };
  // Backfill lapses for cards saved before this field existed.
  if (cs.lapses === undefined) cs.lapses = 0;
  return cs;
}

function gradeCard(id, grade) {
  const cs = { ...getCardState(id) };
  cs.reviews += 1;
  cs.lastSeen = Date.now();
  cs.lastResult = grade;
  let interval;
  if (grade === 'again') {
    cs.ease = Math.max(1.3, cs.ease - 0.2);
    cs.lapses = (cs.lapses || 0) + 1;  // permanent lapse counter — never reset
    interval = 0;
  }
  else if (grade === 'hard') { cs.ease = Math.max(1.3, cs.ease - 0.15); interval = cs.reviews <= 1 ? 1 : 2; }
  else if (grade === 'good') { interval = cs.reviews <= 1 ? 1 : Math.round((cs.reviews <= 2 ? 3 : 6) * cs.ease); }
  else if (grade === 'easy') { cs.ease = cs.ease + 0.15; interval = cs.reviews <= 1 ? 3 : Math.round(8 * cs.ease); }
  else { interval = 1; }
  cs.due = Date.now() + interval * 24 * 60 * 60 * 1000;
  state.cards[id] = cs;
  saveState();
}

/* ============================================================
   UTILITIES
   ============================================================ */
const CATEGORIES = [...new Set(CARDS.map(c => c.cat))];

// Map of cat -> ordered list of subcats present on cards in that cat.
// Used to render nested options in the filter dropdowns. Cats with no
// subcats on any of their cards just won't appear here.
const SUBCATS = (() => {
  const m = {};
  for (const c of CARDS) {
    if (!c.subcat) continue;
    if (!m[c.cat]) m[c.cat] = [];
    if (!m[c.cat].includes(c.subcat)) m[c.cat].push(c.subcat);
  }
  return m;
})();

// Filter values for subcats use the form "Category::Subcategory" so we can
// tell them apart from top-level cat values. The double colon is unlikely
// to appear in any real category name.
const SUBCAT_SEP = '::';

// Build the nested <option> list for a cat-filter dropdown.
//
// v14: switched from en-space-indent hack to native <optgroup> for proper
// accessibility (screen readers announce the group label, keyboard nav
// recognises the structure). <optgroup> labels themselves are not selectable
// by spec, so to preserve "click the category to get all of it" we still
// emit a top-level <option value="Category">Category (count)</option> first,
// and then put its subcategories inside an <optgroup> below it.
//
// Cats with <2 subcats render as just the flat top-level option (no group).
function buildCatOptionsHtml(selectedValue) {
  const sel = (v) => v === selectedValue ? ' selected' : '';
  const out = [];
  for (const cat of CATEGORIES) {
    const catCount = CARDS.filter(c => c.cat === cat).length;
    // Top-level option — selectable, gives all cards in the category
    out.push(`<option value="${escapeHtml(cat)}"${sel(cat)}>${escapeHtml(cat)} (${catCount})</option>`);
    const subs = SUBCATS[cat];
    if (subs && subs.length >= 2) {
      // The optgroup label is just visual grouping; the down-arrow hint
      // makes it obvious these are children of the cat above.
      out.push(`<optgroup label="↳ ${escapeHtml(cat)} subcategories">`);
      for (const sc of subs) {
        const val = cat + SUBCAT_SEP + sc;
        const n = CARDS.filter(c => c.cat === cat && c.subcat === sc).length;
        out.push(`<option value="${escapeHtml(val)}"${sel(val)}>${escapeHtml(sc)} (${n})</option>`);
      }
      out.push(`</optgroup>`);
    }
  }
  return out.join('');
}

const LEVELS = ['CC', 'DS', 'DUE', 'DK', 'KDY'];
const LEVEL_LABELS = {
  CC: 'Competent Crew',
  DS: 'Day Skipper',
  DUE: 'Duelighedsbevis',
  DK: 'Denmark-specific',
  KDY: 'KDY-specific'
};

function passesLevelFilter(card, levelFilter) {
  if (levelFilter === 'all') return true;
  return card.levels && card.levels.includes(levelFilter);
}

function getFilteredCards(catFilter, levelFilter) {
  let pool = CARDS;
  if (catFilter !== 'all') {
    if (catFilter === 'weak') {
      pool = pool.filter(c => {
        const cs = getCardState(c.id);
        // Card counts as "weak" if it's currently failing (last grade was again/hard)
        // OR if it's been failed 2+ times historically (the lapses counter never resets,
        // so a chronically tricky card stays in your weak pool even after one good grade).
        return cs.lastResult === 'again' || cs.lastResult === 'hard' || (cs.lapses || 0) >= 2;
      });
    } else if (catFilter === 'unseen') {
      pool = pool.filter(c => getCardState(c.id).reviews === 0);
    } else if (catFilter === 'due') {
      const now = Date.now();
      pool = pool.filter(c => {
        const cs = getCardState(c.id);
        return cs.reviews > 0 && cs.due <= now;
      });
    } else if (catFilter.includes(SUBCAT_SEP)) {
      // "Category::Subcategory" — match both fields. If the cat half doesn't
      // match any card the result is just empty (safe).
      const [cat, sub] = catFilter.split(SUBCAT_SEP);
      pool = pool.filter(c => c.cat === cat && c.subcat === sub);
    } else {
      pool = pool.filter(c => c.cat === catFilter);
    }
  }
  return pool.filter(c => passesLevelFilter(c, levelFilter));
}

// Returns the flashcard pool in shuffled order, stable across re-renders within
// the same filter/level selection. Rebuilds when filter or level changes, or when
// forceRebuild is true (used by the shuffle button).
function getFlashcardPool(forceRebuild = false) {
  const key = flashcardFilter + '|' + flashcardLevelFilter;
  if (forceRebuild || flashcardOrder === null || flashcardOrderKey !== key) {
    const filtered = getFilteredCards(flashcardFilter, flashcardLevelFilter);
    flashcardOrder = shuffle(filtered).map(c => c.id);
    flashcardOrderKey = key;
  }
  // Resolve IDs back to card objects, dropping any IDs that no longer match the
  // filter (e.g. card was just graded and moved out of "due" pool — but we keep
  // it for this session so the index stays valid).
  const byId = Object.fromEntries(CARDS.map(c => [c.id, c]));
  return flashcardOrder.map(id => byId[id]).filter(Boolean);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderLevelChips(levels) {
  if (!levels) return '';
  return levels.map(lv => `<span class="level-chip level-${lv}" title="${LEVEL_LABELS[lv] || lv}">${lv}</span>`).join('');
}

/* ============================================================
   PROFILE MANAGEMENT
   ============================================================ */
function refreshProfileSelect() {
  const sel = document.getElementById('profile-select');
  sel.innerHTML = Object.keys(profiles).map(name =>
    `<option value="${escapeHtml(name)}" ${name === activeProfile ? 'selected' : ''}>${escapeHtml(name)}</option>`
  ).join('') + '<option value="__manage__">— Manage profiles…</option>';
}

function switchProfile(name) {
  if (!profiles[name]) return;
  activeProfile = name;
  setActiveProfileName(name);
  state = profiles[activeProfile];
  flashcardIndex = 0;
  flashcardFlipped = false;
  drillStepIndex = 0;
  calcAnswerSubmitted = null;
  calcAnswerInput = {};
  quizState = null;
  browseExpanded = null;
  refreshProfileSelect();
  render();
}

function showAddProfileModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" id="modal-bg">
      <div class="modal">
        <h3>Add new profile</h3>
        <p>Each profile has its own progress. Useful if multiple people share this device.</p>
        <input type="text" id="new-profile-name" placeholder="Profile name…" maxlength="30" />
        <div class="modal-actions">
          <button class="btn secondary" id="modal-cancel">Cancel</button>
          <button class="btn" id="modal-create">Create</button>
        </div>
      </div>
    </div>
  `;
  const input = document.getElementById('new-profile-name');
  input.focus();
  document.getElementById('modal-cancel').onclick = () => { root.innerHTML = ''; };
  document.getElementById('modal-bg').onclick = (e) => { if (e.target.id === 'modal-bg') root.innerHTML = ''; };
  const createFn = () => {
    const name = input.value.trim();
    if (!name) return;
    if (profiles[name]) { alert('A profile with that name already exists.'); return; }
    profiles[name] = defaultProfileData();
    saveProfiles(profiles);
    switchProfile(name);
    root.innerHTML = '';
  };
  document.getElementById('modal-create').onclick = createFn;
  input.onkeydown = (e) => { if (e.key === 'Enter') createFn(); };
}

function showManageProfilesModal() {
  const root = document.getElementById('modal-root');
  const names = Object.keys(profiles);
  root.innerHTML = `
    <div class="modal-overlay" id="modal-bg">
      <div class="modal">
        <h3>Manage profiles</h3>
        <p>${names.length} profile${names.length === 1 ? '' : 's'}. You can\'t delete the only profile or the active one.</p>
        <div style="margin-bottom: 16px; max-height: 300px; overflow-y: auto;">
          ${names.map(n => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid var(--rule); border-radius: var(--r-md); margin-bottom: 6px;">
              <span style="font-weight: 500;">${escapeHtml(n)}${n === activeProfile ? ' <small style="color: var(--muted);">(active)</small>' : ''}</span>
              ${(n === activeProfile || names.length === 1) ? '' : `<button class="btn small danger" data-delete="${escapeHtml(n)}">Delete</button>`}
            </div>
          `).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn" id="modal-close">Close</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-close').onclick = () => { root.innerHTML = ''; refreshProfileSelect(); };
  document.getElementById('modal-bg').onclick = (e) => { if (e.target.id === 'modal-bg') { root.innerHTML = ''; refreshProfileSelect(); } };
  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.onclick = () => {
      const name = btn.dataset.delete;
      if (confirm(`Delete profile "${name}" and all its progress? This cannot be undone.`)) {
        delete profiles[name];
        saveProfiles(profiles);
        showManageProfilesModal();
      }
    };
  });
}

/* ============================================================
   DISCLAIMER MODAL (v19)
   ============================================================
   Liability disclaimer with two surfaces:
     1. First-launch acknowledge gate — must dismiss before using.
        Acknowledgement saved in localStorage so it's not annoying
        on subsequent visits.
     2. On-demand from the footer link — read any time.

   We DON'T present this on every load (that would train the user
   to dismiss it without reading). We DO show it once, and we keep
   the short footer line + the About-tab section visible at all
   times so the framing is never lost.

   localStorage key: 'disclaimerAcked_v1'. If we ever materially
   change the wording, bump the suffix so existing users re-ack. */
const DISCLAIMER_ACK_KEY = 'disclaimerAcked_v1';

function disclaimerBodyHtml() {
  // Single source of truth for the disclaimer text. Used by the
  // modal AND the About-tab section, so wording stays identical.
  return `
    <p><strong>This trainer is a personal study aid only.</strong>
       It is not approved courseware, not official guidance, and not
       a substitute for proper instruction.</p>

    <p><strong>Do not use this for navigation, decision-making at sea,
       or in any safety-critical situation.</strong> Always consult
       official charts, the current edition of the
       <em>S&oslash;vejsregler</em> / COLREGs, almanacs, pilot books,
       weather forecasts from authoritative sources (DMI, Met Office,
       NOAA, etc.), and qualified instructors.</p>

    <p>Content may contain errors, may be outdated, and may
       misrepresent the regulations or local rules. Card answers were
       drafted with AI assistance against the published syllabi;
       individual cards have not all been reviewed by a certified
       instructor. Where in doubt, always trust the cited primary source
       over the card.</p>

    <p>Software provided <strong>"as is"</strong>, without warranty of
       any kind, express or implied. By using this trainer you accept
       all risk. The author accepts no liability for any loss, damage,
       injury, examination failure, or other consequence arising from
       use of this material.</p>

    <p class="small-print">Released under the MIT Licence. You may use,
       copy, modify, and distribute this code freely; the full licence
       text and the "no warranty" clause apply in all cases. See the
       <code>LICENSE</code> file in the repository.</p>
  `;
}

function showDisclaimerModal(opts) {
  // opts.firstRun: when true, the user must click "I understand"
  //                explicitly (no click-outside-to-close, no Esc).
  //                Sets the localStorage ack flag on accept.
  //                When false (footer link), normal close behaviour.
  const firstRun = !!(opts && opts.firstRun);
  const root = document.getElementById('modal-root');
  const ackButton = firstRun
    ? `<button class="btn" id="disclaimer-ack">I understand &mdash; continue</button>`
    : `<button class="btn" id="disclaimer-ack">Close</button>`;

  root.innerHTML = `
    <div class="modal-overlay" id="disclaimer-bg">
      <div class="modal disclaimer-modal">
        <h3>${firstRun ? 'Before you start' : 'Disclaimer &amp; licence'}</h3>
        ${disclaimerBodyHtml()}
        <div class="modal-actions">
          ${ackButton}
        </div>
      </div>
    </div>
  `;

  const close = () => {
    if (firstRun) {
      try { localStorage.setItem(DISCLAIMER_ACK_KEY, '1'); } catch (e) {}
    }
    root.innerHTML = '';
    document.removeEventListener('keydown', onKey);
  };
  // Esc + click-outside only enabled for the on-demand path so the
  // first-run gate isn't trivially bypassed by tapping the backdrop.
  const onKey = (e) => { if (!firstRun && e.key === 'Escape') close(); };
  document.getElementById('disclaimer-ack').onclick = close;
  if (!firstRun) {
    document.getElementById('disclaimer-bg').onclick = (e) => {
      if (e.target.id === 'disclaimer-bg') close();
    };
    document.addEventListener('keydown', onKey);
  }
}

// Wire up footer link. The footer is part of static body markup so
// the link element exists immediately on script run.
document.getElementById('footer-disclaimer-link').onclick = (e) => {
  e.preventDefault();
  showDisclaimerModal({ firstRun: false });
};

/* ============================================================
   SOURCE-VIEW MODAL
   Opens when a user clicks a "src tag" (e.g. "COL-12", "DUE-7.1")
   on a flashcard or in the browse list. Shows the full source
   title, a clickable canonical URL, and the rule text if present.
   Uses the same #modal-root + .modal-overlay pattern as the
   profile modals, so behaviour (Esc, click-outside-to-close,
   keyboard) feels consistent.
   ============================================================ */
function showSourceModal(code) {
  // Resolve the source. resolveSource() always returns an object,
  // even for unknown codes (it returns a stub with just the code).
  const src = resolveSource(code);
  const root = document.getElementById('modal-root');
  // Build the URL block: clickable link if present, plain "—" if not.
  // target=_blank + rel=noopener is the standard safe pattern for
  // external links; without rel=noopener the new tab can hijack window.opener.
  const urlHtml = src.url
    ? `<a href="${escapeHtml(src.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(src.url)}</a>`
    : `<span class="source-empty">No URL on file for this source.</span>`;
  // Rule text: long verbatim text for COLREG entries, short descriptions
  // for the rest. Some entries (e.g. GEN, KDY) may legitimately have empty text.
  const textHtml = src.text
    ? `<div class="source-text">${escapeHtml(src.text)}</div>`
    : `<div class="source-empty">No reference text on file for this source.</div>`;
  root.innerHTML = `
    <div class="modal-overlay" id="src-modal-bg">
      <div class="modal source-modal">
        <h3>${escapeHtml(src.title || code)}</h3>
        <div class="source-fullname">${escapeHtml(src.fullName || '')}</div>
        <div class="source-url">${urlHtml}</div>
        ${textHtml}
        <div class="modal-actions">
          <button class="btn" id="src-modal-close">Close</button>
        </div>
      </div>
    </div>
  `;
  // Close handlers: button, click outside, and Esc key.
  const close = () => { root.innerHTML = ''; document.removeEventListener('keydown', onKey); };
  const onKey = (e) => { if (e.key === 'Escape') close(); };
  document.getElementById('src-modal-close').onclick = close;
  document.getElementById('src-modal-bg').onclick = (e) => {
    if (e.target.id === 'src-modal-bg') close();
  };
  document.addEventListener('keydown', onKey);
}

/* ----------------------------------------------------------------
   Global click delegate for .src-tag spans.
   The flashcard and browse renderers re-create their DOM on every
   render() call, so attaching click handlers per-render would mean
   wiring them in two places + after every state change. A single
   delegate on document avoids that and survives all re-renders.
   stopPropagation() is necessary because the parent .flashcard has
   its own onclick that flips the card; without it, clicking the src
   tag would also flip the card.
   ---------------------------------------------------------------- */
document.addEventListener('click', (e) => {
  const tag = e.target.closest('.src-tag');
  if (!tag) return;
  e.stopPropagation();
  const code = tag.dataset.srcCode;
  if (code) showSourceModal(code);
});


/* ============================================================
   RENDER
   ============================================================ */
function renderStats() {
  const total = CARDS.length;
  const seen = CARDS.filter(c => getCardState(c.id).reviews > 0).length;
  const mastered = CARDS.filter(c => {
    const cs = getCardState(c.id);
    return cs.reviews >= 2 && (cs.lastResult === 'good' || cs.lastResult === 'easy');
  }).length;
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-pill"><strong>${seen}</strong>/${total} seen</div>
    <div class="stat-pill"><span class="dot"></span><strong>${mastered}</strong> mastered</div>
    <div class="stat-pill">Profile: <strong>${escapeHtml(activeProfile)}</strong></div>
  `;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('#mode-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  render();
}

function render() {
  renderStats();
  const main = document.getElementById('main');
  if (currentMode === 'flashcards') main.innerHTML = renderFlashcards();
  else if (currentMode === 'quiz') main.innerHTML = renderQuiz();
  else if (currentMode === 'browse') main.innerHTML = renderBrowse();
  else if (currentMode === 'progress') main.innerHTML = renderProgress();
  else if (currentMode === 'kdy') main.innerHTML = renderKdy();
  else if (currentMode === 'about') main.innerHTML = renderAbout();
  attachHandlers();
}

/* ------------------------------------------------------------------
   CARD-KIND DISPATCH
   The flashcard surface supports multiple card kinds. Each kind is
   responsible for two things:
     1. The HTML body (front view AND revealed view) that goes inside
        the .flashcard container, BELOW the .card-meta header.
     2. Telling the caller whether the rating row (again/hard/good/easy)
        should be visible right now. Basic cards: visible whenever
        flipped. Drill cards: visible only after ALL steps are revealed.

   Helpers return { body, showRating } so renderFlashcards can stitch
   the full surface together without knowing about kinds.
   ------------------------------------------------------------------ */

// Common back-of-card extras (why? + danish). Used by basic kind today;
// drill kind also uses this once all steps are revealed.
function renderCardExtras(card) {
  let html = '';
  if (card.why) {
    html += `
      <div class="why-section">
        <span class="label">Why?</span>
        ${escapeHtml(card.why)}
      </div>`;
  }
  if (card.danish) {
    html += `
      <div class="danish-section">
        <span class="label">DA</span>${escapeHtml(card.danish)}
      </div>`;
  }
  return html;
}

function renderSourceLine(card) {
  return `<div class="source-line">Source: <span class="src-tag" data-src-code="${escapeHtml(card.src)}" title="View source">${escapeHtml(card.src)}</span></div>`;
}

// BASIC card body: front shows the prompt, back shows answer + extras.
function renderBasicCardBody(card, flipped) {
  if (!flipped) {
    return {
      body: `
        <div class="card-front">${escapeHtml(card.front)}</div>
        <div class="flip-hint">Tap card or press Space to reveal</div>`,
      showRating: false,
    };
  }
  return {
    body: `
      <div class="card-back-content">
        <div class="answer-section">
          <span class="label">Answer</span>
          ${escapeHtml(card.back)}
        </div>
        ${renderCardExtras(card)}
      </div>
      ${renderSourceLine(card)}`,
    showRating: true,
  };
}

// DRILL card body: front looks like a basic card (just the prompt).
// After "reveal" (flashcardFlipped becomes true), steps appear one at
// a time controlled by drillStepIndex (1..N). When drillStepIndex
// reaches steps.length, the rating row appears.
//
// Defensive note: a drill card with no steps array is treated as
// already complete (so we don't soft-lock the UI).
function renderDrillCardBody(card, flipped) {
  const steps = Array.isArray(card.steps) ? card.steps : [];
  const total = steps.length;

  // Front state — same look as a basic card front.
  if (!flipped) {
    return {
      body: `
        <div class="card-front">${escapeHtml(card.front)}</div>
        <div class="flip-hint">Tap card or press Space to start drill</div>`,
      showRating: false,
    };
  }

  // Revealed state — clamp the step counter into [1, total].
  // We only enter this branch when flipped is true, so the user has
  // committed to seeing at least step 1.
  const shown = Math.min(Math.max(drillStepIndex, 1), total);
  const allRevealed = shown >= total;

  // Build the visible steps as a numbered list. We render only steps
  // 1..shown, not the full list, so the user sees them appear one by one.
  const stepsHtml = steps.slice(0, shown).map(s => `
    <div class="drill-step">
      <span class="step-num">${s.n}.</span>
      <span class="step-text">${escapeHtml(s.text)}</span>
    </div>
  `).join('');

  // "Next step" button only when more remain. After all are revealed,
  // we show a small banner and the why/danish extras.
  const nextBtn = !allRevealed ? `
    <div class="drill-next-row">
      <button class="drill-next-btn" id="drill-next-btn">Next step →</button>
    </div>
  ` : '';

  const completeBlock = allRevealed ? `
    <div class="drill-complete-banner">All steps revealed — rate yourself below</div>
    ${renderCardExtras(card)}
  ` : '';

  return {
    body: `
      <div class="drill-intro">Drill — recall each step in order</div>
      <div class="drill-progress">Step ${shown} of ${total}</div>
      <div class="drill-steps">${stepsHtml}</div>
      ${nextBtn}
      ${completeBlock}
      ${renderSourceLine(card)}`,
    showRating: allRevealed,
  };
}

// Top-level dispatcher. Returns { body, showRating }.
// Unknown kinds fall back to basic — keeps the app forward-compatible
// if a future card kind sneaks into the JSON before its renderer ships.
function renderCardBody(card, flipped) {
  const kind = card.kind || 'basic';
  if (kind === 'drill') return renderDrillCardBody(card, flipped);
  if (kind === 'calc')  return renderCalcCardBody(card, flipped);
  if (kind === 'image') return renderImageCardBody(card, flipped);
  return renderBasicCardBody(card, flipped);
}

/* ------------------------------------------------------------------
   CALC CARD HELPERS
   Calc cards present a numerical problem; the user can either type an
   answer (which we tolerance-check) or skip to the working. Below are
   the parsing/comparison helpers, separated from the renderer so they
   can be unit-reasoned about and reused.
   ------------------------------------------------------------------ */

// Parse "HH:MM" (or "H:MM") into total minutes since 00:00.
// Returns NaN for anything malformed.
function parseTimeToMinutes(s) {
  if (typeof s !== 'string') return NaN;
  const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return NaN;
  const h = parseInt(m[1], 10);
  const mins = parseInt(m[2], 10);
  if (h < 0 || h > 23 || mins < 0 || mins > 59) return NaN;
  return h * 60 + mins;
}

// Returns true if `key` in the card's answer object is a time field.
// We detect this by the units sub-object — units[key] === "HH:MM" — or
// by string-vs-number type of the model answer.
function isTimeField(card, key) {
  const u = card.answer && card.answer.units && card.answer.units[key];
  if (typeof u === 'string' && u.toUpperCase().includes('HH:MM')) return true;
  return typeof card.answer[key] === 'string';
}

// Check a single field. Returns { ok: bool, parsed: ? } where parsed is
// the user's value in canonical form (minutes for time, number otherwise),
// or null if it didn't parse.
function checkCalcField(card, key, userRaw) {
  const expected = card.answer[key];
  const tol = card.tolerance || {};

  if (isTimeField(card, key)) {
    const userMin = parseTimeToMinutes(userRaw);
    const expectedMin = parseTimeToMinutes(expected);
    if (Number.isNaN(userMin) || Number.isNaN(expectedMin)) {
      return { ok: false, parsed: null };
    }
    const tolMin = Number.isFinite(tol.time_minutes) ? tol.time_minutes : 5;
    return {
      ok: Math.abs(userMin - expectedMin) <= tolMin,
      parsed: userRaw.trim(),  // keep original string for display
    };
  }

  // Numeric field. Accept comma as decimal separator (Danish convention).
  const userNum = parseFloat((userRaw || '').toString().trim().replace(',', '.'));
  const expectedNum = typeof expected === 'number' ? expected : parseFloat(expected);
  if (Number.isNaN(userNum) || Number.isNaN(expectedNum)) {
    return { ok: false, parsed: null };
  }
  // Per-key tolerance, then a sensible default. 0.1 matches the height
  // tolerance in the t32 example and is a defensible default for most
  // marine-nav numeric quantities.
  // Add a small epsilon to absorb floating-point rounding error: e.g.
  // |4.66 - 4.56| evaluates to 0.10000000000000053 in IEEE-754, which
  // would otherwise fail a 0.1 tolerance check the user expects to pass.
  const tolNum = Number.isFinite(tol[key]) ? tol[key] : 0.1;
  const EPS = 1e-9;
  return {
    ok: Math.abs(userNum - expectedNum) <= tolNum + EPS,
    parsed: userNum,
  };
}

// Check the whole answer object. Returns { allCorrect: bool, fields: {key: {ok, parsed}} }.
// A missing answer object or zero non-units keys returns allCorrect=false.
function checkCalcAnswer(card, userInput) {
  const ans = card.answer || {};
  const keys = Object.keys(ans).filter(k => k !== 'units');
  if (keys.length === 0) return { allCorrect: false, fields: {} };
  const fields = {};
  let allCorrect = true;
  for (const k of keys) {
    const res = checkCalcField(card, k, userInput[k] || '');
    fields[k] = res;
    if (!res.ok) allCorrect = false;
  }
  return { allCorrect, fields };
}

// Format the model answer for display. For time, HH:MM as-is. For
// numbers, just stringify — JS's default String(num) preserves the
// author's precision well enough (4.56 -> "4.56", 5 -> "5"). We
// previously talked about trimming trailing zeros etc. but in practice
// nothing in the deck needs it. Keep it simple.
function formatCalcAnswerValue(card, key) {
  const v = card.answer[key];
  if (isTimeField(card, key)) return v;
  return String(v);
}

// CALC card body: front shows the problem + an input row. After submit
// (or skip), shows the working steps and the final answer all at once.
function renderCalcCardBody(card, flipped) {
  const ans = card.answer || {};
  const keys = Object.keys(ans).filter(k => k !== 'units');
  const units = ans.units || {};

  // Front view: problem + input fields + submit/skip buttons. We DON'T
  // gate the front on `flipped` — calc has its own state machine via
  // calcAnswerSubmitted. flipped becomes true at the same moment, but
  // the source of truth for which view to show is calcAnswerSubmitted.
  if (calcAnswerSubmitted === null) {
    const inputFieldsHtml = keys.map(k => {
      const placeholder = isTimeField(card, k) ? 'HH:MM' : (units[k] || '');
      const labelText = k.charAt(0).toUpperCase() + k.slice(1) +
                        (units[k] && !isTimeField(card, k) ? ` (${units[k]})` : '');
      const currentVal = calcAnswerInput[k] || '';
      return `
        <div class="calc-field">
          <label for="calc-input-${escapeHtml(k)}">${escapeHtml(labelText)}</label>
          <input type="text" id="calc-input-${escapeHtml(k)}" data-calc-key="${escapeHtml(k)}"
                 placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(currentVal)}" autocomplete="off" />
        </div>
      `;
    }).join('');

    return {
      body: `
        <div class="calc-front">${escapeHtml(card.front)}</div>
        <div class="calc-input-row">
          <span class="calc-input-label">Your answer</span>
          <div class="calc-input-fields">${inputFieldsHtml}</div>
          <div class="calc-actions">
            <button class="calc-submit-btn" id="calc-submit-btn">Check answer</button>
            <button class="calc-skip-btn" id="calc-skip-btn">Skip to working →</button>
          </div>
        </div>`,
      showRating: false,
    };
  }

  // Revealed view. We've either submitted or skipped.
  // If submitted, re-run the check so we can show per-field correctness.
  let resultBanner = '';
  let fieldResults = {};
  if (calcAnswerSubmitted === 'correct' || calcAnswerSubmitted === 'incorrect') {
    const res = checkCalcAnswer(card, calcAnswerInput);
    fieldResults = res.fields;
    resultBanner = res.allCorrect
      ? `<div class="calc-result-banner correct">✓ Correct — within tolerance</div>`
      : `<div class="calc-result-banner incorrect">✗ Off — see the working below</div>`;
  } else if (calcAnswerSubmitted === 'skipped') {
    resultBanner = `<div class="calc-result-banner skipped">Skipped — study the working</div>`;
  }

  const workings = Array.isArray(card.workings) ? card.workings : [];
  const workingsHtml = workings.map(w => `
    <div class="calc-working-step">
      <div class="calc-step-title">${escapeHtml(w.step || '')}</div>
      <div class="calc-step-explain">${escapeHtml(w.explanation || '')}</div>
    </div>
  `).join('');

  const finalAnswerHtml = keys.map(k => {
    const modelVal = formatCalcAnswerValue(card, k);
    const unitStr = (units[k] && !isTimeField(card, k)) ? ` ${units[k]}` : '';
    const userRes = fieldResults[k];
    // Show user's submitted value beneath the model value when wrong,
    // so the user can see by how much they were off.
    let userLine = '';
    if (userRes && !userRes.ok && (calcAnswerSubmitted === 'incorrect')) {
      const userRaw = (calcAnswerInput[k] || '').trim();
      if (userRaw) {
        userLine = `<span class="calc-user-submitted">you: ${escapeHtml(userRaw)}${escapeHtml(unitStr)}</span>`;
      }
    }
    return `
      <div class="calc-final-value-item">
        <span class="calc-final-key">${escapeHtml(k)}</span>
        <span>${escapeHtml(modelVal)}${escapeHtml(unitStr)}</span>
        ${userLine}
      </div>
    `;
  }).join('');

  return {
    body: `
      ${resultBanner}
      <div class="calc-workings">${workingsHtml}</div>
      <div class="calc-final-answer">
        <div class="calc-final-label">Answer</div>
        <div class="calc-final-values">${finalAnswerHtml}</div>
      </div>
      ${renderCardExtras(card)}
      ${renderSourceLine(card)}`,
    showRating: true,
    // PROMPT-05 spec: "Skip directly to working = auto-grade as 'again'."
    // We honour this by locking the rating to 'again' when the user
    // skipped — the rating-row renderer below collapses to a single
    // "Continue (again)" button. The user still sees the working before
    // advancing (otherwise there'd be no point in revealing it), but
    // can't reward themselves for skipping.
    gradingLocked: calcAnswerSubmitted === 'skipped' ? 'again' : null,
  };
}

// ============================================================
// IMAGE GENERATORS
// ----
// Parameterised SVG generators for image cards. Each entry in the
// IMAGE_GENERATORS registry is a function that takes a params object
// from `card.front_image_params` and returns an SVG string.
//
// Why generators (vs. hand-coded inline SVG per card):
//   - One generator can produce dozens of related cards. Points of
//     sail has 10 variants; a single 150-line function gives all 10
//     instead of 10 hand-authored SVGs of ~400 bytes each.
//   - Parameters are JSON, so card data stays tiny and editable.
//   - Consistent visual style across a family without copy-paste drift.
//
// To add a new generator:
//   1. Write the function below (sibling of renderPointOfSail).
//   2. Register it in IMAGE_GENERATORS at the bottom of this block.
//   3. Document the params object in the schema doc near the top of
//      the file (under "image cards" -> "front_image_gen").
//   4. Author cards with kind:"image", front_image_gen:"yourGenerator",
//      and front_image_params:{...}.
// ============================================================

// cardinalMark — front-on IALA cardinal buoy diagram.
//
// Renders an IALA-A cardinal mark as a tall pictogram: black double-cone
// topmark, mast, two- or three-band yellow/black body, mast continuation
// below the body, and a small waterline at the bottom. One generator
// covers all four cardinal directions; the topmark cone orientation and
// the body band pattern are looked up by direction.
//
// Params:
//   direction — 'N' | 'E' | 'S' | 'W'  (required)
//   showLight — bool, default false. When true, renders a small flash
//               diagram below the waterline showing the light group
//               (continuous for N, 3 for E, 6+long for S, 9 for W).
//               OFF by default because the front of the card asks the
//               learner to identify the mark — showing the flash count
//               would give the answer away. Reserved for future card
//               families (e.g. flash-identification) and for back-face
//               renders.
//
// Coordinate system:
//   viewBox 0 0 200 280. Tall aspect ratio (buoy is naturally tall).
//   Layout from top to bottom:
//     y= 12– 72   topmark zone (cones)
//     y= 72–110   mast (thin vertical line)
//     y=110–194   body (two stacked rects, 42px each, or three of 28)
//     y=194–240   below-water mast + waterline
//     y=240–276   optional flash diagram (only if showLight)
//   Cones use the same proportions as the original static-SVG
//   img_cardinal_north this generator replaces (cone half-width 16,
//   cone height 28), so the new SVG sits in the same visual family
//   as the v15 deck.
function renderCardinalMark(opts) {
  const { direction, showLight = false } = opts || {};

  // Topmark: each cone is a triangle. For each cone we store
  //   apexY — y of the pointed tip (relative to topmark group origin)
  //   baseY — y of the flat base
  // The triangle's points are: (0, apexY), (-16, baseY), (16, baseY).
  //
  // N: both cones point up   — apex above base, stacked vertically
  // S: both cones point down — apex below base, stacked vertically
  // E: cones point AWAY (top cone up, bottom cone down)  — "egg"/diamond
  // W: cones point TOWARD each other                     — "wineglass"
  //
  // Each cone occupies ~28px of vertical space inside the topmark group.
  const TOPMARK = {
    'N': { top: { apexY: -26, baseY:   2 }, bot: { apexY:   4, baseY:  32 } },
    'S': { top: { apexY:   2, baseY: -26 }, bot: { apexY:  32, baseY:   4 } },
    'E': { top: { apexY: -26, baseY:   2 }, bot: { apexY:  32, baseY:   4 } },
    'W': { top: { apexY:   2, baseY: -26 }, bot: { apexY:   4, baseY:  32 } },
  };

  // Body band pattern. 'duo' = two bands of 42px; 'tri' = three of 28px.
  // The black band's position mirrors where the cones point:
  //   N: black on top      (cones point up   -> black at top)
  //   S: black on bottom   (cones point down -> black at bottom)
  //   E: black top & bottom, yellow middle (cones point away)
  //   W: yellow top & bottom, black middle (cones point in)
  const BODY = {
    'N': { type: 'duo', top: 'black',  bot: 'yellow' },
    'S': { type: 'duo', top: 'yellow', bot: 'black'  },
    'E': { type: 'tri', top: 'black',  mid: 'yellow', bot: 'black'  },
    'W': { type: 'tri', top: 'yellow', mid: 'black',  bot: 'yellow' },
  };

  // Flash group for the optional light diagram.
  //   N: continuous — rendered as a row of dots with a fading "..." tail
  //   E: 3 dots
  //   S: 6 dots + one long-flash bar
  //   W: 9 dots
  const FLASH = {
    'N': { dots: 5, longAfter: false, continuous: true  },
    'E': { dots: 3, longAfter: false, continuous: false },
    'S': { dots: 6, longAfter: true,  continuous: false },
    'W': { dots: 9, longAfter: false, continuous: false },
  };

  const topmark = TOPMARK[direction];
  const body    = BODY[direction];
  const flash   = FLASH[direction];

  if (!topmark || !body || !flash) {
    // Defensive: unknown direction. Render an empty viewBox with a "?"
    // glyph so the caller's container doesn't collapse, but the error
    // is visually obvious in dev. Same pattern as renderPointOfSail
    // expects defensive defaults on its params.
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">`
         + `<text x="100" y="140" text-anchor="middle" fill="#d32f2f" font-family="monospace" font-size="14">?</text>`
         + `</svg>`;
  }

  // Inline colours — the SVG renders inside containers that don't carry
  // our CSS variables in scope (flashcard view, browse view, quiz view),
  // so every fill/stroke is spelled out. Palette matches the static
  // img_cardinal_north exactly.
  const BLACK  = '#1a2e44';
  const YELLOW = '#f9a825';
  const STROKE = '#1a2e44';

  const parts = [];

  // 1. Topmark — two cones, drawn inside a translated group at (100, 38).
  const cone = (apexY, baseY) =>
    `<polygon points="0,${apexY} -16,${baseY} 16,${baseY}" fill="${BLACK}"/>`;
  parts.push(
    `<g transform="translate(100,38)">`
    + cone(topmark.top.apexY, topmark.top.baseY)
    + cone(topmark.bot.apexY, topmark.bot.baseY)
    + `</g>`
  );

  // 2. Mast — thin vertical line from topmark down to body top.
  parts.push(`<line x1="100" y1="72" x2="100" y2="110" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round"/>`);

  // 3. Body — two or three stacked rects depending on band pattern.
  //    Body occupies y=110..194 (total 84px). Width 76, centred (x=62..138).
  const fillFor = (c) => (c === 'yellow' ? YELLOW : BLACK);
  if (body.type === 'duo') {
    parts.push(`<rect x="62" y="110" width="76" height="42" fill="${fillFor(body.top)}" stroke="${STROKE}" stroke-width="2"/>`);
    parts.push(`<rect x="62" y="152" width="76" height="42" fill="${fillFor(body.bot)}" stroke="${STROKE}" stroke-width="2"/>`);
  } else {
    parts.push(`<rect x="62" y="110" width="76" height="28" fill="${fillFor(body.top)}" stroke="${STROKE}" stroke-width="2"/>`);
    parts.push(`<rect x="62" y="138" width="76" height="28" fill="${fillFor(body.mid)}" stroke="${STROKE}" stroke-width="2"/>`);
    parts.push(`<rect x="62" y="166" width="76" height="28" fill="${fillFor(body.bot)}" stroke="${STROKE}" stroke-width="2"/>`);
  }

  // 4. Below-water mast stub + two waterline arcs. Matches the
  //    static img_cardinal_north waterline exactly.
  parts.push(`<line x1="100" y1="194" x2="100" y2="240" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round"/>`);
  parts.push(`<path d="M 78 240 Q 100 252 122 240" fill="none" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round"/>`);
  parts.push(`<path d="M 84 248 Q 100 256 116 248" fill="none" stroke="${STROKE}" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 3"/>`);

  // 5. Optional flash diagram. Centred horizontally around x=100, y=266.
  //    For N (continuous): dots + three small faded dots representing "...".
  //    For S: dots + a small bar (long flash) at the end.
  if (showLight) {
    const dotR = 2.2;
    const dotSpacing = 8;
    const longW = 14;
    const longH = 4;
    const groupY = 266;

    let groupW = flash.dots * dotSpacing;
    if (flash.longAfter)  groupW += 4 + longW;
    if (flash.continuous) groupW += 4 + 12;
    const startX = 100 - groupW / 2 + dotSpacing / 2;

    let cursorX = startX;
    for (let i = 0; i < flash.dots; i++) {
      parts.push(`<circle cx="${cursorX.toFixed(1)}" cy="${groupY}" r="${dotR}" fill="${STROKE}"/>`);
      cursorX += dotSpacing;
    }
    if (flash.longAfter) {
      cursorX += 4 - dotSpacing / 2;
      parts.push(`<rect x="${cursorX.toFixed(1)}" y="${(groupY - longH / 2).toFixed(1)}" width="${longW}" height="${longH}" rx="2" fill="${STROKE}"/>`);
    }
    if (flash.continuous) {
      cursorX += 4 - dotSpacing / 2;
      for (let i = 0; i < 3; i++) {
        parts.push(`<circle cx="${(cursorX + i * 4).toFixed(1)}" cy="${groupY}" r="1.2" fill="${STROKE}" fill-opacity="0.5"/>`);
      }
    }
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">${parts.join('')}</svg>`;
}

// boatAnatomy — labelled boat diagrams with one part highlighted in red.
//
// Renders a sailboat in one of several canonical views, with a single
// named part overdrawn in red and labelled with a callout. The base
// diagram stays muted (navy + grey) so the highlighted part visually
// pops. This lets one generator answer dozens of "name this part"
// flashcards from a single deck of card definitions.
//
// Params:
//   part — string, REQUIRED. Which part to highlight. See PARTS_INDEX
//          below for the full list. If unknown, the diagram still
//          renders without a highlight (defensive default — caller
//          sees the un-annotated boat rather than a crash).
//   view — string, OPTIONAL. One of:
//            'side'   — port-side profile, bow on the LEFT
//            'top'    — deck plan from above, bow at the TOP
//          If absent, defaults are derived from `part`:
//            parts in SIDE_PARTS  -> 'side'
//            parts in TOP_PARTS   -> 'top'
//          Resolution is unambiguous because no part name appears in
//          both maps. Future views (interior, detail, measurements)
//          will be added in later generators or as additional cases
//          here, gated on `view`.
//
// Coordinate systems:
//   side: viewBox 0 0 600 320. Waterline at y=215. Mast at x=240.
//         Bow at x~88 (left), stern transom at x~525 (right).
//   top:  viewBox 0 0 360 600. Bow at top (y~30, x=180). Stern transom
//         at bottom (y=570). Centreline along x=180.
//
// Highlight strategy:
//   sideBaseSvg() / topBaseSvg() draw the full boat in muted navy
//   strokes. The part definition supplies (a) an `hl` SVG fragment
//   redrawing the part in red (#d32f2f) with extra stroke weight and
//   sometimes a 15-20% red fill, and (b) a label callout position.
//   labelGroup() draws a rounded white pill with red border and red
//   text, a leader line from the pill edge to a target point on the
//   highlighted part, and a small dot on that target. Pill edge
//   computation projects from the target through the pill centre and
//   exits the correct side of the rectangle, so the leader never
//   crosses the pill.
//
// To add a part:
//   1. Pick the right base view (or add a new one).
//   2. Add an entry to SIDE_PARTS or TOP_PARTS keyed by part name.
//      The entry is a function returning { hl, labelText, labelXY,
//      leaderTo }. Coordinates are in the view's viewBox space.
//   3. Author cards with kind:"image", front_image_gen:"boatAnatomy",
//      and front_image_params:{ part: "your_part_name" }.
function renderBoatAnatomy(opts) {
  const { part, view } = opts || {};
  // Resolve view from part if not given.
  let resolvedView = view;
  if (!resolvedView) {
    if (part in BOAT_ANATOMY_SIDE_PARTS) resolvedView = 'side';
    else if (part in BOAT_ANATOMY_TOP_PARTS) resolvedView = 'top';
    else resolvedView = 'side'; // default base diagram
  }

  if (resolvedView === 'top') {
    return renderTopView(part);
  }
  return renderSideView(part);
}

// Palette — inline, since this SVG renders inside containers that
// don't carry the CSS variables in scope (flashcard, browse, quiz).
const _BA_NAVY    = '#0a3d62';
const _BA_NAVY_2  = '#1a5490';
const _BA_MUTED   = '#7a8a9e';
const _BA_RED     = '#d32f2f';
const _BA_WATER   = '#a8c8d8';
const _BA_WHITE   = '#ffffff';
const _BA_LABEL_FONT  = `font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600"`;
const _BA_HEADER_FONT = `font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700"`;

// Build a label group: rounded white pill with red border + leader
// line back to a target point. The leader exits the pill on the side
// nearest the target so it never overlaps the text.
function _baLabelGroup(labelText, labelXY, leaderTo) {
  const w = labelText.length * 7 + 22;
  const h = 22;
  const [lx, ly] = labelXY;
  const [tx, ty] = leaderTo;
  const dx = lx - tx, dy = ly - ty;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  let originX, originY;
  if (absDx < 0.01 && absDy < 0.01) {
    // Degenerate: label sits on the target. Just stub the leader.
    originX = lx; originY = ly;
  } else if (absDx / (w/2) > absDy / (h/2)) {
    originX = lx - Math.sign(dx) * (w / 2);
    originY = ly - Math.sign(dx) * (w / 2) * (dy / Math.max(absDx, 0.01));
  } else {
    originY = ly - Math.sign(dy) * (h / 2);
    originX = lx - Math.sign(dy) * (h / 2) * (dx / Math.max(absDy, 0.01));
  }
  return `<line x1="${originX.toFixed(1)}" y1="${originY.toFixed(1)}" x2="${tx}" y2="${ty}" stroke="${_BA_RED}" stroke-width="1.5"/>`
       + `<circle cx="${tx}" cy="${ty}" r="3" fill="${_BA_RED}"/>`
       + `<rect x="${(lx - w/2).toFixed(1)}" y="${(ly - h/2).toFixed(1)}" width="${w}" height="${h}" rx="11" fill="${_BA_WHITE}" stroke="${_BA_RED}" stroke-width="1.5"/>`
       + `<text x="${lx}" y="${ly + 4}" text-anchor="middle" ${_BA_LABEL_FONT} fill="${_BA_RED}">${labelText}</text>`;
}
